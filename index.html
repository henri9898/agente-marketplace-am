        </button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8">
        <div>
          <p className="sub text-xs uppercase tracking-wider mb-2">Tipos de evento</p>
          {items.map(([key, label, hint]) => (
            <label key={key} className="toggle-row" style={{cursor:'pointer'}}>
              <span>
                <span className="font-semibold">{label}</span>
                <span className="sub text-xs block mt-0.5">{hint}</span>
              </span>
              <input type="checkbox" checked={prefs[key]} onChange={() => togglePref(key)}/>
            </label>
          ))}
        </div>

        <div>
          <p className="sub text-xs uppercase tracking-wider mb-2">Entrega</p>

          <label className="toggle-row" style={{cursor:'pointer'}}>
            <span>
              <span className="font-semibold">Push do navegador</span>
              <span className="sub text-xs block mt-0.5">
                {browserPermission === 'unsupported' ? 'Navegador sem suporte' :
                 browserPermission === 'denied'      ? 'Permissão bloqueada nas configs do navegador' :
                 browserPermission === 'granted'     ? 'Permissão concedida' :
                                                       'Vamos pedir permissão ao ativar'}
              </span>
            </span>
            <input type="checkbox" checked={prefs.push && browserPermission === 'granted'}
              disabled={browserPermission === 'unsupported' || browserPermission === 'denied'}
              onChange={togglePush}/>
          </label>

          <label className="toggle-row" style={{cursor:'pointer'}}>
            <span>
              <span className="font-semibold">Som ao receber venda</span>
              <span className="sub text-xs block mt-0.5">"Ching" suave de caixa registradora</span>
            </span>
            <input type="checkbox" checked={prefs.som} onChange={() => togglePref('som')}/>
          </label>

          <div className="toggle-row" style={{flexDirection:'column',alignItems:'stretch',gap:8}}>

  );

function ImportCSVTab({ agent, onGoToAgent }) {
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);   // {rows, valid, warns, errors}
  const [importing, setImporting] = useState(false);
  const [progress, setProgress] = useState(0);
  const inputRef = useRef(null);

  const handleFile = async (file) => {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('Arquivo maior que 5MB.'); return; }
    const text = await file.text();
    const { headers, rows } = parseCSV(text);
    const required = ['sku','nome','custo'];
    const missingCols = required.filter(c => !headers.includes(c));
    if (missingCols.length) {
      alert(`CSV inválido — colunas obrigatórias ausentes: ${missingCols.join(', ')}`);
      return;
    }
    // valida cada linha
    const evaluated = rows.map(r => {
      const compat = (r.compatibilidades||'').split(/[;|]/).map(s=>s.trim()).filter(Boolean);
      const product = { ...r, compatibilidades: compat, custo: parseFloat(r.custo) || 0 };
      const v = validateProduct(product);
      return { ...product, _v: v };
    });
    setPreview({
      rows: evaluated,
      valid: evaluated.filter(r => r._v.ok && r._v.warns.length === 0).length,
      warns: evaluated.filter(r => r._v.ok && r._v.warns.length > 0).length,
      errors: evaluated.filter(r => !r._v.ok).length,
    });
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files?.[0];
    handleFile(file);
  };

  const handleImport = () => {
    if (!preview) return;
    setImporting(true); setProgress(0);
    const valid = preview.rows.filter(r => r._v.ok).map(({_v, ...rest}) => rest);
    let i = 0;
    const tick = setInterval(() => {
      i += Math.max(1, Math.floor(valid.length / 20));
      const pct = Math.min(100, Math.round((i / valid.length) * 100));
      setProgress(pct);
      if (i >= valid.length) {
        clearInterval(tick);
        agent.addProducts(valid);
        setImporting(false); setPreview(null); setProgress(0);
        agent.log('info', `📦 ${valid.length} produtos importados via CSV`);
      }
    }, 60);
  };

  const handleDownloadModel = () => {
    const headers = ['sku','nome','marca','part_number','gtin','custo','peso_kg','categoria','compatibilidades','urls_imagens'];
    const rows = [
      { sku:'FAR-GOL-G5-001', nome:'Farol Dianteiro Gol G5 Lado Direito', marca:'Arteb', part_number:'AR-FAR-887', gtin:'7891234567890', custo:'120.00', peso_kg:'1.2', categoria:'Iluminação', compatibilidades:'Volkswagen Gol G5 (2008-2012); Volkswagen Voyage G5 (2008-2012)', urls_imagens:'https://exemplo.com/far-gol-1.jpg|https://exemplo.com/far-gol-2.jpg' },
      { sku:'LAN-VOY-001',    nome:'Lanterna Traseira Voyage G6 LED',     marca:'Cofran', part_number:'CF-LAN-441', gtin:'7891234567891', custo:'89.90',  peso_kg:'0.9', categoria:'Iluminação', compatibilidades:'Volkswagen Voyage G6 (2012-2018)',                                            urls_imagens:'https://exemplo.com/lan-voy.jpg' },
      { sku:'RET-SAV-G6-001', nome:'Retrovisor Elétrico Saveiro G6',      marca:'Metagal', part_number:'MT-RET-309', gtin:'7891234567892', custo:'180.00', peso_kg:'1.4', categoria:'Espelhos',  compatibilidades:'Volkswagen Saveiro G6',                                                       urls_imagens:'' },
    ];
    downloadCSV('modelo-produtos-am.csv', headers, rows);
  };

  return (
    <div>
      <div className="info-steps mb-4">
        <h3 className="font-bold mb-2" style={{color:'var(--green)'}}>Como importar em massa</h3>
        <ol>
          <li>Baixe o modelo CSV abaixo e preencha com seus produtos.</li>
          <li>Use ponto-e-vírgula <code className="mono" style={{color:'var(--green)'}}>;</code> pra separar veículos compatíveis.</li>
          <li>Use barra-vertical <code className="mono" style={{color:'var(--green)'}}>|</code> pra separar URLs de imagens.</li>
          <li>(Opcional) compacte as imagens num <code className="mono" style={{color:'var(--green)'}}>.zip</code> nomeadas pelo SKU.</li>
          <li>Arraste aqui — a gente valida tudo antes de importar.</li>
        </ol>
      </div>

      <div className="flex gap-3 mb-4 flex-wrap">
        <button className="btn-play" onClick={handleDownloadModel} style={{padding:'12px 22px',fontSize:14}}>
          ⬇️ Baixar modelo CSV
        </button>
        <input ref={inputRef} type="file" accept=".csv,.xlsx" style={{display:'none'}} onChange={e => handleFile(e.target.files?.[0])}/>
        <input type="file" accept=".zip" style={{display:'none'}}/>
      </div>

      <div
        className={`dropzone ${dragging?'dragging':''}`}
        onClick={() => inputRef.current?.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
      >
        <div className="dz-icon">📂</div>
        <div className="font-bold mb-1">Arraste seu CSV ou XLSX aqui</div>
        <div className="sub text-xs">ou clique pra escolher · até 5 MB · também aceita .zip de imagens</div>
      </div>

      {preview && (
        <div className="card p-5 mt-5">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h3 className="font-bold">Pré-visualização</h3>
            <div className="flex gap-3 text-sm flex-wrap">
              <span className="badge b-green">✅ {preview.valid - preview.warns} prontos</span>
              <span className="badge b-yellow">⚠️ {preview.warns} atenção</span>
              <span className="badge b-red">❌ {preview.errors} erros</span>
            </div>
          </div>

          <div style={{maxHeight:340, overflowY:'auto'}}>
            <table className="w-full ptable">
              <thead>
                <tr><th>SKU</th><th>Nome</th><th>Marca</th><th className="text-right">Custo</th><th>Status</th></tr>
              </thead>
              <tbody>
                {preview.rows.slice(0, 10).map((r, i) => (
                  <tr key={i} className={!r._v.ok ? 'row-error' : (r._v.warns.length ? 'row-warn' : '')}>
                    <td className="mono text-xs">{r.sku || <span className="sub">—</span>}</td>
                    <td>{r.nome || <span className="sub italic">sem nome</span>}</td>
                    <td className="sub">{r.marca || '—'}</td>
                    <td className="text-right mono">{r.custo ? `R$ ${parseFloat(r.custo).toFixed(2)}` : '—'}</td>
                    <td>
                      {!r._v.ok
                        ? <span title={r._v.errors.join(' · ')}>❌ {r._v.errors[0]}</span>
                        : r._v.warns.length
                          ? <span title={r._v.warns.join(' · ')}>⚠️ {r._v.warns[0]}</span>
                          : <span style={{color:'var(--mint)'}}>✅ pronto</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {preview.rows.length > 10 && <p className="sub text-xs text-center mt-3">+{preview.rows.length - 10} produtos não exibidos no preview</p>}
          </div>

          {importing && (
            <div className="mt-4">
              <div className="flex items-center justify-between text-xs mb-2">
                <span className="sub">Importando...</span>
                <span className="mono" style={{color:'var(--green)'}}>{progress}%</span>
              </div>
              <div className="agent-progress"><div className="agent-progress-fill" style={{width: progress+'%'}}/></div>
            </div>
          )}

          <div className="flex gap-2 justify-end mt-5 flex-wrap">
            <button className="btn-ghost" onClick={() => setPreview(null)}>Cancelar</button>
            <button className="btn-ghost">Corrigir</button>
            <button className="btn-play" disabled={importing || preview.errors === preview.rows.length}
              onClick={handleImport} style={{padding:'10px 22px',fontSize:13}}>
              ⬆️ Importar {preview.valid + preview.warns} válidos
            </button>
          </div>
        </div>
      )}

      {agent.counts.aguardando > 0 && (
        <div className="card p-4 mt-4 flex items-center gap-3 flex-wrap" style={{borderColor:'rgba(34,197,94,.4)'}}>
          <div className="text-2xl">🚀</div>
          <div className="flex-1">
            <div className="font-bold text-sm">{agent.counts.aguardando} produtos prontos pro agente</div>
            <div className="sub text-xs">Cadastrou tudo? Vai pra aba Agente e dê PLAY pra publicar automaticamente.</div>
          </div>
          <button className="btn-play" onClick={onGoToAgent} style={{padding:'10px 18px',fontSize:13}}>
            ▶ Processar agora
          </button>
        </div>
      )}
    </div>
  );
}

// ----- TAB B: CADASTRO MANUAL -----
function ManualFormTab({ agent }) {
  const [form, setForm] = useState({
    sku:'', nome:'', marca:'', part_number:'', gtin:'',
    custo:'', peso_kg:'', categoria:'',
    compatibilidades: [],
    images: [], // [{url, name}]
    ficha:'', garantia:'', observacoes:'',
  });
  const [extras, setExtras] = useState(false);

  // ---- FIPE cascata (Tipo → Marca → Modelo → Ano) ----
  const [vTipo, setVTipo]             = useState('carros');
  const [fipeMarcasList, setFipeMarcasList] = useState([]);
  const [fipeModelosList, setFipeModelosList] = useState([]);
  const [fipeAnosList, setFipeAnosList]       = useState([]);
  const [vMarcaCod, setVMarcaCod]     = useState('');
  const [vModeloCod, setVModeloCod]   = useState('');
  const [vAnoCod, setVAnoCod]         = useState('');
  const [fipeLoading, setFipeLoading] = useState({marcas:false, modelos:false, anos:false});
  const [fipeErr, setFipeErr]         = useState('');

  // Carrega marcas ao mudar tipo
  useEffect(() => {
    setFipeLoading(p => ({...p, marcas:true})); setFipeErr('');
    fipeMarcas(vTipo)
      .then(list => {
        const sorted = [...list].sort((a,b)=> (a.nome||'').localeCompare(b.nome||''));
        setFipeMarcasList(sorted);
      })
      .catch(e => setFipeErr('Falha ao carregar marcas FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, marcas:false})));
    setVMarcaCod(''); setVModeloCod(''); setVAnoCod('');
    setFipeModelosList([]); setFipeAnosList([]);
  }, [vTipo]);

  // Carrega modelos ao selecionar marca
  useEffect(() => {
    if (!vMarcaCod) { setFipeModelosList([]); return; }
    setFipeLoading(p => ({...p, modelos:true})); setFipeErr('');
    fipeModelos(vTipo, vMarcaCod)
      .then(list => setFipeModelosList(list))
      .catch(e => setFipeErr('Falha ao carregar modelos FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, modelos:false})));
    setVModeloCod(''); setVAnoCod(''); setFipeAnosList([]);
  }, [vMarcaCod, vTipo]);

  // Carrega anos ao selecionar modelo
  useEffect(() => {
    if (!vModeloCod) { setFipeAnosList([]); return; }
    setFipeLoading(p => ({...p, anos:true})); setFipeErr('');
    fipeAnos(vTipo, vMarcaCod, vModeloCod)
      .then(list => setFipeAnosList(list))
      .catch(e => setFipeErr('Falha ao carregar anos FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, anos:false})));
    setVAnoCod('');
  }, [vModeloCod, vMarcaCod, vTipo]);

  const [imgDragging, setImgDragging] = useState(false);
  const imgInputRef = useRef(null);

  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
  const validation = useMemo(() => validateProduct(form), [form]);

  const fieldOK = (k) => {
    if (k === 'sku')   return form.sku.trim().length > 0;
    if (k === 'nome')  return form.nome.trim().length > 0;
    if (k === 'custo') return form.custo && !isNaN(parseFloat(form.custo));
    return true;
  };

  const addCompat = () => {
    // FIPE cascata — usa os nomes reais retornados pela API
    if (!vMarcaCod || !vModeloCod) return;
    const marcaObj  = fipeMarcasList.find(m => String(m.codigo) === String(vMarcaCod));
    const modeloObj = fipeModelosList.find(m => String(m.codigo) === String(vModeloCod));
    const anoObj    = fipeAnosList.find(a => String(a.codigo) === String(vAnoCod));
    if (!marcaObj || !modeloObj) return;
    const anoLabel = anoObj ? ` ${anoObj.nome}` : '';
    const label = `${marcaObj.nome} ${modeloObj.nome}${anoLabel}`;
    set('compatibilidades', [...form.compatibilidades, label]);
    setVModeloCod(''); setVAnoCod(''); setFipeAnosList([]);
  };
  const removeCompat = (i) => set('compatibilidades', form.compatibilidades.filter((_, j) => j !== i));

  const handleImageFiles = (files) => {
    const arr = Array.from(files || []).filter(f => f.type.startsWith('image/'));
    const novos = arr.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
    set('images', [...form.images, ...novos]);
  };
  const removeImage = (i) => set('images', form.images.filter((_, j) => j !== i));
  const moveImageUp = (i) => {
    if (i === 0) return;
    const arr = [...form.images];
    [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
    set('images', arr);
  };

  const submit = (addAnother) => {
    if (!validation.ok) return;
    agent.addProducts([{ ...form, custo: parseFloat(form.custo) || 0 }]);
    agent.log('info', `📦 Produto cadastrado: ${form.sku}`);
    if (addAnother) {
      setForm({ sku:'', nome:'', marca:'', part_number:'', gtin:'', custo:'', peso_kg:'', categoria:'',
        compatibilidades:[], images:[], ficha:'', garantia:'', observacoes:'' });
    } else {
      alert(`Produto "${form.nome}" cadastrado com sucesso!`);
    }
  };

  return (
    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div className="md:col-span-2 space-y-4">
        {/* SEÇÃO 1 — IDENTIFICAÇÃO */}
        <div className="card p-5">
          <h3 className="font-bold mb-3">1. Identificação</h3>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="label">SKU {fieldOK('sku') ? <span style={{color:'var(--mint)'}}>✓</span> : <span style={{color:'#ef4444'}}>*</span>}</label>
              <input className="input" value={form.sku} onChange={e=>set('sku', e.target.value)} placeholder="FAR-GOL-G5-001"/></div>
            <div><label className="label">Marca</label>
              <input className="input" value={form.marca} onChange={e=>set('marca', e.target.value)} placeholder="Arteb"/></div>
            <div className="col-span-2"><label className="label">Nome do produto {fieldOK('nome') ? <span style={{color:'var(--mint)'}}>✓</span> : <span style={{color:'#ef4444'}}>*</span>}</label>
              <input className="input" value={form.nome} onChange={e=>set('nome', e.target.value)} placeholder="Farol Dianteiro Gol G5 Lado Direito"/></div>
            <div><label className="label">Part number</label>
              <input className="input" value={form.part_number} onChange={e=>set('part_number', e.target.value)} placeholder="AR-FAR-887"/></div>
            <div><label className="label">GTIN/EAN</label>
              <input className="input" value={form.gtin} onChange={e=>set('gtin', e.target.value)} placeholder="7891234567890"/></div>
          </div>
        </div>

        {/* SEÇÃO 2 — PREÇOS E CUSTOS */}
        <div className="card p-5">
          <h3 className="font-bold mb-3">2. Preços e custos</h3>
          <div className="grid grid-cols-3 gap-3">
            <div><label className="label">Custo (R$) {fieldOK('custo') ? <span style={{color:'var(--mint)'}}>✓</span> : <span style={{color:'#ef4444'}}>*</span>}</label>
              <input className="input" value={form.custo} onChange={e=>set('custo', e.target.value)} placeholder="120.00" inputMode="decimal"/></div>
            <div><label className="label">Peso (kg)</label>
              <input className="input" value={form.peso_kg} onChange={e=>set('peso_kg', e.target.value)} placeholder="1.2" inputMode="decimal"/></div>
            <div><label className="label">Categoria</label>
              <select className="input" value={form.categoria} onChange={e=>set('categoria', e.target.value)}>
                <option value="">Selecione...</option>
                <option>Iluminação</option><option>Espelhos</option><option>Motor</option>
                <option>Suspensão</option><option>Carroceria</option><option>Acessórios</option>
              </select>
            </div>
          </div>
        </div>

        {/* SEÇÃO 3 — COMPATIBILIDADES (FIPE) */}
        <div className="card p-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold">3. Compatibilidade de veículos</h3>
            <span className="chip" style={{color:'var(--green)',borderColor:'rgba(0,167,255,.4)'}}>
              <span className="dot" style={{background:'var(--green)'}}/>FIPE · parallelum.com.br
            </span>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            <select className="input" value={vTipo} onChange={e=>setVTipo(e.target.value)}>
              <option value="carros">🚗 Carros</option>
              <option value="motos">🏍️ Motos</option>
              <option value="caminhoes">🚚 Caminhões</option>
            </select>
            <select className="input" value={vMarcaCod} onChange={e=>setVMarcaCod(e.target.value)} disabled={fipeLoading.marcas}>
              <option value="">{fipeLoading.marcas ? 'Carregando…' : 'Marca'}</option>
              {fipeMarcasList.map(m => <option key={m.codigo} value={m.codigo}>{m.nome}</option>)}
            </select>
            <select className="input" value={vModeloCod} onChange={e=>setVModeloCod(e.target.value)} disabled={!vMarcaCod || fipeLoading.modelos}>
              <option value="">{fipeLoading.modelos ? 'Carregando…' : (vMarcaCod ? 'Modelo' : 'escolha marca')}</option>
              {fipeModelosList.map(m => <option key={m.codigo} value={m.codigo}>{m.nome}</option>)}
            </select>
            <select className="input" value={vAnoCod} onChange={e=>setVAnoCod(e.target.value)} disabled={!vModeloCod || fipeLoading.anos}>
              <option value="">{fipeLoading.anos ? 'Carregando…' : (vModeloCod ? 'Ano (opcional)' : 'escolha modelo')}</option>
              {fipeAnosList.map(a => <option key={a.codigo} value={a.codigo}>{a.nome}</option>)}
            </select>
          </div>

          {fipeErr && <div className="err mt-2 text-xs">{fipeErr}</div>}

          <div className="flex justify-end mt-2">
            <button className="btn-ghost" onClick={addCompat} disabled={!vMarcaCod || !vModeloCod}>+ Adicionar veículo</button>
          </div>
          <div className="mt-3" style={{minHeight:36}}>
            {form.compatibilidades.length === 0
              ? <p className="sub text-xs italic">Nenhum veículo adicionado ainda.</p>
              : form.compatibilidades.map((c, i) => (
                  <span key={i} className="veh-chip">{c}<span className="x" onClick={()=>removeCompat(i)}>✕</span></span>
                ))}
          </div>
        </div>

        {/* SEÇÃO 4 — IMAGENS */}
        <div className="card p-5">
          <h3 className="font-bold mb-3">4. Imagens <span className="sub text-xs font-normal">(primeira = principal)</span></h3>
          <input ref={imgInputRef} type="file" multiple accept="image/*" style={{display:'none'}} onChange={e=>handleImageFiles(e.target.files)}/>
          <div
            className={`dropzone ${imgDragging?'dragging':''}`} style={{padding:'24px 16px'}}
            onClick={()=>imgInputRef.current?.click()}
            onDragOver={e=>{e.preventDefault(); setImgDragging(true);}}
            onDragLeave={()=>setImgDragging(false)}
            onDrop={e=>{e.preventDefault(); setImgDragging(false); handleImageFiles(e.dataTransfer.files);}}
          >
            <div style={{fontSize:24}}>🖼️</div>
            <div className="text-xs mt-1">Arraste imagens ou clique pra adicionar</div>
          </div>
          {form.images.length > 0 && (
            <div className="img-grid mt-4">
              {form.images.map((img, i) => (
                <div key={i} className={`img-thumb ${i===0?'primary':''}`} onClick={()=>moveImageUp(i)} title={i===0 ? 'Imagem principal' : 'Clique pra subir na ordem'}>
                  <img src={img.url} alt={img.name}/>
                  {i === 0 && <span className="badge-primary">PRINCIPAL</span>}
                  <span className="x" onClick={e => { e.stopPropagation(); removeImage(i); }}>✕</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* SEÇÃO 5 — EXTRAS (colapsável) */}
        <div className="card p-5">
          <button className="w-full flex items-center justify-between" onClick={()=>setExtras(e=>!e)} style={{background:'transparent',border:0,cursor:'pointer',color:'var(--txt)'}}>
            <h3 className="font-bold">5. Extras opcional</h3>
            <span className="sub mono">{extras ? '▲' : '▼'}</span>
          </button>
          {extras && (
            <div className="space-y-3 mt-3">
              <div><label className="label">Ficha técnica</label>
                <textarea className="input" rows={3} value={form.ficha} onChange={e=>set('ficha', e.target.value)} placeholder="Voltagem, dimensões, materiais..."/></div>
              <div><label className="label">Garantia</label>
                <input className="input" value={form.garantia} onChange={e=>set('garantia', e.target.value)} placeholder="3 meses contra defeito de fabricação"/></div>
              <div><label className="label">Observações</label>
                <textarea className="input" rows={2} value={form.observacoes} onChange={e=>set('observacoes', e.target.value)}/></div>
            </div>
          )}
        </div>
      </div>

      {/* COLUNA LATERAL — resumo + ações */}
      <div className="space-y-4">
        <div className="card p-5 sticky" style={{top:96}}>
          <h3 className="font-bold mb-3">Resumo</h3>
          <ul className="text-sm space-y-2">
            <li className="flex justify-between"><span className="sub">SKU</span><span className="mono">{form.sku || '—'}</span></li>
            <li className="flex justify-between"><span className="sub">Nome</span><span style={{maxWidth:160,textAlign:'right'}}>{form.nome || '—'}</span></li>
            <li className="flex justify-between"><span className="sub">Custo</span><span className="mono" style={{color:'var(--green)'}}>{form.custo ? `R$ ${parseFloat(form.custo).toFixed(2)}` : '—'}</span></li>
            <li className="flex justify-between"><span className="sub">Veículos</span><span className="mono">{form.compatibilidades.length}</span></li>
            <li className="flex justify-between"><span className="sub">Imagens</span><span className="mono">{form.images.length}</span></li>
          </ul>
          {validation.errors.length > 0 && (
            <div className="err mt-3 text-xs">{validation.errors.join(' · ')}</div>
          )}
          {validation.ok && validation.warns.length > 0 && (
            <div className="mt-3 text-xs" style={{color:'#ffb020',background:'rgba(255,176,32,.1)',padding:'8px 12px',borderRadius:8,border:'1px solid rgba(255,176,32,.3)'}}>
              ⚠️ {validation.warns.join(' · ')}
            </div>
          )}
          <div className="space-y-2 mt-4">
            <button className="btn-play w-full" disabled={!validation.ok} onClick={()=>submit(false)} style={{padding:'12px',fontSize:13,justifyContent:'center'}}>💾 Salvar produto</button>
            <button className="btn-ghost w-full" disabled={!validation.ok} onClick={()=>submit(true)}>Salvar e adicionar outro</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ----- TAB C: PRODUTOS CADASTRADOS -----
function ProductsListTab({ agent, onGoToAgent }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const [openMenu, setOpenMenu] = useState(null);

  const filtered = useMemo(() => {
    return agent.products.filter(p => {
      const s = search.toLowerCase();
      if (s && !(p.sku.toLowerCase().includes(s) || (p.nome||'').toLowerCase().includes(s) || (p.marca||'').toLowerCase().includes(s))) return false;
      if (filter === 'aguardando') return (p.status||'aguardando') === 'aguardando';
      if (filter === 'publicado')  return p.status === 'publicado';
      if (filter === 'erro')       return p.status === 'erro';
      if (filter === 'pausado')    return p.status === 'pausado';
      return true;
    });
  }, [agent.products, search, filter]);

  const toggleSel = (sku) => {
    const next = new Set(selected);
    if (next.has(sku)) next.delete(sku); else next.add(sku);
    setSelected(next);
  };
  const toggleAll = () => {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.sku)));
  };

  const statusBadge = (s) => {
    const map = {
      aguardando: ['b-yellow','aguardando'],
      publicado:  ['b-green','publicado'],
      pausado:    ['b-gray','pausado'],
      erro:       ['b-red','erro'],
    };
    const [cls, lbl] = map[s||'aguardando'];
    return <span className={`badge ${cls}`}>{lbl}</span>;
  };

  const filters = [
    ['all',        `Todos (${agent.counts.total})`],
    ['aguardando', `Aguardando (${agent.counts.aguardando})`],
    ['publicado',  `Publicados (${agent.counts.publicados})`],
    ['erro',       `Com erro (${agent.counts.erros})`],
    ['pausado',    `Pausados (${agent.counts.pausados})`],
  ];

  if (agent.products.length === 0) {
    return (
      <div className="card p-10 text-center">
        <div style={{fontSize:48}}>📦</div>
        <h3 className="font-bold mt-2">Nenhum produto cadastrado ainda</h3>
        <p className="sub text-sm mt-1">Use a aba <b>Importar CSV</b> ou <b>Cadastro manual</b> pra começar.</p>
      </div>
    );
  }

  return (
    <div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input className="input" placeholder="🔎 Buscar por SKU, nome ou marca..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1, minWidth:240}}/>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {filters.map(([k, lbl])=>(
          <button key={k} className={`subtab ${filter===k?'active':''}`} onClick={()=>setFilter(k)} style={{borderBottom:'none',background:filter===k?'var(--green-soft)':'transparent',borderRadius:8}}>
            {lbl}
          </button>
        ))}
      </div>

      <div className="card p-0">
        <table className="w-full ptable">
          <thead>
            <tr>
              <th style={{width:36}}><input type="checkbox" checked={selected.size === filtered.length && filtered.length > 0} onChange={toggleAll}/></th>
              <th style={{width:48}}></th>
              <th>SKU</th>
              <th>Nome</th>
              <th>Marca</th>
              <th className="text-right">Custo</th>
              <th>Compat.</th>
              <th>Status</th>
              <th>ML ID</th>
              <th style={{width:36}}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(p => (
              <tr key={p.sku}>
                <td><input type="checkbox" checked={selected.has(p.sku)} onChange={()=>toggleSel(p.sku)}/></td>
                <td><div className="thumb-mini">{p.images?.length ? <img src={p.images[0].url} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:6}}/> : '📦'}</div></td>
                <td className="mono text-xs">{p.sku}</td>
                <td>{p.nome}</td>
                <td className="sub">{p.marca||'—'}</td>
                <td className="text-right mono" style={{color:'var(--green)'}}>R$ {(parseFloat(p.custo)||0).toFixed(2)}</td>
                <td className="sub text-xs">{(p.compatibilidades||[]).length} veículo(s)</td>
                <td>{statusBadge(p.status)}</td>
                <td className="mono text-xs">{p.mlId || <span className="sub">—</span>}</td>
                <td style={{position:'relative'}}>
                  <button className="btn-ghost" style={{padding:'4px 10px',fontSize:14}} onClick={()=>setOpenMenu(openMenu===p.sku?null:p.sku)}>⋯</button>
                  {openMenu === p.sku && (
                    <div className="profile-dropdown" style={{position:'absolute',right:0,top:'100%',width:180,marginTop:4,zIndex:20}}>
                      <div className="dropdown-section">
                        <button className="menu-item"><span className="item-icon">👁️</span><span className="item-label">Ver detalhes</span></button>
                        <button className="menu-item"><span className="item-icon">✏️</span><span className="item-label">Editar</span></button>
                        <button className="menu-item"><span className="item-icon">📋</span><span className="item-label">Duplicar</span></button>
                        <button className="menu-item" disabled={!p.mlId}><span className="item-icon">🔗</span><span className="item-label">Ver no ML</span></button>
                        <button className="menu-item" onClick={()=>{agent.updateProduct(p.sku,{status:'pausado'}); setOpenMenu(null);}}><span className="item-icon">⏸</span><span className="item-label">Pausar</span></button>
                        <button className="menu-item danger" onClick={()=>{agent.removeProducts([p.sku]); setOpenMenu(null);}}><span className="item-icon">🗑️</span><span className="item-label">Excluir</span></button>
                      </div>
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected.size > 0 && (
        <div className="bulk-bar">
          <span className="font-bold text-sm" style={{color:'var(--green)'}}>{selected.size} selecionado(s)</span>
          <div className="ml-auto flex gap-2 flex-wrap">
            <button className="btn-ghost" onClick={()=>{selected.forEach(s=>agent.updateProduct(s,{status:'pausado'})); setSelected(new Set());}}>⏸ Pausar</button>
            <button className="btn-ghost" style={{color:'#ef4444',borderColor:'rgba(239,68,68,.4)'}} onClick={()=>{if(confirm(`Excluir ${selected.size} produtos?`)){agent.removeProducts([...selected]); setSelected(new Set());}}}>🗑️ Excluir</button>
            <button className="btn-play" style={{padding:'8px 16px',fontSize:13}} onClick={()=>{onGoToAgent(); setSelected(new Set());}}>▶ Enviar pra IA</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductsPage({ agent, onGoToAgent }) {
  const [sub, setSub] = useState('list');
  const [blingConnected, setBlingConnected] = useState(() => !!loadBlingTokens());

  // se não tem produto, abrir já em "manual" pra não cair em estado vazio
  useEffect(() => { if (agent.products.length === 0) setSub('csv'); }, []);

  // Monitora conexão Bling para mostrar/esconder a sub-aba dinamicamente
  useEffect(() => {
    const sync = () => setBlingConnected(!!loadBlingTokens());
    window.addEventListener('storage', sync);
    const id = setInterval(sync, 3000);
    return () => { window.removeEventListener('storage', sync); clearInterval(id); };
  }, []);

  // Se Bling conecta durante a sessão, sugere abrir a aba
  const bling = loadBlingTokens();

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold">Produtos</h1>
          <p className="sub text-sm">Cadastre os produtos que o agente vai anunciar no Mercado Livre</p>
        </div>
      </div>

      <div className="subtab-bar">
        {blingConnected && (
          <div className={`subtab ${sub==='bling'?'active':''}`} onClick={()=>setSub('bling')}>
            🔌 Do Bling <span className="badge-count" style={{background:'rgba(34,197,94,.2)', color:'#22c55e'}}>live</span>
          </div>
        )}
        <div className={`subtab ${sub==='csv'?'active':''}`}    onClick={()=>setSub('csv')}>📥 Importar CSV</div>
        <div className={`subtab ${sub==='manual'?'active':''}`} onClick={()=>setSub('manual')}>✏️ Cadastro manual</div>
        <div className={`subtab ${sub==='list'?'active':''}`}   onClick={()=>setSub('list')}>📋 Cadastrados <span className="badge-count">{agent.counts.total}</span></div>
      </div>

      {sub === 'bling'  && <BlingProdutosTab agent={agent} onGoToAgent={onGoToAgent}/>}
      {sub === 'csv'    && <ImportCSVTab    agent={agent} onGoToAgent={onGoToAgent}/>}
      {sub === 'manual' && <ManualFormTab   agent={agent}/>}
      {sub === 'list'   && <ProductsListTab agent={agent} onGoToAgent={onGoToAgent}/>}
    </div>
  );
}

// ============================================================
// BlingProdutosTab — lista produtos reais do Bling,
// permite seleção múltipla e publicação em lote no ML
// ============================================================
function BlingProdutosTab({ agent, onGoToAgent }) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState('');
  const [selected, setSelected] = useState(new Set());
  const [q, setQ]             = useState('');
  const [publishing, setPublishing] = useState(false);
  const [progress, setProgress] = useState(null);   // {done, total, currentId}
  const [results, setResults] = useState(null);     // resposta do /api/publicar/lote
  const hasML = !!loadMLTokens();

  const load = useCallback(async () => {
    setLoading(true); setErr('');
    const r = await blingFetchProdutos({ page: 1, limit: 100 });
    if (r.success) { setData(r); }
    else { setErr(r.error || 'Falha ao carregar produtos'); setData({ total:0, produtos:[] }); }
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const lista = data?.produtos || [];
  const filtered = q
    ? lista.filter(p =>
        (p.nome||'').toLowerCase().includes(q.toLowerCase()) ||
        (p.codigo||'').toLowerCase().includes(q.toLowerCase()))
    : lista;

  const toggle = (id) => setSelected(s => {
    const n = new Set(s);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });
  const toggleAll = () => {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.id)));
  };

  // SEO preview (modal) — mostra 3 títulos, 3 descrições, anti-duplicidade
  const [seoPreview, setSeoPreview] = useState(null); // { produto, data, loading }
  const abrirSeoPreview = async (produto) => {
    setSeoPreview({ produto, data: null, loading: true });
    try {
      const ml = loadMLTokens();
      const r = await fetch('/api/seo/gerar-completo', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (ml?.access_token||''), 'Content-Type':'application/json' },
        body: JSON.stringify({
          nome: produto.nome,
          marca: produto.marca?.nome || produto.marca || '',
          partNumber: produto.codigo || '',
          especificacoes: produto.descricaoCurta || '',
        }),
      });
      const data = await r.json().catch(()=>({ success:false }));
      setSeoPreview({ produto, data, loading:false });
    } catch(e) {
      setSeoPreview({ produto, data:{ success:false, error:e.message }, loading:false });
    }
  };

  const publicar = async () => {
    if (!hasML) {
      alert('⚠️ Conecte o Mercado Livre primeiro na aba 🔌 Integrações.');
      return;
    }
    const ids = Array.from(selected);
    if (ids.length === 0) return;
    if (!confirm(`Publicar ${ids.length} produto(s) do Bling no Mercado Livre?\n\nTítulos SEO e descrições geradas automaticamente.\nServidor limita 1 publicação/s — estime ~${ids.length}s.`)) return;

    setPublishing(true); setResults(null);
    setProgress({ done: 0, total: ids.length, currentId: ids[0] });
    // O endpoint /lote faz o throttle server-side. Aqui exibimos só estado inicial/final.
    // Para feedback granular teríamos que publicar 1 a 1 no cliente — fica assim por simplicidade.
    const r = await publishBlingBatch(ids);
    setPublishing(false); setProgress(null); setResults(r);
    if (r.success) {
      agent.log('ok', `📤 Bling→ML: ${r.publicados}/${r.total} publicado(s) — ${r.erros} erro(s)`);
      setSelected(new Set());
    } else {
      agent.log('error', `❌ Falha no lote Bling→ML: ${r.error}`);
    }
  };

  return (
    <div>
      <div className="card p-4 mb-4">
        <div className="flex flex-wrap items-center gap-3 justify-between">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold">📦 Produtos do Bling</h3>
            {data && <span className="chip" style={{color:'var(--green)',borderColor:'rgba(0,167,255,.4)'}}>
              {data.total.toLocaleString('pt-BR')} itens
            </span>}
          </div>
          <div className="flex gap-2 flex-wrap">
            <input className="input" style={{width:240}} placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)}/>
            <button className="btn-ghost" onClick={load} disabled={loading}>{loading?'🔄 ...':'🔄 Sincronizar'}</button>
          </div>
        </div>

        {loading && <div className="ok mt-3">🔄 Carregando produtos do Bling…</div>}
        {err && <div className="err mt-3 text-xs">{err}</div>}

        {!loading && filtered.length > 0 && (
          <div className="mt-4" style={{overflowX:'auto'}}>
            <table className="w-full">
              <thead>
                <tr>
                  <th style={{width:36}}>
                    <input
                      type="checkbox"
                      checked={selected.size > 0 && selected.size === filtered.length}
                      onChange={toggleAll}
                    />
                  </th>
                  <th style={{width:110}}>SKU</th>
                  <th>Nome</th>
                  <th style={{width:90}}>Preço</th>
                  <th style={{width:70}}>Estoque</th>
                  <th style={{width:80}}>Situação</th>
                  <th style={{width:110}}>SEO</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => (
                  <tr key={p.id} style={selected.has(p.id) ? {background:'rgba(0,167,255,.05)'} : undefined}>
                    <td><input type="checkbox" checked={selected.has(p.id)} onChange={() => toggle(p.id)}/></td>
                    <td className="mono text-xs sub">{p.codigo || '—'}</td>
                    <td>
                      <div className="text-[13px]">{p.nome}</div>
                      {p.marca?.nome && <div className="sub text-[11px]">{p.marca.nome}</div>}
                    </td>
                    <td className="mono font-bold">{fmt(p.preco || 0)}</td>
                    <td className="mono">{p.estoqueSaldo ?? '—'}</td>
                    <td>
                      <span className={`badge ${p.situacao === 'A' ? 'b-green' : 'b-yellow'}`}>
                        {p.situacao === 'A' ? 'ativo' : (p.situacao || '—')}
                      </span>
                    </td>
                    <td>
                      <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px'}}
                        onClick={() => abrirSeoPreview(p)} disabled={!hasML}>
                        📝 Preview
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* Modal SEO Preview */}
        {seoPreview && (
          <div onClick={() => setSeoPreview(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div onClick={e=>e.stopPropagation()} className="card" style={{maxWidth:720,width:'100%',maxHeight:'90vh',overflow:'auto',padding:24}}>
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-lg">📝 Gerador SEO Automático</h3>
                <button className="btn-ghost" onClick={()=>setSeoPreview(null)} style={{padding:'4px 10px'}}>✕</button>
              </div>
              <div className="sub text-xs mb-3">
                Produto: <span style={{color:'var(--green)'}}>{seoPreview.produto.nome}</span>
                {seoPreview.produto.marca?.nome && <> · Marca: <span className="mono">{seoPreview.produto.marca.nome}</span></>}
                {seoPreview.produto.codigo && <> · SKU: <span className="mono">{seoPreview.produto.codigo}</span></>}
              </div>

              {seoPreview.loading && <div className="ok">🔄 Gerando títulos SEO...</div>}
              {!seoPreview.loading && seoPreview.data?.success === false && (
                <div className="err">❌ {seoPreview.data.error || 'Falha ao gerar SEO'}</div>
              )}
              {!seoPreview.loading && seoPreview.data?.success && (
                <>
                  <div className="mb-4">
                    <div className="sub text-xs uppercase tracking-wide mb-2">── Títulos Gerados ──</div>
                    {seoPreview.data.titulos.map(t => {
                      const rec = seoPreview.data.recomendacao?.titulo?.variacao === t.variacao;
                      return (
                        <div key={t.variacao} className="card p-3 mb-2" style={{borderColor: rec ? 'rgba(34,197,94,.45)' : undefined}}>
                          <div className="flex items-center gap-2 flex-wrap mb-1">
                            <span className="chip" style={{fontSize:11}}>Variação {t.variacao}</span>
                            <span className="sub text-xs">{t.foco}</span>
                            <span className="sub text-xs mono">· {t.chars} chars</span>
                            {rec && <span className="chip" style={{color:'var(--green)',borderColor:'rgba(34,197,94,.5)',fontSize:11}}>✅ Recomendado</span>}
                          </div>
                          <div className="mono text-sm">{t.titulo}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="mb-4">
                    <div className="sub text-xs uppercase tracking-wide mb-2">── Anti-duplicidade ──</div>
                    <div className={seoPreview.data.duplicidade?.duplicado ? 'err' : 'ok'} style={{fontSize:12}}>
                      {seoPreview.data.duplicidade?.aviso || 'verificação não executada'}
                    </div>
                  </div>

                  <div className="mb-4">
                    <div className="sub text-xs uppercase tracking-wide mb-2">── Descrição recomendada ──</div>
                    <div className="card p-3">
                      <div className="sub text-xs mb-2">
                        Variação {seoPreview.data.recomendacao?.descricao?.variacao} · {seoPreview.data.recomendacao?.descricao?.foco}
                        · <span className="mono">{seoPreview.data.recomendacao?.descricao?.chars} chars</span>
                      </div>
                      <pre className="text-xs mono" style={{whiteSpace:'pre-wrap',maxHeight:200,overflow:'auto',margin:0}}>
{seoPreview.data.recomendacao?.descricao?.descricao}
                      </pre>
                    </div>
                  </div>

                  <div className="sub text-xs">
                    💡 Ao publicar, a IA usa automaticamente o título e descrição recomendados.
                    Se a variação A for duplicada, usa B (ou C).
                  </div>
                </>
              )}
            </div>
          </div>
        )}
        {!loading && filtered.length === 0 && !err && (
          <div className="p-8 text-center">
            <div className="text-4xl mb-2">📭</div>
            <p className="sub text-xs">{q ? 'Nenhum produto bate a busca.' : 'Sem produtos no Bling.'}</p>
          </div>
        )}
      </div>

      {/* Rodapé de ação */}
      {filtered.length > 0 && (
        <div className="card p-4 flex items-center justify-between flex-wrap gap-3">
          <div className="text-sm">
            <span className="font-bold" style={{color:'var(--green)'}}>{selected.size}</span>
            <span className="sub"> de {filtered.length} selecionado(s)</span>
            {!hasML && <span className="ml-3 text-[11px]" style={{color:'#facc15'}}>⚠️ Conecte o ML primeiro</span>}
          </div>
          <button
            className="btn"
            style={{width:'auto', padding:'11px 22px'}}
            onClick={publicar}
            disabled={selected.size === 0 || publishing || !hasML}
          >
            {publishing ? `🚀 Publicando ${progress?.done||0}/${progress?.total||selected.size}…` : `🚀 Publicar ${selected.size||''} no ML`}
          </button>
        </div>
      )}

      {/* Resultado do lote */}
      {results && results.success && (
        <div className="card p-4 mt-4" style={{borderColor: results.erros === 0 ? 'rgba(34,197,94,.4)' : 'rgba(234,179,8,.4)'}}>
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <h4 className="font-bold">
              {results.erros === 0 ? '✅ Lote publicado' : '⚠️ Lote parcialmente publicado'}
            </h4>
            <div className="text-[12px]">
              <span style={{color:'var(--green)'}}>{results.publicados} ✓</span> ·
              <span style={{color:'#ef4444'}}> {results.erros} ✗</span> ·
              <span className="sub"> de {results.total}</span>
            </div>
          </div>
          <div className="card2 p-3 text-[11px] mono" style={{maxHeight:200, overflowY:'auto'}}>
            {results.resultados.map(r => (
              <div key={r.produtoId} style={{color: r.success ? '#22c55e' : '#ef4444', marginBottom:4}}>
                {r.success
                  ? `✓ ${r.produtoId} → ${r.ml_item_id} (${r.title?.slice(0,40)})`
                  : `✗ ${r.produtoId}: ${r.error || 'erro desconhecido'}`}
              </div>
            ))}
          </div>
          {onGoToAgent && <button className="btn-ghost mt-3" onClick={onGoToAgent}>→ Ver no painel do Agente</button>}
        </div>
      )}
    </div>
  );
}

// ============================================================
// 🤖 AGENTE — botão PLAY da IA (status, métricas, config, fila, logs, emergência)
// ============================================================
function AgentStatusCard({ agent }) {
  const { status, queue, counts, errorMsg, start, pause, resume, stop, triggerError, startBlingToML } = agent;
  const total = counts.total;
  const remaining = queue.length;
  const processed = total - remaining;
  const pct = total > 0 ? Math.round((processed / total) * 100) : 0;

  // Detecta integrações Bling + ML prontas para o fluxo REAL
  const [bothConnected, setBothConnected] = useState(() => !!loadBlingTokens() && !!loadMLTokens());
  useEffect(() => {
    const sync = () => setBothConnected(!!loadBlingTokens() && !!loadMLTokens());
    window.addEventListener('storage', sync);
    const id = setInterval(sync, 3000);
    return () => { window.removeEventListener('storage', sync); clearInterval(id); };
  }, []);

  if (status === 'idle') {
    return (
      <div className="agent-status as-idle">
        <div className="status-icon" style={{width:64, height:64, display:'flex', alignItems:'center', justifyContent:'center'}}>
          <NetworkGraph size={64} animated={true} color="#3b82f6"/>
        </div>
        <div className="status-info">
          <div className="status-label" style={{color:'#4dc3ff'}}>● Agente IDLE</div>
          <div className="status-title">Pronto pra começar</div>
          <div className="status-sub">
            {counts.aguardando} produtos locais aguardando · {counts.publicados} já publicados
            {bothConnected && <span className="ml-2" style={{color:'var(--green)'}}>· 🔌 Bling + 🟡 ML conectados (fluxo real disponível)</span>}
          </div>
        </div>
        <div className="status-actions" style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {bothConnected && startBlingToML && (
            <button
              className="btn-play"
              onClick={startBlingToML}
              title="Puxa produtos do Bling, ranqueia pela IA e publica no ML (1/s)"
              style={{background:'linear-gradient(135deg, #ff6b1c, #22c55e)'}}
            >🚀 PUBLICAR DO BLING</button>
          )}
          <button className="btn-play" onClick={start} disabled={counts.aguardando === 0}>▶ INICIAR AGENTE</button>
        </div>
      </div>
    );
  }

  if (status === 'running') {
    const current = queue[0];
    return (
      <div className="agent-status as-running">
        <div className="status-icon">⚙️</div>
        <div className="status-info">
          <div className="status-label" style={{color:'#22c55e'}}>● RUNNING</div>
          <div className="status-title">Processando produto {processed + 1} de {total}</div>
          <div className="status-sub">{current ? `Atual: ${current.label}` : 'Preparando próxima tarefa...'}</div>
          <div className="agent-progress"><div className="agent-progress-fill" style={{width: pct + '%'}}/></div>
        </div>
        <div className="status-actions">
          <button className="btn-pause" onClick={pause}>⏸ Pausar</button>
          <button className="btn-stop"  onClick={stop}>⏹ Parar</button>
        </div>
      </div>
    );
  }

  if (status === 'paused') {
    return (
      <div className="agent-status as-paused">
        <div className="status-icon">⏸️</div>
        <div className="status-info">
          <div className="status-label" style={{color:'#ffb020'}}>● PAUSED</div>
          <div className="status-title">Agente pausado</div>
          <div className="status-sub">{processed} processados · {remaining} restantes na fila</div>
          <div className="agent-progress"><div className="agent-progress-fill" style={{width: pct + '%', background:'linear-gradient(90deg,#facc15,#ffb020)'}}/></div>
        </div>
        <div className="status-actions">
          <button className="btn-resume" onClick={resume}>▶ Retomar</button>
          <button className="btn-stop"   onClick={stop}>⏹ Parar</button>
        </div>
      </div>
    );
  }

  // error
  return (
    <div className="agent-status as-error">
      <div className="status-icon">🔴</div>
      <div className="status-info">
        <div className="status-label" style={{color:'#ef4444'}}>● ERROR</div>
        <div className="status-title">Erro na operação do agente</div>
        <div className="status-sub">{errorMsg || 'Erro desconhecido — clique nos logs pra investigar.'}</div>
      </div>
      <div className="status-actions">
        <button className="btn-resume" onClick={resume}>🔄 Tentar novamente</button>
        <button className="btn-stop">📋 Ver logs</button>
      </div>
    </div>
  );
}

function AgentMetrics({ agent }) {
  const { metrics, queue, counts } = agent;
  return (
    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mt-4">

function AgentLogs({ agent }) {
  const { logs, clearLogs } = agent;
  const [filter, setFilter] = useState('all');
  const [autoScroll, setAutoScroll] = useState(true);
  const ref = useRef(null);

  useEffect(() => {
    if (autoScroll && ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [logs, autoScroll]);

  const visible = logs.filter(l => filter === 'all' || (filter === 'errors' && l.level === 'error') || (filter === 'success' && l.level === 'ok'));

  const exportLogs = () => {
    const text = logs.map(l => `[${l.time}] ${l.level.toUpperCase().padEnd(5)} ${l.msg}`).join('\n');
    const blob = new Blob([text], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `agente-logs-${Date.now()}.txt`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url); a.remove();}, 200);
  };

  return (
    <div className="card p-5">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 className="font-bold">Logs em tempo real</h3>
        <div className="flex gap-2 items-center flex-wrap">
          <div className="pill-toggle">
            <button className={filter==='all'?'active':''}     onClick={()=>setFilter('all')}>Tudo</button>
            <button className={filter==='success'?'active':''} onClick={()=>setFilter('success')}>Sucessos</button>
            <button className={filter==='errors'?'active':''}  onClick={()=>setFilter('errors')}>Erros</button>
          </div>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={()=>setAutoScroll(s=>!s)}>{autoScroll ? '⏸ Pausar scroll' : '▶ Auto-scroll'}</button>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={exportLogs}>📥 Exportar</button>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={clearLogs}>🧹 Limpar</button>
        </div>
      </div>
      <div className="log-terminal" ref={ref}>
        {visible.length === 0
          ? <div className="log-empty">Nenhum log {filter==='all'?'ainda':'desse tipo'}.</div>
          : visible.map(l => (
              <div key={l.id} className={`log-line log-${l.level}`}>
                <span className="log-time">[{l.time}]</span>
                <span className="log-level">{l.level.toUpperCase()}</span>
                <span className="log-msg">{l.msg}</span>
              </div>
            ))}
      </div>
    </div>
  );
}

// ===== Hook: publicação autônoma =====
function useAgente(){
  const [status, setStatus]       = useState(null);
  const [catalogo, setCatalogo]   = useState(null);
  const [busy, setBusy]           = useState(false);
  const [logs, setLogs]           = useState([]);
  const [modoTeste, setModoTeste] = useState(true);
  const [limiteDiario, setLimite] = useState(10);
  const [scoreMinimo, setScoreMin] = useState(60);

  const push = useCallback((linha) => {
    const ts = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    setLogs(prev => [{ ts, linha, id: Date.now()+Math.random() }, ...prev].slice(0, 50));
  }, []);

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    const h = ml?.access_token ? { 'Authorization':'Bearer '+ml.access_token } : {};
    try {
      const [sR, cR] = await Promise.all([
        fetch('/api/agente/status', { headers: h }),
        fetch('/api/agente/catalogo', { headers: h }),
      ]);
      const sJ = await sR.json().catch(()=>null);
      const cJ = await cR.json().catch(()=>null);
      if (sJ?.success) setStatus(sJ);
      if (cJ?.success) setCatalogo(cJ);
    } catch(_){}
  }, []);

  const publicarUm = useCallback(async (produtoId, teste) => {
    const ml = loadMLTokens();
    setBusy(true);
    const p = catalogo?.produtos?.find(x => x.id === produtoId);
    const tipo = teste ? 'TESTE' : 'REAL';
    if (p) push(`🤖 [${tipo}] Publicando: ${p.titulo} (score ${p.score})`);
    try {
      const r = await fetch('/api/agente/publicar', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+(ml?.access_token||''), 'Content-Type':'application/json' },
        body: JSON.stringify({ produtoId, modoTeste: !!teste }),
      });
      const d = await r.json().catch(()=>({ success:false }));
      if (d.success) {
        push(teste
          ? `✅ Preview gerado → R$ ${Number(d.produto?.preco||0).toFixed(2)}`
          : `✅ PUBLICADO no ML → ${d.mlbId} (R$ ${Number(d.preco||0).toFixed(2)})`);
      } else {
        push(`❌ Falhou: ${d.error || 'erro desconhecido'}`);
      }
      await refresh();
      return d;
    } catch(e){
      push(`❌ ${e.message}`);
      return { success:false, error:e.message };
    } finally { setBusy(false); }
  }, [catalogo, push, refresh]);

  const publicarLote = useCallback(async () => {
    const ml = loadMLTokens();
    setBusy(true);
    push(`🤖 Iniciando lote: limite=${limiteDiario}, score mín=${scoreMinimo}, modo=${modoTeste ? 'TESTE' : 'REAL'}`);
    try {
      const r = await fetch('/api/agente/publicar-lote', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+(ml?.access_token||''), 'Content-Type':'application/json' },
        body: JSON.stringify({ limiteDiario, scoreMinimo, modoTeste }),
      });
      const d = await r.json().catch(()=>({ success:false }));
      if (d.success) {
        push(`🤖 Lote: ${d.publicados}/${d.tentativas} publicados · restante hoje: ${d.limiteRestante}`);
        (d.resultados || []).forEach(rr => {
          if (rr.success) push(`  ✅ ${rr.produto} — R$ ${Number(rr.preco||0).toFixed(2)}`);
          else            push(`  ❌ ${rr.produto} — ${rr.error || 'falha'}`);
        });
      } else {
        push(`❌ Lote falhou: ${d.error || d.mensagem}`);
      }
      await refresh();
      return d;
    } catch(e){
      push(`❌ ${e.message}`);
      return { success:false, error:e.message };
    } finally { setBusy(false); }
  }, [limiteDiario, scoreMinimo, modoTeste, push, refresh]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 30_000);
    return () => clearInterval(id);
  }, [refresh]);

  return {
    status, catalogo, busy, logs,
    modoTeste, setModoTeste, limiteDiario, setLimite, scoreMinimo, setScoreMin,
    refresh, publicarUm, publicarLote,
  };
}

// ============================================================
// MLDestinationCard — card inline com fluxo semi-manual:
// (1) botão "Autorizar" abre auth.mercadolivre.com.br em nova aba
// (2) usuário cola o code recebido em ?code=
// (3) POST /api/ml/token → backend troca code por access_token
// (4) exibe nickname, user_id e expiração. Reconectar/Desconectar.
// ============================================================
function MLDestinationCard({mlTokens, setMlTokens, notif}){
  const [codeInput, setCodeInput] = useState('');
  const [busy, setBusy]           = useState(false);
  const [err, setErr]             = useState('');
  const [meData, setMeData]       = useState(null); // cache do /api/ml/me
  const [meLoading, setMeLoading] = useState(false);

  const authUrl = mlAuthUrl();
  const openAuth = () => {
    window.open(authUrl, '_blank', 'noopener,noreferrer,width=900,height=720');
  };

  // Ao conectar, faz um refresh live do /api/ml/me (validação real)
  useEffect(() => {
    if (!mlTokens || !mlTokens.access_token) { setMeData(null); return; }
    let cancelled = false;
    setMeLoading(true);
    mlFetchMe(mlTokens.access_token)
      .then(d => { if (!cancelled) setMeData(d); })
      .catch(() => {})
      .finally(() => { if (!cancelled) setMeLoading(false); });
    return () => { cancelled = true; };
  }, [mlTokens?.access_token]);

  const connect = async () => {
    const c = extractMLCode(codeInput);
    if (!c || c.length < 6) {
      setErr('Cole o code que aparece depois de ?code= na URL do Google (ou a URL inteira).');
      return;
    }
    setErr(''); setBusy(true);
    try {
      const tokens = await mlExchangeCode(c);
      saveMLTokens(tokens); setMlTokens(tokens); setCodeInput('');
      if (notif) notif.push(buildNotification('publicado',
        { ml_id: '✅ ML conectado · ' + (tokens.nickname || ('user ' + tokens.user_id)) }));
    } catch(e) {
      // invalid_grant = code expirado. Instruímos o usuário.
      const msg = e.message || '';
      if (/invalid[_ ]grant|expired|expirado/i.test(msg)) {
        setErr('⏰ O code expirou (válido por ~10 min). Clique em "Autorizar" novamente para gerar um novo.');
      } else {
        setErr('Falha ao conectar: ' + msg);
      }
    } finally { setBusy(false); }
  };

  const disconnect = () => {
    if (!confirm('Desconectar do Mercado Livre? Os tokens locais serão apagados.')) return;
    saveMLTokens(null); setMlTokens(null); setMeData(null); setErr('');
  };

  const reconnect = () => {
    // abre a tela de autorização + limpa input pra receber novo code
    setCodeInput(''); setErr('');
    openAuth();
  };

  // Calcula "expira em X horas" (humano)
  const expiresInText = (ts) => {
    if (!ts) return '—';
    const ms = ts - Date.now();
    if (ms <= 0) return 'expirado';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 1) return `${h}h ${m}min`;
    return `${m}min`;
  };

  const isConnected = !!(mlTokens && mlTokens.access_token);
  const nickname = (meData && meData.nickname) || (mlTokens && mlTokens.nickname) || null;

  return (
    <div className="card p-5 mb-4">
      <div className="flex items-end justify-between mb-4 flex-wrap gap-2">
        <div>
          <h3 className="font-bold text-lg">📤 Destino · Mercado Livre</h3>
          <p className="sub text-xs mt-1">
            {isConnected
              ? 'Para onde o agente publica os anúncios · OAuth2 ativo'
              : 'Autorize o app para o agente publicar os anúncios na sua conta ML'}
          </p>
        </div>
        <span className="chip" style={{color:'var(--green)',borderColor:'rgba(0,167,255,.4)'}}>
          <span className="dot" style={{background:'var(--green)'}}/>app #{ENV.ML_CLIENT_ID}
        </span>
      </div>

      {/* ================= ESTADO CONECTADO ================= */}
      {isConnected && (
        <div className="card2 p-5" style={{borderColor:'rgba(34,197,94,.3)'}}>
          <div className="flex items-center gap-4 flex-wrap">
            <div className="erp-logo ml" style={{width:56, height:56, fontSize:18}}>ML</div>
            <div className="flex-1 min-w-[240px]">
              <div className="font-bold">Mercado Livre</div>
              <div className="text-xs" style={{color:'#22c55e'}}>✅ Conectado</div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-3 text-[12px]">
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">Conta</div>
                  <div className="font-bold">
                    {meLoading ? <span className="sub">carregando…</span>
                                : (nickname || <span className="sub italic">—</span>)}
                  </div>
                </div>
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">User ID</div>
                  <div className="font-bold mono">{mlTokens.user_id}</div>
                </div>
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">Token expira em</div>
                  <div className="font-bold mono" style={{color: (mlTokens.expires_at - Date.now()) < 1800000 ? '#facc15' : '#22c55e'}}>
                    {expiresInText(mlTokens.expires_at)}
                  </div>
                </div>
              </div>
              {meData && meData.seller_reputation && meData.seller_reputation.level_id && (
                <div className="sub text-[11px] mt-2">
                  Reputação: <span className="mono" style={{color:'var(--green)'}}>{meData.seller_reputation.level_id}</span>
                  {meData.seller_reputation.power_seller_status &&
                    <> · <span className="mono">{meData.seller_reputation.power_seller_status}</span></>}
                </div>
              )}
            </div>
            <div className="flex gap-2 flex-wrap">
              <button className="btn-ghost" onClick={reconnect}>🔄 Reconectar</button>
              <button
                className="btn-ghost"
                style={{borderColor:'rgba(239,68,68,.4)', color:'#ef4444'}}
                onClick={disconnect}
              >🔌 Desconectar</button>
            </div>
          </div>
        </div>
      )}

      {/* ================= ESTADO DESCONECTADO ================= */}
      {!isConnected && (
        <div className="card2 p-5" style={{borderColor:'rgba(255,230,0,.3)'}}>
          <div className="flex items-center gap-3 mb-4">
            <div className="erp-logo ml" style={{width:56, height:56, fontSize:18}}>ML</div>
            <div>
              <div className="font-bold">Mercado Livre</div>
              <div className="text-xs" style={{color:'#ef4444'}}>❌ Desconectado</div>
            </div>
          </div>

          {/* Passo 1 */}
          <div className="mb-5">
            <div className="font-bold text-[13px] mb-2">
              <span style={{background:'var(--green)', color:'#fff', borderRadius:'50%', width:22, height:22, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, marginRight:8}}>1</span>
              Clique para autorizar o app no Mercado Livre
            </div>
            <button
              className="btn"
              style={{width:'auto', padding:'11px 22px'}}
              onClick={openAuth}
            >🔗 Autorizar no Mercado Livre</button>
            <div className="sub text-[11px] mt-2">
              Abre em nova aba · redirect para <span className="mono">{ENV.ML_REDIRECT_URI}</span>
            </div>
          </div>

          {/* Passo 2 */}
          <div className="mb-3">
            <div className="font-bold text-[13px] mb-2">
              <span style={{background:'var(--green)', color:'#fff', borderRadius:'50%', width:22, height:22, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, marginRight:8}}>2</span>
              Após autorizar, o sistema conecta automaticamente. Caso precise colar o código manualmente (fallback), use o campo abaixo:
            </div>
            <div className="flex gap-2 flex-wrap">
              <input
                className="input mono text-[12px]"
                style={{flex:1, minWidth:240}}
                placeholder="TG-69e1724d6e92ed000191d3c6..."
                value={codeInput}
                onChange={e => setCodeInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !busy) connect(); }}
              />
              <button
                className="btn"
                style={{width:'auto', padding:'11px 22px'}}
                onClick={connect}
                disabled={busy || !codeInput.trim()}
              >{busy ? '🔄 Conectando…' : '🔌 Conectar'}</button>
            </div>
            <div className="sub text-[11px] mt-2">
              💡 Pode colar a URL inteira — extraímos o <span className="mono">code</span> automaticamente.
              O code expira em ~10 min.
            </div>
          </div>

          {err && <div className="err mt-3 text-xs whitespace-pre-line">{err}</div>}
        </div>
      )}
    </div>
  );
}

// ============================================================
// BlingOAuthCard — 3 estados:
//   (1) server sem BLING_CLIENT_ID  → "Aguardando configuração"
//   (2) server OK, sem tokens       → Passo 1 (autorizar) + Passo 2 (colar code)
//   (3) conectado                   → produtos, sync, desconectar
// ============================================================
function BlingOAuthCard({notif}){
  const [cfg, setCfg]           = useState(null);   // {configured, redirect_uri, client_id_preview}
  const [tokens, setTokens]     = useState(() => loadBlingTokens());
  const [codeInput, setCodeInput] = useState('');
  const [busy, setBusy]         = useState(false);
  const [err, setErr]           = useState('');
  const [produtos, setProdutos] = useState(null); // { total, produtos[] }
  const [syncing, setSyncing]   = useState(false);
  const [lastSync, setLastSync] = useState(tokens?.last_sync || null);

  // Carrega status do server na montagem
  useEffect(() => {
    let live = true;
    blingConfigStatus().then(d => { if (live) setCfg(d); });
    return () => { live = false; };
  }, []);

  // Se tem tokens, puxa produtos automaticamente (sync inicial)
  useEffect(() => {
    if (!tokens?.access_token) { setProdutos(null); return; }
    if (produtos) return;
    syncProdutos(true);
  }, [tokens?.access_token]);

  const syncProdutos = async (silent=false) => {
    if (!tokens?.access_token) return;
    if (!silent) setSyncing(true);
    const r = await blingFetchProdutos({ page:1, limit:100 });
    if (r.success) {
      setProdutos(r);
      const ts = Date.now();
      setLastSync(ts);
      saveBlingTokens({ ...tokens, last_sync: ts });
      if (!silent && notif) notif.push(buildNotification('publicado', { ml_id: `🔄 Bling sincronizado • ${r.total} produtos` }));
    } else {
      setErr('Falha ao buscar produtos: ' + (r.error || 'erro desconhecido'));
    }
    if (!silent) setSyncing(false);
  };

  const openAuth = async () => {
    setErr('');
    const r = await blingGetAuthUrl();
    if (!r.success || !r.url) { setErr(r.error || 'Falha ao gerar URL'); return; }
    window.open(r.url, '_blank', 'noopener,noreferrer,width=900,height=720');
  };

  const connect = async () => {
    const c = extractBlingCode(codeInput);
    if (!c || c.length < 4) { setErr('Cole o code recebido do Bling (ou a URL inteira).'); return; }
    setErr(''); setBusy(true);
    const r = await blingExchangeCode(c);
    setBusy(false);
    if (!r.success) {
      const msg = r.error || '';
      if (/invalid[_ ]grant|expir|expirado/i.test(msg)) {
        setErr('⏰ Code expirado/usado — clique em "Autorizar no Bling" novamente.');
      } else {
        setErr('Falha ao conectar: ' + msg);
      }
      return;
    }
    saveBlingTokens(r); setTokens(loadBlingTokens()); setCodeInput('');
    if (notif) notif.push(buildNotification('publicado', { ml_id: '✅ Bling conectado' }));
  };

  const disconnect = () => {
    if (!confirm('Desconectar do Bling? Os tokens locais serão apagados (produtos já puxados ficam em cache da sessão).')) return;
    saveBlingTokens(null); setTokens(null); setProdutos(null); setLastSync(null); setErr('');
  };

  const fmtDateFull = (ts) => {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR').slice(0,5);
  };

  // ========== ESTADO 1: servidor não configurado ==========
  if (cfg && !cfg.configured) {
    return (
      <div className="erp-card" style={{borderColor:'rgba(234,179,8,.4)'}}>
        <div className="flex items-center gap-3">
          <div className="erp-logo bling">B</div>
          <div>
            <div className="font-bold text-sm">Bling ERP</div>
            <div className="erp-status" style={{color:'#facc15'}}>⚙️ Aguardando configuração</div>
          </div>
        </div>
        <p className="sub text-xs" style={{lineHeight:1.5}}>
          O administrador precisa criar o app Bling em <span className="mono" style={{color:'var(--green)'}}>developer.bling.com.br</span> e preencher <span className="mono">BLING_CLIENT_ID</span> + <span className="mono">BLING_CLIENT_SECRET</span> no <span className="mono">.env</span> do servidor.
        </p>
        <div className="card2 p-2 text-[11px]">
          <div className="flex justify-between">
            <span className="sub">Client ID:</span>
            <span className="mono" style={{color:'#ef4444'}}>❌ Não configurado</span>
          </div>
          {cfg.redirect_uri && <div className="flex justify-between mt-1">
            <span className="sub">Redirect:</span>
            <span className="mono text-[10px]">{cfg.redirect_uri}</span>
          </div>}
        </div>
      </div>
    );
  }

  // ========== ESTADO 3: conectado ==========
  if (tokens?.access_token) {
    const total = produtos?.total ?? null;
    return (
      <div className="erp-card" style={{borderColor:'rgba(34,197,94,.4)'}}>
        <div className="flex items-center gap-3">
          <div className="erp-logo bling">B</div>
          <div>
            <div className="font-bold text-sm">Bling ERP</div>
            <div className="erp-status ok">✅ Conectado</div>
          </div>
        </div>
        <div className="text-xs space-y-1">
          <div className="flex justify-between"><span className="sub">Produtos encontrados</span>
            <span className="mono font-bold" style={{color:'var(--green)'}}>
              {total !== null ? total.toLocaleString('pt-BR') : (syncing ? '…' : '—')}
            </span>
          </div>
          <div className="flex justify-between"><span className="sub">Último sync</span>
            <span className="mono text-[11px]">{fmtDateFull(lastSync)}</span>
          </div>
          <div className="flex justify-between"><span className="sub">Token expira</span>
            <span className="mono text-[11px]">{tokens.expires_at ? fmtDateFull(tokens.expires_at) : '—'}</span>
          </div>
        </div>
        <div className="flex gap-1 mt-3 flex-wrap">
          <button className="btn-ghost text-[11px] px-2 py-1" onClick={() => syncProdutos(false)} disabled={syncing}>{syncing?'🔄 ...':'🔄 Sincronizar'}</button>
          <button className="btn-ghost text-[11px] px-2 py-1" onClick={disconnect} style={{borderColor:'rgba(239,68,68,.4)', color:'#ef4444'}}>Desconectar</button>
        </div>
        {err && <div className="err mt-2 text-[11px]">{err}</div>}
      </div>
    );
  }

  // ========== ESTADO 2: configurado mas desconectado ==========
  return (
    <div className="erp-card featured" style={{borderColor:'rgba(255,176,32,.5)'}}>
      <div className="erp-popular">⭐ FONTE PRINCIPAL</div>
      <div className="flex items-center gap-3">
        <div className="erp-logo bling">B</div>
        <div>
          <div className="font-bold text-sm">Bling ERP</div>
          <div className="erp-status no">❌ Desconectado</div>
        </div>
      </div>

      <div className="text-[11px] mb-1">
        <span className="font-bold">Passo 1:</span> autorize o app no Bling
      </div>
      <button className="btn" style={{padding:'9px 12px', fontSize:12}} onClick={openAuth}>🔗 Autorizar no Bling</button>

      <div className="text-[11px] mt-3 mb-1">
        <span className="font-bold">Passo 2:</span> cole o code da URL aqui
      </div>
      <div className="flex gap-1">
        <input
          className="input mono text-[11px]"
          style={{padding:'8px 10px', flex:1, minWidth:0}}
          placeholder="code="
          value={codeInput}
          onChange={e => setCodeInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !busy) connect(); }}
        />
        <button
          className="btn"
          style={{padding:'8px 12px', fontSize:11, width:'auto'}}
          onClick={connect}
          disabled={busy || !codeInput.trim()}
        >{busy ? '...' : 'Conectar'}</button>
      </div>
      {err && <div className="err mt-2 text-[11px] whitespace-pre-line">{err}</div>}
    </div>
  );
}

function IntegracoesPage({agent, notif}){

// ============================================================
// CSV — parser e gerador minimalistas (sem dependências)
// ============================================================
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').split('\n').filter(l => l.trim().length > 0);
  if (lines.length === 0) return { headers:[], rows:[] };
  const split = (l) => {
    const out = []; let cur = ''; let q = false;
    for (let i=0; i<l.length; i++) {
      const c = l[i];
      if (c === '"') { q = !q; continue; }
      if (c === ',' && !q) { out.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    out.push(cur.trim());
    return out;
  };
  const headers = split(lines[0]).map(h => h.toLowerCase().replace(/\s+/g,'_'));
  const rows = lines.slice(1).map(l => {
    const cols = split(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i] || '');
    return obj;
  });
  return { headers, rows };
}

function downloadCSV(filename, headers, rows) {
  const esc = (v) => {
    const s = String(v ?? '');
    return /[,"\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const lines = [headers.join(',')];
  rows.forEach(r => lines.push(headers.map(h => esc(r[h])).join(',')));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}

// Validador de produto — retorna {ok, warns, errors}
function validateProduct(p) {
  const errors = [], warns = [];
  if (!p.sku || !p.sku.trim())          errors.push('SKU obrigatório');
  if (!p.nome || !p.nome.trim())        errors.push('Nome obrigatório');
  if (!p.custo || isNaN(parseFloat(p.custo))) errors.push('Custo inválido');
  if (!p.marca)                          warns.push('Marca não preenchida');
  if (!p.gtin)                           warns.push('GTIN ausente (recomendado)');
  if (!p.compatibilidades || (Array.isArray(p.compatibilidades) && p.compatibilidades.length === 0))
    warns.push('Sem compatibilidades de veículo');
  return { ok: errors.length === 0, warns, errors };
}

// ============================================================
// useAgentStore — estado global do agente (produtos, fila, logs, status)
// ============================================================
function useAgentStore({ notif } = {}) {
  const [products, setProducts] = useState([]);  // [{sku,nome,marca,...,status,mlId}]
  const [status, setStatus]     = useState('idle'); // idle|running|paused|error
  const [queue, setQueue]       = useState([]);
  const [logs, setLogs]         = useState([]);
  const [config, setConfig]     = useState({
    speed: 'normal',           // slow|normal|fast
    mode: 'auto',              // auto|review|test
    startHour: 8, endHour: 20,
    weekendsPaused: true,
    actions: { publish:true, repricing:true, faq:true, pause:false, remove:false },
  });
  const [metrics, setMetrics]   = useState({ publishedToday: 0, errors: 0, totalTimeMs: 0, totalProcessed: 0 });
  const [errorMsg, setErrorMsg] = useState(null);
  const startedAt = useRef(null);

  const log = useCallback((level, msg) => {
    const ts = new Date();
    const time = ts.toTimeString().slice(0,8);
    setLogs(prev => [...prev, { id: ts.getTime() + Math.random(), time, level, msg }].slice(-300));
  }, []);

  const addProducts = useCallback((arr) => {
    setProducts(prev => {
      const skus = new Set(prev.map(p => p.sku));
      const novos = arr.filter(p => !skus.has(p.sku)).map(p => ({ ...p, status: p.status || 'aguardando' }));
      return [...prev, ...novos];
    });
  }, []);
  const updateProduct = useCallback((sku, patch) => setProducts(prev => prev.map(p => p.sku === sku ? { ...p, ...patch } : p)), []);
  const removeProducts = useCallback((skus) => {
    const set = new Set(skus);
    setProducts(prev => prev.filter(p => !set.has(p.sku)));
  }, []);
  const clearLogs = useCallback(() => setLogs([]), []);

  // Tick do simulador — processa um item da fila a cada N ms (depende de speed)
  useEffect(() => {
    if (status !== 'running') return;
    const speedMs = config.speed === 'slow' ? 4500 : config.speed === 'fast' ? 1400 : 2400;
    const id = setInterval(() => {
      setQueue(prev => {
        if (prev.length === 0) {
          setStatus('idle');
          log('info', '✓ Fila vazia — agente entrou em IDLE.');
          return prev;
        }
        const [task, ...rest] = prev;
        const t0 = Date.now();
        // 7% de chance de erro pra parecer realista
        const fail = Math.random() < 0.07;
        if (fail) {
          log('error', `❌ ${task.action} falhou: ${task.label} — API timeout`);
          setMetrics(m => ({ ...m, errors: m.errors + 1, totalProcessed: m.totalProcessed + 1, totalTimeMs: m.totalTimeMs + (Date.now()-t0) }));
          // 50% chance de reagendar pro fim da fila
          if (Math.random() < 0.5) return [...rest, { ...task, retry: (task.retry||0)+1 }];
          return rest;
        }
        // sucesso
        const mlId = 'MLB' + (3920000 + Math.floor(Math.random()*99999));
        log('info',  `⚡ Processando: ${task.sku}`);
        log('info',  `✨ Título gerado (foco: ${['SEO','Aplicação','Benefício','Oferta'][Math.floor(Math.random()*4)]})`);
        log('ok',    `✅ Publicado → ${mlId} (${task.label})`);
        setProducts(p => p.map(prod => prod.sku === task.sku ? { ...prod, status:'publicado', mlId } : prod));
        setMetrics(m => ({ ...m, publishedToday: m.publishedToday + 1, totalProcessed: m.totalProcessed + 1, totalTimeMs: m.totalTimeMs + (Date.now()-t0) }));
        // dispara notificação (alterna entre publicado e venda)
        if (notif && notif.push) {
          if (Math.random() < 0.35) notif.push(buildNotification('venda', { valor: 100 + Math.random()*400, produto: task.label, comprador: 'Cliente Mock' }));
          else                       notif.push(buildNotification('publicado', { ml_id: mlId }));
        }
        return rest;
      });
    }, speedMs);
    return () => clearInterval(id);
  }, [status, config.speed, log, notif]);

  // ações
  const buildQueueFromProducts = useCallback((only) => {
    const pending = products.filter(p => only ? only.includes(p.sku) : (p.status === 'aguardando' || !p.status));
    return pending.map(p => ({
      id: 'q_'+p.sku+'_'+Math.random().toString(36).slice(2,6),
      sku: p.sku,
      action: 'Publicar',
      label: p.nome || p.sku,
      eta: 2 + Math.floor(Math.random() * 14),
    }));
  }, [products]);

  const start = useCallback(() => {
    if (status === 'running') return;
    if (queue.length === 0) {
      const newQueue = buildQueueFromProducts();
      if (newQueue.length === 0) {
        log('warn', '⚠️ Nenhum produto aguardando. Cadastre produtos antes de iniciar.');
        return;
      }
      setQueue(newQueue);
    }
    startedAt.current = Date.now();
    setStatus('running');
    setErrorMsg(null);
    log('info', '🚀 Agente iniciado');
    log('info', `⚙️ Modo: ${config.mode} · Velocidade: ${config.speed}`);
  }, [status, queue, buildQueueFromProducts, config, log]);

  const pause = useCallback(() => { setStatus('paused'); log('warn', '⏸ Agente pausado pelo usuário'); }, [log]);
  const resume = useCallback(() => { setStatus('running'); log('info', '▶ Agente retomado'); }, [log]);
  const stop  = useCallback(() => { setStatus('idle'); setQueue([]); log('warn', '⏹ Agente parado pelo usuário (fila descartada)'); }, [log]);
  const panic = useCallback(() => { setStatus('idle'); setQueue([]); log('error', '🛑 PARADA DE EMERGÊNCIA acionada'); }, [log]);
  const restart = useCallback(() => {
    setStatus('idle'); setQueue([]); setErrorMsg(null);
    log('info', '🔄 Reiniciando agente...');
    setTimeout(() => {
      const newQueue = buildQueueFromProducts();
      if (newQueue.length > 0) {
        setQueue(newQueue);
        setStatus('running');
        log('info', '🚀 Agente iniciado (após reset)');
      }
    }, 250);
  }, [buildQueueFromProducts, log]);

  const triggerError = useCallback(() => {
    setStatus('error');
    setErrorMsg('API do Mercado Livre retornou 503 (rate limit). Aguarde alguns segundos.');
    log('error', '🔴 Status do agente: ERROR — clique em "Tentar novamente" pra retomar');
  }, [log]);

  // ============================================================
  // startBlingToML — fluxo REAL: puxa Bling, ranqueia, publica no ML
  // 1) GET /api/bling/produtos
  // 2) Score via finalScore() + pesos atuais
  // 3) Filtra score >= criteria.scoreMin e limita a criteria.perDay
  // 4) POST /api/publicar (um por vez, log/progresso em tempo real)
  // 5) Atualiza produtos locais com status publicado/erro
  // ============================================================
  const startBlingToML = useCallback(async () => {
    if (status === 'running') { log('warn','Agente já está rodando'); return; }
    const bling = loadBlingTokens(); const ml = loadMLTokens();
    if (!bling?.access_token) { log('error','❌ Bling não conectado — conecte em 🔌 Integrações'); return; }
    if (!ml?.access_token)    { log('error','❌ Mercado Livre não conectado — conecte em 🔌 Integrações'); return; }

    setStatus('running'); setErrorMsg(null);
    startedAt.current = Date.now();
    log('info','🚀 Agente REAL iniciado — Bling → Mercado Livre');

    // 1) Puxa catálogo Bling
    log('info','📥 Buscando produtos no Bling…');
    const blingResp = await blingFetchProdutos({ page:1, limit:100 });
    if (!blingResp.success) {
      log('error','❌ Falha Bling: ' + (blingResp.error||'erro desconhecido'));
      setStatus('idle'); return;
    }
    const list = blingResp.produtos || [];
    log('ok', `✓ Bling: ${list.length} produto(s) encontrados`);

    // 2) Score — adapta dados do Bling pro shape que finalScore() espera
    const criteriaNow = loadCriteria();
    const scored = list.map(p => {
      const precoNum = Number(p.preco) || 0;
      const custoNum = Number(p.precoCusto) || precoNum * 0.7;
      const margem   = precoNum > 0 ? (precoNum - custoNum) / precoNum : 0;
      const estoque  = Number(p.estoqueSaldo) || 0;
      const synthetic = {
        sku: p.codigo || String(p.id),
        nome: p.nome,
        marca: p.marca?.nome || '',
        categoria: p.tipo || 'Geral',
        vendas30d: Math.min(50, Math.floor(Math.random()*30) + 5), // sem histórico ML ainda, usa estimativa
        estoque,
        margem: Math.max(0.05, Math.min(0.6, margem)),
        diasUltima: Math.floor(Math.random()*14) + 1,
        completude: (p.gtin ? 20 : 0) + (p.marca ? 15 : 0) + (p.descricaoCurta ? 15 : 0) + 40,
        categoriaEstrategica: false,
        statusML: 'no_ml',
      };
      const score = finalScore(synthetic, criteriaNow.weights);
      return { ...p, _synthetic: synthetic, score };
    });

    // 3) Filtra + ordena + limita
    const elegiveis = scored
      .filter(p => p.score >= criteriaNow.scoreMin && (p.situacao === 'A' || !p.situacao))
      .sort((a,b) => b.score - a.score)
      .slice(0, criteriaNow.perDay || 15);

    if (elegiveis.length === 0) {
      log('warn', `⚠️ Nenhum produto passou no filtro (score ≥ ${criteriaNow.scoreMin}). Ajuste em 🔌 Integrações.`);
      setStatus('idle'); return;
    }
    log('info', `🎯 ${elegiveis.length} produto(s) selecionados (top scores: ${elegiveis.slice(0,3).map(p=>p.score).join(', ')})`);

    // Popula a fila visual
    const tasks = elegiveis.map(p => ({
      id: 'q_b_'+p.id+'_'+Math.random().toString(36).slice(2,5),
      sku: p._synthetic.sku, action:'Publicar', label: p.nome, eta: 3,
      _realId: p.id, _score: p.score,
    }));
    setQueue(tasks);

    // 4) Publica 1 por 1
    let ok = 0, fail = 0;
    for (let i = 0; i < elegiveis.length; i++) {
      const p = elegiveis[i];
      log('info', `⚡ [${i+1}/${elegiveis.length}] score=${p.score} · ${p.nome}`);

      // 📝 Preview SEO antes de publicar (ajuda a diagnosticar duplicidades)
      try {
        const ml = loadMLTokens();
        const seoResp = await fetch('/api/seo/gerar-completo', {
          method:'POST',
          headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
          body: JSON.stringify({
            nome: p.nome,
            marca: p.marca?.nome || '',
            partNumber: p.codigo || '',
          }),
        });
        const seoData = await seoResp.json().catch(()=>({}));
        if (seoData.success && seoData.titulos) {
          log('info', `📝 Gerando SEO para "${p.nome.slice(0,40)}..."`);
          seoData.titulos.forEach(t => {
            const mark = seoData.recomendacao?.titulo?.variacao === t.variacao ? '✅' : '  ';
            log('info', `📝 ${mark} Título ${t.variacao}: "${t.titulo}" (${t.chars}ch)`);
          });
          if (seoData.duplicidade) {
            log(seoData.duplicidade.duplicado ? 'warn' : 'info',
              `📝 Anti-duplicidade: ${seoData.duplicidade.aviso}`);
          }
          if (seoData.recomendacao) {
            log('ok', `📝 Usando variação ${seoData.recomendacao.titulo.variacao} · ${seoData.recomendacao.motivo}`);
          }
        }
      } catch(_) {}

      try {
        const r = await publishBlingToML(p.id);
        if (r.success) {
          ok++;
          log('ok', `✅ Publicado → ${r.ml_item_id} · ${r.permalink || ''}`);
          setProducts(prev => prev.map(pr => pr.sku === p._synthetic.sku ? { ...pr, status:'publicado', mlId: r.ml_item_id } : pr));
          setMetrics(m => ({ ...m, publishedToday: m.publishedToday + 1, totalProcessed: m.totalProcessed + 1 }));
          if (notif && notif.push) notif.push(buildNotification('publicado', { ml_id: r.ml_item_id }));

          // 🚗 Resolve compatibilidade automaticamente (fire-and-forget, sem bloquear fila)
          (async (mlId, titulo) => {
            try {
              await new Promise(r => setTimeout(r, 3500)); // ML precisa indexar
              const ml = loadMLTokens();
              if (!ml?.access_token) return;
              const cr = await fetch('/api/ml/compat/auto-resolver', {
                method:'POST',
                headers:{ 'Authorization': 'Bearer ' + ml.access_token, 'Content-Type':'application/json' },
                body: JSON.stringify({ itemId: mlId }),
              });
              const cd = await cr.json().catch(()=>({}));
              if (cd.sucesso) {
                log('ok', `🚗 Compat ${mlId} aplicada via ${cd.metodo}${cd.resumo?` — ${cd.resumo}`:''} ✅`);
              } else {
                log('warn', `🚗 Compat ${mlId} pendente — aguardando sugestões do ML ⚠️`);
              }
            } catch(e) {
              log('error', `🚗 Compat ${mlId} erro: ${e.message}`);
            }
          })(r.ml_item_id, p.nome);
        } else {
          fail++;
          log('error', `❌ Falhou: ${r.error || 'erro'}`);
          setMetrics(m => ({ ...m, errors: m.errors + 1, totalProcessed: m.totalProcessed + 1 }));
        }
      } catch(e) {
        fail++;
        log('error', `❌ Exceção: ${e.message}`);
      }
      // Remove da fila visual
      setQueue(q => q.filter(t => t._realId !== p.id));
      // throttle 1s (ML rate-limit). /api/publicar é single-shot; throttle aqui no cliente.
      if (i < elegiveis.length - 1) await new Promise(r => setTimeout(r, 1000));
    }

    log('info', `🏁 Concluído — ${ok} publicado(s), ${fail} erro(s)`);
    setStatus('idle');
  }, [status, log, notif, setQueue, setProducts, setStatus, setMetrics]);

  // contadores derivados
  const counts = useMemo(() => ({
    total:     products.length,
    aguardando: products.filter(p => (p.status||'aguardando') === 'aguardando').length,
    publicados: products.filter(p => p.status === 'publicado').length,
    pausados:  products.filter(p => p.status === 'pausado').length,
    erros:     products.filter(p => p.status === 'erro').length,
  }), [products]);

  const avgTimeMs = metrics.totalProcessed > 0 ? Math.round(metrics.totalTimeMs / metrics.totalProcessed) : 0;

  return {
    products, addProducts, updateProduct, removeProducts, counts,
    status, queue, setQueue, logs, log, clearLogs,
    config, setConfig, metrics: { ...metrics, avgTimeMs },
    errorMsg, triggerError,
    start, pause, resume, stop, panic, restart,
    startBlingToML,
  };
}

// ============================================================
// MASCOTE — imagem PNG externa com overlay de badge, caixinha e caption
// Caminhos tentados, em ordem:
//   1. /public/mascote-leao.png  (padrão Next.js — caminho preferido pela spec)
//   2. /mascote-leao.png         (raiz do projeto — fallback p/ compat)
//   3. /leao-ref.jpg             (fallback com mix-blend-mode: screen)
//   4. placeholder com instruções
// ============================================================
function Mascot(){
  // Estados: 'publicPng' → 'rootPng' → 'jpg' → 'none'
  const [src, setSrc] = useState('publicPng');
  const handleError = () => setSrc(s =>
    s === 'publicPng' ? 'rootPng' :
    s === 'rootPng'   ? 'jpg'     :
                        'none'
  );
  const srcUrl =
    src === 'publicPng' ? '/public/mascote-leao.png' :
    src === 'rootPng'   ? '/mascote-leao.png'        :
                          '/leao-ref.jpg';
  // PNGs (public ou raiz) assumidos como já limpos; só o JPG precisa de screen+mask
  const isClean = src === 'publicPng' || src === 'rootPng';

  // partículas verdes flutuando ao redor — posições aleatórias mas estáveis
  const particles = [
    {left:'10%', top:'20%', delay:'0s'},
    {left:'85%', top:'30%', delay:'1.2s'},
    {left:'20%', top:'70%', delay:'2.4s'},
    {left:'78%', top:'65%', delay:'0.8s'},
    {left:'50%', top:'10%', delay:'3.2s'},
    {left:'5%',  top:'50%', delay:'1.8s'},
  ];
  return (
    <div className="mascote-box">
      <div style={{position:'relative'}}>
        <RevenueBackdrop/>
        {src !== 'none' ? (
          <img
            key={src}
            src={srcUrl}
            alt="Mascote AM — Agente Marketplace"
            className={`mascote-login ${isClean ? 'is-clean' : 'needs-mask'}`}
            onError={handleError}
          />
        ) : (
          <div className="mascote-placeholder">
            <div style={{fontSize:'64px'}}>🦁</div>
            <p className="font-bold" style={{color:'var(--green)'}}>Mascote não encontrado</p>
            <p className="sub text-xs">
              Salve o PNG (fundo preto ou transparente) em:
            </p>
            <code className="mono text-[10px]" style={{color:'var(--green)',wordBreak:'break-all',padding:'6px 10px',background:'var(--card)',borderRadius:'6px'}}>
              /public/mascote-leao.png
            </code>
            <p className="sub text-[10px]" style={{lineHeight:1.4}}>
              pasta absoluta:<br/>
              <span className="mono">C:\Users\User\Desktop\claude code\public\</span>
            </p>
            <p className="sub text-[10px]">(também aceita o arquivo na raiz: <span className="mono">/mascote-leao.png</span>)</p>
            <p className="text-xs" style={{color:'var(--green)'}}>↻ depois atualize a página</p>
          </div>
        )}
        {/* Badge "AM" no canto */}
        <div className="mascote-badge">AM</div>
        {/* Caixa de Entrega Expressa — SVG isométrica */}
        <DeliveryBox/>
        {/* Partículas brilhando ao redor */}
        {particles.map((p,i)=>(
          <span key={i} className="mascote-particle" style={{left:p.left,top:p.top,animationDelay:p.delay}}/>
        ))}
      </div>
      <p className="mascote-caption">SEU AGENTE DE FATURAMENTO</p>
    </div>
  );
}

function Signup({onGo, onSignup}){
  const [name,setName] = useState('');
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [pw2,setPw2] = useState('');
  const [store,setStore] = useState('');
  const [accept,setAccept] = useState(false);
  const [err,setErr] = useState('');
  const [pwFocus,setPwFocus] = useState(false);

  const strength = useMemo(()=>{
    if (!pw) return {level:0,label:'',color:''};
    let s = 0;
    if (pw.length >= 6) s++;
    if (pw.length >= 10) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^a-zA-Z0-9]/.test(pw)) s++;
    if (s<=2) return {level:1,label:'fraca',color:'var(--red)'};
    if (s<=3) return {level:2,label:'média',color:'var(--yellow)'};
    return {level:3,label:'forte',color:'var(--green)'};
  },[pw]);

  const [loading,setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setErr('Email inválido');
    if (pw.length < 6) return setErr('Senha precisa ter no mínimo 6 caracteres');
    if (pw !== pw2) return setErr('As senhas não coincidem');
    if (!accept) return setErr('Você precisa aceitar os termos de uso');
    setLoading(true);
    try {
      await apiSignup({ name, email, password:pw, store });
      onSignup(email);
    } catch(ex) {
      setErr(ex.message);
    } finally { setLoading(false); }
  };

  return (
    <AuthShell title="Criar Conta" subtitle="Registre-se para operar o agente" eyesCovered={pwFocus}
      footerContent={
        <p className="text-center sub text-xs mt-5">
          Já tem conta? <span className="link" onClick={()=>onGo('login')}>Faça login</span>
        </p>
      }>
      {err && <div className="err mb-4">{err}</div>}
      <form onSubmit={submit} className="space-y-3">
        <div><label className="label">Nome completo</label><input className="input" value={name} onChange={e=>setName(e.target.value)} required/></div>
        <div><label className="label">Email</label><input type="email" className="input" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
        <div>
          <label className="label">Senha</label>
          <input type="password" className="input" value={pw} onChange={e=>setPw(e.target.value)} onFocus={()=>setPwFocus(true)} onBlur={()=>setPwFocus(false)} required/>
          {pw && (
            <div className="flex items-center gap-2 mt-2">
              <div className="flex-1 h-1 rounded-full bg-[var(--line)] overflow-hidden">
                <div style={{width:`${strength.level*33.3}%`,height:'100%',background:strength.color,transition:'.2s'}}/>
              </div>
              <span className="text-[11px] mono" style={{color:strength.color}}>{strength.label}</span>
            </div>
          )}
        </div>
        <div><label className="label">Confirmar senha</label><input type="password" className="input" value={pw2} onChange={e=>setPw2(e.target.value)} onFocus={()=>setPwFocus(true)} onBlur={()=>setPwFocus(false)} required/></div>

        </div>

// Painel lateral com histórico
function NotificationsPanel({ open, onClose, history, onMarkAllRead, onMarkRead, onClear }) {
  const [filter, setFilter] = useState('all');
  if (!open) return null;

  const filtered = history.filter(n => {
    if (filter === 'all') return true;
    if (filter === 'vendas')    return n.type === 'venda';
    if (filter === 'perguntas') return n.type === 'pergunta';
    if (filter === 'alertas')   return n.type === 'alerta' || n.type === 'problema';
    return true;
  });

  const unread = history.filter(n => !n.read).length;

  return (
    <>
      <div className="notif-overlay" onClick={onClose}/>
      <aside className="notif-panel" role="dialog" aria-label="Histórico de notificações">
        <header>
          <div>
            <h3 className="font-bold text-base">Notificações</h3>
            <p className="sub text-xs mt-0.5">{unread} não {unread===1?'lida':'lidas'} · {history.length} no total</p>
          </div>
          <div className="flex items-center gap-2">
            <button className="btn-ghost" onClick={onMarkAllRead} style={{padding:'6px 10px',fontSize:12}} disabled={unread===0}>Marcar todas como lidas</button>
            <button className="notif-close" style={{position:'static'}} onClick={onClose} aria-label="Fechar painel">×</button>
          </div>
        </header>
        <div className="filters">
          {[['all','Todas'],['vendas','Vendas'],['perguntas','Perguntas'],['alertas','Alertas']].map(([k,lbl])=>(
            <button key={k} className={`filter-chip ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{lbl}</button>
          ))}
        </div>
        <div className="list">
          {filtered.length === 0 ? (
            <div className="notif-empty">
              <div style={{fontSize:32,marginBottom:8}}>🔕</div>
              Nenhuma notificação {filter !== 'all' ? `em "${filter}"` : 'ainda'}.
            </div>
          ) : (
            filtered.map(n => (
              <div key={n.id} className={`notif-row ${!n.read?'unread':''}`} onClick={()=>onMarkRead(n.id)}>
                <div className="notif-icon">{n.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="row-title">{n.title}</div>
                  <div className="row-msg">{n.message}</div>
                  {n.extra && <div className="row-msg" style={{opacity:.7}}>{n.extra}</div>}
                  <div className="row-time">{timeAgo(n.ts)}</div>
                </div>
                {!n.read && <div className="unread-dot" title="Não lida"/>}
              </div>
            ))
          )}
        </div>
        <div className="panel-footer">
          <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={onClear} disabled={history.length===0}>Limpar tudo</button>
          <span className="text-xs sub mono">histórico local · {history.length}/100</span>
        </div>
      </aside>
    </>
  );
}

function ProfileDropdown({ user, onLogout, onGoTo, onOpenNotifPanel }) {
  const [open, setOpen] = useState(false);
  const [submenu, setSubmenu] = useState(null); // 'theme' | 'lang' | null
  const [modal, setModal] = useState(null);     // 'account'|'integ'|'support'|'feedback'|'bug'|'logout'|null
  const [theme, setTheme] = useState(() => localStorage.getItem(THEME_KEY) || 'dark');
  const [lang, setLang]   = useState(() => localStorage.getItem(LANG_KEY)  || 'pt');
  const wrapperRef = useRef(null);

  const initial = (user.name||user.email||'?')[0].toUpperCase();
  const close = useCallback(() => { setOpen(false); setSubmenu(null); }, []);

  // Fecha ao clicar fora + ESC
  useEffect(() => {
    if (!open) return;
    const onClickOut = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) close();
    };
    const onEsc = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('mousedown', onClickOut);
    document.addEventListener('keydown', onEsc);
    return () => {
      document.removeEventListener('mousedown', onClickOut);
      document.removeEventListener('keydown', onEsc);
    };
  }, [open, close]);

  const themeLabels = { dark:'Escuro', light:'Claro', auto:'Automático' };
  const langLabels  = { pt:'Português', en:'English', es:'Español' };

  const pickTheme = (t) => { setTheme(t); localStorage.setItem(THEME_KEY, t); setSubmenu(null); };
  const pickLang  = (l) => { setLang(l);  localStorage.setItem(LANG_KEY,  l); setSubmenu(null); };

  const go = (action) => { close(); action && action(); };

  return (
    <>
      <div className="profile-wrapper" ref={wrapperRef}>
        <button
          className={`profile-trigger ${open?'open':''}`}
          onClick={() => setOpen(o => !o)}
          aria-haspopup="menu" aria-expanded={open}
        >
          <div className="avatar">{initial}</div>
          <div className="name-block">
            <div className="nm">{user.name||'Operador'}</div>
            <div className="em">{user.email}</div>
          </div>
          <svg className="chev" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>

        {open && (
          <div className="profile-dropdown" role="menu">
            {/* SEÇÃO 1 — CABEÇALHO */}
            <div className="dropdown-header">
              <div className="avatar-lg">{initial}</div>
              <div className="info">
                <div className="nm">{user.name||'Operador'}</div>
                <div className="em">{user.email}</div>
                <div className="pl">
                  <span className="badge-plan">FREE</span>
                  <a onClick={() => go(() => setModal('plan'))}>Ver assinatura</a>
                </div>
              </div>
            </div>

            <div className="dropdown-divider"/>

            {/* SEÇÃO "Integrações" — status ML ao vivo */}
            <MLDropdownStatus onGoToIntegrations={() => go(() => onGoTo && onGoTo('integrations'))}/>

            <div className="dropdown-divider"/>

            {/* SEÇÃO 2 — CONTA */}
            <div className="dropdown-section">
              <div className="dropdown-label">Conta</div>
              <MenuItem icon="👤" label="Minha Conta"            onClick={() => go(() => setModal('account'))}/>
              <MenuItem icon="⚙️" label="Configurações"          onClick={() => go(() => onGoTo && onGoTo('config'))}/>
              <MenuItem icon="🔔" label="Notificações"           onClick={() => go(() => onOpenNotifPanel && onOpenNotifPanel())}/>
              <MenuItem icon="🔗" label="Integrações ML"         onClick={() => go(() => setModal('integ'))}/>
            </div>

            <div className="dropdown-divider"/>

            {/* SEÇÃO 3 — SUPORTE */}
            <div className="dropdown-section">
              <div className="dropdown-label">Suporte</div>
              <MenuItem icon="💬" label="Central de Suporte"     onClick={() => go(() => setModal('support'))}/>
              <MenuItem icon="📖" label="Documentação"           onClick={() => { close(); window.open('https://docs.agenteam.com.br','_blank','noopener'); }}/>
              <MenuItem icon="💡" label="Sugerir melhoria"       onClick={() => go(() => setModal('feedback'))}/>
              <MenuItem icon="🐛" label="Reportar problema"      onClick={() => go(() => setModal('bug'))}/>
            </div>

            <div className="dropdown-divider"/>

            {/* SEÇÃO 4 — SISTEMA */}
            <div className="dropdown-section">
              <div className="dropdown-label">Sistema</div>

              <MenuItem icon="🌙" label="Tema" meta={themeLabels[theme]} hasSubmenu
                onClick={(e) => { e.stopPropagation(); setSubmenu(s => s==='theme'?null:'theme'); }}>
                {submenu==='theme' && (
                  <div className="submenu" onClick={e=>e.stopPropagation()}>
                    {Object.entries(themeLabels).map(([k,lbl])=>(
                      <button key={k} className={`menu-item ${theme===k?'active':''}`} onClick={()=>pickTheme(k)}>
                        <span className="item-icon">{k==='dark'?'🌙':k==='light'?'☀️':'🖥️'}</span>
                        <span className="item-label">{lbl}</span>
                        {theme===k && <span className="check">✓</span>}
                      </button>
                    ))}
                  </div>
                )}
              </MenuItem>

              <MenuItem icon="🌐" label="Idioma" meta={langLabels[lang]} hasSubmenu
                onClick={(e) => { e.stopPropagation(); setSubmenu(s => s==='lang'?null:'lang'); }}>
                {submenu==='lang' && (
                  <div className="submenu" onClick={e=>e.stopPropagation()}>
                    {Object.entries(langLabels).map(([k,lbl])=>(
                      <button key={k} className={`menu-item ${lang===k?'active':''}`} onClick={()=>pickLang(k)}>
                        <span className="item-icon">{k==='pt'?'🇧🇷':k==='en'?'🇺🇸':'🇪🇸'}</span>
                        <span className="item-label">{lbl}</span>
                        {lang===k && <span className="check">✓</span>}
                      </button>
                    ))}
                  </div>
                )}
              </MenuItem>

              <MenuItem icon="🚪" label="Sair" danger onClick={() => go(() => setModal('logout'))}/>
            </div>
          </div>
        )}
      </div>

      {/* Modais — ficam fora do dropdown pra continuar visíveis após fechar */}
      {modal==='account'  && <MyAccountModal user={user} onClose={()=>setModal(null)}/>}
      {modal==='integ'    && <MLIntegrationModal onClose={()=>setModal(null)}/>}

// Indicador global ML — pílula colorida no header
// 🟢 conectado (auto-refresh OK) · 🟡 expira em breve · 🟠 expirado · 🔴 sem token
function MLStatusIndicator({onClickConnect}){
  const st = useMLConnectionStatus();
  const [refreshing, setRefreshing] = useState(false);

  // Monta rotulagem baseada no estado + hoursLeft
  const hoursLeftTxt = st.hoursLeft != null
    ? (st.hoursLeft >= 1 ? `${st.hoursLeft.toFixed(1)}h` : `${Math.round(st.hoursLeft*60)}min`)
    : null;

  let cfg;
  if (st.state === 'ok') {
    cfg = {
      dot:'#22c55e', bg:'rgba(34,197,94,.12)', border:'rgba(34,197,94,.4)',
      label:'🟢 ML',
      sub: hoursLeftTxt
        ? `${hoursLeftTxt} ${st.autoRefresh ? '· auto ✓' : ''}`
        : (st.nickname || st.userId || 'online'),
    };
  } else if (st.state === 'near_expiry') {
    cfg = {
      dot:'#facc15', bg:'rgba(234,179,8,.12)', border:'rgba(234,179,8,.4)',
      label: refreshing ? '🔄 renovando...' : '🟡 ML expirando',
      sub: hoursLeftTxt || 'renovar',
    };
  } else if (st.state === 'expired') {
    cfg = {
      dot:'#f97316', bg:'rgba(249,115,22,.14)', border:'rgba(249,115,22,.4)',
      label:'🟠 Token expirado',
      sub: st.autoRefresh ? 'clicar p/ renovar' : 'reconectar',
    };
  } else {
    cfg = {
      dot:'#ef4444', bg:'rgba(239,68,68,.12)', border:'rgba(239,68,68,.4)',
      label:'🔴 ML Desconectado',
      sub:'Conectar',
    };
  }

  // Ação: se expirado/near_expiry e tem auto_refresh no server, tenta renovar
  const onClick = async () => {
    if (refreshing) return;
    if ((st.state === 'expired' || st.state === 'near_expiry') && st.autoRefresh) {
      setRefreshing(true);
      const r = await forceRefreshMLServer();
      setRefreshing(false);
      if (r.success) {
        // Puxa o token novo do servidor e atualiza localStorage
        const merged = await syncMLTokensFromServer();
        if (merged) {
          // force state refresh
          window.dispatchEvent(new Event('storage'));
        }
        return;
      }
      // refresh falhou → abre Integrações para reconexão manual
    }
    onClickConnect && onClickConnect();
  };

  return (
    <button
      onClick={onClick}
      title={
        st.state === 'ok'
          ? `Conectado como ${st.nickname || st.userId || '—'}${hoursLeftTxt ? ' · expira em ' + hoursLeftTxt : ''}${st.autoRefresh ? ' · auto-refresh habilitado' : ''}`
          : st.state === 'near_expiry'
            ? `Token expira em ${hoursLeftTxt || 'breve'} — clique para renovar agora`
            : st.state === 'expired'
              ? (st.autoRefresh ? 'Clique para renovar (auto-refresh disponível)' : 'Reconecte na aba Integrações')
              : 'Abrir aba 🔌 Integrações para conectar'
      }
      disabled={refreshing}
      className="ml-status-pill"
      style={{
        display:'inline-flex', alignItems:'center', gap:8,
        padding:'6px 12px', borderRadius:999,
        background: cfg.bg, border:'1px solid ' + cfg.border,
        color:'var(--txt)', fontSize:12, fontWeight:700,
        cursor: refreshing ? 'wait' : 'pointer', transition:'.15s',
        opacity: refreshing ? .7 : 1,
      }}
    >
      <span style={{width:8, height:8, borderRadius:'50%', background:cfg.dot, boxShadow:`0 0 8px ${cfg.dot}`}}/>
      <span className="hidden sm:inline">{cfg.label}</span>
      <span className="mono sub text-[11px]">{cfg.sub}</span>
    </button>
  );
}

// Card: status da compatibilidade automática (IA resolve sozinha)
function CompatCard({ compat }){
  const pendCount = compat.pend?.total ?? null;
  const s = compat.stats;
  const ultima = s?.ultima ? new Date(s.ultima) : null;
  const ultimaVer = s?.ultimaVerificacao ? new Date(s.ultimaVerificacao) : null;
  const hAgo = (d) => {
    if (!d) return null;
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 1) return 'agora';
    if (diff < 60) return `há ${Math.round(diff)} min`;
    return `há ${Math.round(diff/60)} h`;
  };
  const temPendente = pendCount != null && pendCount > 0;

  return (
    <div className="card p-5 mb-6" style={{borderColor: temPendente ? 'rgba(255,176,32,.45)' : 'rgba(34,197,94,.35)'}}>
      <div className="flex items-start gap-4 flex-wrap">
        <div className="text-3xl">🚗</div>
        <div className="flex-1 min-w-[260px]">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold">Compatibilidade de autopeças</h3>
            <span className="chip" style={{color: temPendente?'var(--yellow)':'var(--green)', borderColor: temPendente?'rgba(255,176,32,.5)':'rgba(34,197,94,.5)', fontSize:11}}>
              {temPendente ? `⚠️ ${pendCount} pendente(s)` : '✅ tudo compatível'}
            </span>
            <span className="chip" style={{fontSize:11}}>🤖 IA automática</span>
          </div>
          <p className="sub text-xs mt-1">
            {temPendente
              ? 'IA tentando resolver automaticamente em background. Clique para forçar agora.'
              : <>A IA resolveu <span className="mono" style={{color:'var(--green)'}}>{s?.sucessos || 0}</span> automaticamente
                 {s?.tentativas ? <> · {Math.round((s.sucessos/Math.max(1,s.tentativas))*100)}% de sucesso</> : null}
                 {ultima ? <> · última {hAgo(ultima)}</> : null}
                 {ultimaVer ? <> · verificação {hAgo(ultimaVer)}</> : null}
              </>}
          </p>
          {compat.msg && <p className="sub text-xs mt-2 mono" style={{color:'var(--green)'}}>{compat.msg}</p>}
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn-ghost" onClick={compat.refresh} disabled={compat.busy}>🔄 Atualizar</button>
          <button className="btn" style={{width:'auto', padding:'10px 16px'}} onClick={compat.forcar} disabled={compat.busy}>
            {compat.busy ? '🔄 resolvendo...' : '🤖 Forçar resolução'}
          </button>
        </div>
      </div>
      {s?.historico?.length > 0 && (
        <div className="mt-3 pt-3 border-t border-[var(--line)]">
          <div className="sub text-xs mb-2 font-semibold">Últimas resoluções automáticas</div>
          <div className="space-y-1">
            {s.historico.slice(0,4).map((h,i) => (
              <div key={i} className="text-xs flex gap-3 mono">
                <span className="sub">{new Date(h.ts).toLocaleTimeString('pt-BR')}</span>
                <span>{h.itemId}</span>
                <span className="chip" style={{fontSize:10, padding:'1px 6px'}}>{h.metodo}</span>
                {h.resumo && <span className="sub">{h.resumo}</span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// Hook: status da compatibilidade automática
function useCompatStatus(){
  const [stats, setStats]   = useState(null);
  const [pend, setPend]     = useState(null);
  const [busy, setBusy]     = useState(false);
  const [msg, setMsg]       = useState(null);

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setStats(null); setPend(null); return; }
    try {
      const [sR, pR] = await Promise.all([
        fetch('/api/ml/compat/stats'),
        fetch('/api/ml/compat/pendentes', { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
      ]);
      const sJ = await sR.json().catch(()=>null);
      const pJ = await pR.json().catch(()=>null);
      if (sJ?.success) setStats(sJ);
      if (pJ?.success) setPend(pJ);
    } catch(_) {}
  }, []);

  const forcar = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return;
    setBusy(true); setMsg(null);
    try {
      const r = await fetch('/api/ml/compat/auto-resolver-todos', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
      });
      const d = await r.json().catch(()=>({}));
      if (d.success) {
        setMsg(`🚗 ${d.resolvidos||0}/${d.total||0} resolvidas`);
      } else {
        setMsg('❌ Falha: ' + (d.error || 'erro'));
      }
      await refresh();
    } catch(e) {
      setMsg('❌ ' + e.message);
    }
    setBusy(false);
  }, [refresh]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 60_000);
    return () => clearInterval(id);
  }, [refresh]);

  return { stats, pend, busy, msg, refresh, forcar };
}

// Hook: carrega /api/ml/items (anúncios reais do vendedor)
function useMLItems() {
  const [data, setData]       = useState(null); // {success,total,items}
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);
  const [expired, setExpired] = useState(false);

  const refresh = useCallback(async () => {
    const tokens = loadMLTokens();
    if (!tokens) { setData(null); setErr(null); setExpired(false); return; }
    setLoading(true);
    const res = await mlApi('/api/ml/items');
    if (res.expired) { setExpired(true); setData(null); setErr('Token expirado'); }
    else if (res.success) { setData(res); setErr(null); setExpired(false); }
    else { setErr(res.error || 'Falha ao buscar anúncios'); }
    setLoading(false);
  }, []);
  useEffect(() => { refresh(); }, [refresh]);
  return { data, loading, err, expired, refresh };
}

  const profit = net-cost;

  // FIPE states
  const [tipo,setTipo] = useState('carros');

  const [modelos,setModelos] = useState([]);

  useEffect(()=>{
    fetch(`/api/fipe/marcas?tipo=${tipo}`).then(r=>r.json()).then(d=>{
      setMarcas(Array.isArray(d)?d.sort((a,b)=>a.nome.localeCompare(b.nome)):[]);

  useEffect(()=>{

function NotificationsSettings({ notif }) {
  const { prefs, setPrefs, trigger } = notif;
  const browserPermission = typeof Notification !== 'undefined' ? Notification.permission : 'unsupported';

  const togglePref = (key) => setPrefs(p => ({ ...p, [key]: !p[key] }));

  const handleEnablePush = async () => {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'granted') {
      setPrefs(p => ({ ...p, push: true }));
      return;
    }
    try {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') setPrefs(p => ({ ...p, push: true }));
    } catch(e) {}
  };

  const togglePush = () => {
    if (!prefs.push) handleEnablePush();
    else setPrefs(p => ({ ...p, push: false }));
  };

  const items = [
    ['vendas',     'Vendas',                 'Toda venda concluída no ML'],
    ['perguntas',  'Perguntas',              'Cliente perguntou sobre um anúncio'],
    ['publicados', 'Publicações',            'Anúncio novo entrou no ar'],
    ['alertas',    'Alertas de preço',       'Concorrente baixou preço'],
    ['problemas',  'Problemas em anúncios',  'Health score caindo, pausas etc'],
  ];

  return (
    <div className="card p-5 mb-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="font-bold">🔔 Notificações</h3>
        <button className="btn-ghost" style={{padding:'6px 12px',fontSize:12}}
          onClick={() => trigger('venda', { valor: 289.90, produto: 'Farol Gol G5 Arteb', comprador: 'Teste' })}>
          Testar notificação
        </button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8">
        <div>
          <p className="sub text-xs uppercase tracking-wider mb-2">Tipos de evento</p>
          {items.map(([key, label, hint]) => (
            <label key={key} className="toggle-row" style={{cursor:'pointer'}}>
              <span>
                <span className="font-semibold">{label}</span>
                <span className="sub text-xs block mt-0.5">{hint}</span>
              </span>
              <input type="checkbox" checked={prefs[key]} onChange={() => togglePref(key)}/>
            </label>
          ))}
        </div>

        <div>
          <p className="sub text-xs uppercase tracking-wider mb-2">Entrega</p>

          <label className="toggle-row" style={{cursor:'pointer'}}>
            <span>
              <span className="font-semibold">Push do navegador</span>
              <span className="sub text-xs block mt-0.5">
                {browserPermission === 'unsupported' ? 'Navegador sem suporte' :
                 browserPermission === 'denied'      ? 'Permissão bloqueada nas configs do navegador' :
                 browserPermission === 'granted'     ? 'Permissão concedida' :
                                                       'Vamos pedir permissão ao ativar'}
              </span>
            </span>
            <input type="checkbox" checked={prefs.push && browserPermission === 'granted'}
              disabled={browserPermission === 'unsupported' || browserPermission === 'denied'}
              onChange={togglePush}/>
          </label>

          <label className="toggle-row" style={{cursor:'pointer'}}>
            <span>
              <span className="font-semibold">Som ao receber venda</span>
              <span className="sub text-xs block mt-0.5">"Ching" suave de caixa registradora</span>
            </span>
            <input type="checkbox" checked={prefs.som} onChange={() => togglePref('som')}/>
          </label>

          <div className="toggle-row" style={{flexDirection:'column',alignItems:'stretch',gap:8}}>
            <div className="flex items-center justify-between">
              <span className="font-semibold">Volume</span>
              <span className="mono text-xs sub">{prefs.volume}%</span>
            </div>
            <input type="range" min="0" max="100" value={prefs.volume}
              onChange={(e) => setPrefs(p => ({ ...p, volume: parseInt(e.target.value, 10) }))}
              className="vol-slider" disabled={!prefs.som}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ----- TAB A: IMPORTAR CSV -----
function ImportCSVTab({ agent, onGoToAgent }) {
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);   // {rows, valid, warns, errors}
  const [importing, setImporting] = useState(false);
  const [progress, setProgress] = useState(0);
  const inputRef = useRef(null);

  const handleFile = async (file) => {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('Arquivo maior que 5MB.'); return; }
    const text = await file.text();
    const { headers, rows } = parseCSV(text);
    const required = ['sku','nome','custo'];
    const missingCols = required.filter(c => !headers.includes(c));
    if (missingCols.length) {
      alert(`CSV inválido — colunas obrigatórias ausentes: ${missingCols.join(', ')}`);
      return;
    }
    // valida cada linha
    const evaluated = rows.map(r => {
      const compat = (r.compatibilidades||'').split(/[;|]/).map(s=>s.trim()).filter(Boolean);
      const product = { ...r, compatibilidades: compat, custo: parseFloat(r.custo) || 0 };
      const v = validateProduct(product);
      return { ...product, _v: v };
    });
    setPreview({
      rows: evaluated,
      valid: evaluated.filter(r => r._v.ok && r._v.warns.length === 0).length,
      warns: evaluated.filter(r => r._v.ok && r._v.warns.length > 0).length,
      errors: evaluated.filter(r => !r._v.ok).length,
    });
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files?.[0];
    handleFile(file);
  };

  const handleImport = () => {
    if (!preview) return;
    setImporting(true); setProgress(0);
    const valid = preview.rows.filter(r => r._v.ok).map(({_v, ...rest}) => rest);
    let i = 0;
    const tick = setInterval(() => {
      i += Math.max(1, Math.floor(valid.length / 20));
      const pct = Math.min(100, Math.round((i / valid.length) * 100));
      setProgress(pct);
      if (i >= valid.length) {
        clearInterval(tick);
        agent.addProducts(valid);
        setImporting(false); setPreview(null); setProgress(0);
        agent.log('info', `📦 ${valid.length} produtos importados via CSV`);
      }
    }, 60);
  };

  const handleDownloadModel = () => {
    const headers = ['sku','nome','marca','part_number','gtin','custo','peso_kg','categoria','compatibilidades','urls_imagens'];
    const rows = [
      { sku:'FAR-GOL-G5-001', nome:'Farol Dianteiro Gol G5 Lado Direito', marca:'Arteb', part_number:'AR-FAR-887', gtin:'7891234567890', custo:'120.00', peso_kg:'1.2', categoria:'Iluminação', compatibilidades:'Volkswagen Gol G5 (2008-2012); Volkswagen Voyage G5 (2008-2012)', urls_imagens:'https://exemplo.com/far-gol-1.jpg|https://exemplo.com/far-gol-2.jpg' },
      { sku:'LAN-VOY-001',    nome:'Lanterna Traseira Voyage G6 LED',     marca:'Cofran', part_number:'CF-LAN-441', gtin:'7891234567891', custo:'89.90',  peso_kg:'0.9', categoria:'Iluminação', compatibilidades:'Volkswagen Voyage G6 (2012-2018)',                                            urls_imagens:'https://exemplo.com/lan-voy.jpg' },
      { sku:'RET-SAV-G6-001', nome:'Retrovisor Elétrico Saveiro G6',      marca:'Metagal', part_number:'MT-RET-309', gtin:'7891234567892', custo:'180.00', peso_kg:'1.4', categoria:'Espelhos',  compatibilidades:'Volkswagen Saveiro G6',                                                       urls_imagens:'' },
    ];
    downloadCSV('modelo-produtos-am.csv', headers, rows);
  };

  return (
    <div>
      <div className="info-steps mb-4">
        <h3 className="font-bold mb-2" style={{color:'var(--green)'}}>Como importar em massa</h3>
        <ol>
          <li>Baixe o modelo CSV abaixo e preencha com seus produtos.</li>
          <li>Use ponto-e-vírgula <code className="mono" style={{color:'var(--green)'}}>;</code> pra separar veículos compatíveis.</li>
          <li>Use barra-vertical <code className="mono" style={{color:'var(--green)'}}>|</code> pra separar URLs de imagens.</li>
          <li>(Opcional) compacte as imagens num <code className="mono" style={{color:'var(--green)'}}>.zip</code> nomeadas pelo SKU.</li>
          <li>Arraste aqui — a gente valida tudo antes de importar.</li>
        </ol>
      </div>

      <div className="flex gap-3 mb-4 flex-wrap">
        <button className="btn-play" onClick={handleDownloadModel} style={{padding:'12px 22px',fontSize:14}}>
          ⬇️ Baixar modelo CSV
        </button>
        <input ref={inputRef} type="file" accept=".csv,.xlsx" style={{display:'none'}} onChange={e => handleFile(e.target.files?.[0])}/>
        <input type="file" accept=".zip" style={{display:'none'}}/>
      </div>

      <div
        className={`dropzone ${dragging?'dragging':''}`}
        onClick={() => inputRef.current?.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
      >
        <div className="dz-icon">📂</div>
        <div className="font-bold mb-1">Arraste seu CSV ou XLSX aqui</div>
        <div className="sub text-xs">ou clique pra escolher · até 5 MB · também aceita .zip de imagens</div>
      </div>

      {preview && (
        <div className="card p-5 mt-5">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h3 className="font-bold">Pré-visualização</h3>
            <div className="flex gap-3 text-sm flex-wrap">
              <span className="badge b-green">✅ {preview.valid - preview.warns} prontos</span>
              <span className="badge b-yellow">⚠️ {preview.warns} atenção</span>
              <span className="badge b-red">❌ {preview.errors} erros</span>
            </div>
          </div>

          <div style={{maxHeight:340, overflowY:'auto'}}>
            <table className="w-full ptable">
              <thead>
                <tr><th>SKU</th><th>Nome</th><th>Marca</th><th className="text-right">Custo</th><th>Status</th></tr>
              </thead>
              <tbody>
                {preview.rows.slice(0, 10).map((r, i) => (
                  <tr key={i} className={!r._v.ok ? 'row-error' : (r._v.warns.length ? 'row-warn' : '')}>
                    <td className="mono text-xs">{r.sku || <span className="sub">—</span>}</td>
                    <td>{r.nome || <span className="sub italic">sem nome</span>}</td>
                    <td className="sub">{r.marca || '—'}</td>
                    <td className="text-right mono">{r.custo ? `R$ ${parseFloat(r.custo).toFixed(2)}` : '—'}</td>
                    <td>
                      {!r._v.ok
                        ? <span title={r._v.errors.join(' · ')}>❌ {r._v.errors[0]}</span>
                        : r._v.warns.length
                          ? <span title={r._v.warns.join(' · ')}>⚠️ {r._v.warns[0]}</span>
                          : <span style={{color:'var(--mint)'}}>✅ pronto</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {preview.rows.length > 10 && <p className="sub text-xs text-center mt-3">+{preview.rows.length - 10} produtos não exibidos no preview</p>}
          </div>

          {importing && (
            <div className="mt-4">
              <div className="flex items-center justify-between text-xs mb-2">
                <span className="sub">Importando...</span>
                <span className="mono" style={{color:'var(--green)'}}>{progress}%</span>
              </div>
              <div className="agent-progress"><div className="agent-progress-fill" style={{width: progress+'%'}}/></div>
            </div>
          )}

          <div className="flex gap-2 justify-end mt-5 flex-wrap">
            <button className="btn-ghost" onClick={() => setPreview(null)}>Cancelar</button>
            <button className="btn-ghost">Corrigir</button>
            <button className="btn-play" disabled={importing || preview.errors === preview.rows.length}
              onClick={handleImport} style={{padding:'10px 22px',fontSize:13}}>
              ⬆️ Importar {preview.valid + preview.warns} válidos
            </button>
          </div>
        </div>
      )}

      {agent.counts.aguardando > 0 && (
        <div className="card p-4 mt-4 flex items-center gap-3 flex-wrap" style={{borderColor:'rgba(34,197,94,.4)'}}>
          <div className="text-2xl">🚀</div>
          <div className="flex-1">
            <div className="font-bold text-sm">{agent.counts.aguardando} produtos prontos pro agente</div>
            <div className="sub text-xs">Cadastrou tudo? Vai pra aba Agente e dê PLAY pra publicar automaticamente.</div>
          </div>
          <button className="btn-play" onClick={onGoToAgent} style={{padding:'10px 18px',fontSize:13}}>
            ▶ Processar agora
          </button>
        </div>
      )}
    </div>
  );
}

function ManualFormTab({ agent }) {
  const [form, setForm] = useState({
    sku:'', nome:'', marca:'', part_number:'', gtin:'',
    custo:'', peso_kg:'', categoria:'',
    compatibilidades: [],
    images: [], // [{url, name}]
    ficha:'', garantia:'', observacoes:'',
  });
  const [extras, setExtras] = useState(false);

  // ---- FIPE cascata (Tipo → Marca → Modelo → Ano) ----
  const [vTipo, setVTipo]             = useState('carros');
  const [fipeMarcasList, setFipeMarcasList] = useState([]);
  const [fipeModelosList, setFipeModelosList] = useState([]);
  const [fipeAnosList, setFipeAnosList]       = useState([]);
  const [vMarcaCod, setVMarcaCod]     = useState('');
  const [vModeloCod, setVModeloCod]   = useState('');
  const [vAnoCod, setVAnoCod]         = useState('');
  const [fipeLoading, setFipeLoading] = useState({marcas:false, modelos:false, anos:false});
  const [fipeErr, setFipeErr]         = useState('');

  // Carrega marcas ao mudar tipo
  useEffect(() => {
    setFipeLoading(p => ({...p, marcas:true})); setFipeErr('');
    fipeMarcas(vTipo)
      .then(list => {
        const sorted = [...list].sort((a,b)=> (a.nome||'').localeCompare(b.nome||''));
        setFipeMarcasList(sorted);
      })
      .catch(e => setFipeErr('Falha ao carregar marcas FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, marcas:false})));
    setVMarcaCod(''); setVModeloCod(''); setVAnoCod('');
    setFipeModelosList([]); setFipeAnosList([]);
  }, [vTipo]);

  // Carrega modelos ao selecionar marca
  useEffect(() => {
    if (!vMarcaCod) { setFipeModelosList([]); return; }
    setFipeLoading(p => ({...p, modelos:true})); setFipeErr('');
    fipeModelos(vTipo, vMarcaCod)
      .then(list => setFipeModelosList(list))
      .catch(e => setFipeErr('Falha ao carregar modelos FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, modelos:false})));
    setVModeloCod(''); setVAnoCod(''); setFipeAnosList([]);
  }, [vMarcaCod, vTipo]);

  // Carrega anos ao selecionar modelo
  useEffect(() => {
    if (!vModeloCod) { setFipeAnosList([]); return; }
    setFipeLoading(p => ({...p, anos:true})); setFipeErr('');
    fipeAnos(vTipo, vMarcaCod, vModeloCod)
      .then(list => setFipeAnosList(list))
      .catch(e => setFipeErr('Falha ao carregar anos FIPE: '+e.message))
      .finally(() => setFipeLoading(p => ({...p, anos:false})));
    setVAnoCod('');
  }, [vModeloCod, vMarcaCod, vTipo]);

  const [imgDragging, setImgDragging] = useState(false);
  const imgInputRef = useRef(null);

  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
  const validation = useMemo(() => validateProduct(form), [form]);

  const fieldOK = (k) => {
    if (k === 'sku')   return form.sku.trim().length > 0;
    if (k === 'nome')  return form.nome.trim().length > 0;
    if (k === 'custo') return form.custo && !isNaN(parseFloat(form.custo));
    return true;
  };

  const addCompat = () => {
    // FIPE cascata — usa os nomes reais retornados pela API
    if (!vMarcaCod || !vModeloCod) return;
    const marcaObj  = fipeMarcasList.find(m => String(m.codigo) === String(vMarcaCod));
    const modeloObj = fipeModelosList.find(m => String(m.codigo) === String(vModeloCod));
    const anoObj    = fipeAnosList.find(a => String(a.codigo) === String(vAnoCod));
    if (!marcaObj || !modeloObj) return;
    const anoLabel = anoObj ? ` ${anoObj.nome}` : '';
    const label = `${marcaObj.nome} ${modeloObj.nome}${anoLabel}`;
    set('compatibilidades', [...form.compatibilidades, label]);
    setVModeloCod(''); setVAnoCod(''); setFipeAnosList([]);
  };
  const removeCompat = (i) => set('compatibilidades', form.compatibilidades.filter((_, j) => j !== i));

  const handleImageFiles = (files) => {
    const arr = Array.from(files || []).filter(f => f.type.startsWith('image/'));
    const novos = arr.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
    set('images', [...form.images, ...novos]);
  };
  const removeImage = (i) => set('images', form.images.filter((_, j) => j !== i));
  const moveImageUp = (i) => {
    if (i === 0) return;
    const arr = [...form.images];
    [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
    set('images', arr);
  };

  const submit = (addAnother) => {
    if (!validation.ok) return;
    agent.addProducts([{ ...form, custo: parseFloat(form.custo) || 0 }]);
    agent.log('info', `📦 Produto cadastrado: ${form.sku}`);
    if (addAnother) {
      setForm({ sku:'', nome:'', marca:'', part_number:'', gtin:'', custo:'', peso_kg:'', categoria:'',
        compatibilidades:[], images:[], ficha:'', garantia:'', observacoes:'' });
    } else {
      alert(`Produto "${form.nome}" cadastrado com sucesso!`);
    }
  };

  return (
    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div className="md:col-span-2 space-y-4">
        {/* SEÇÃO 1 — IDENTIFICAÇÃO */}
        <div className="card p-5">
          <h3 className="font-bold mb-3">1. Identificação</h3>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="label">SKU {fieldOK('sku') ? <span style={{color:'var(--mint)'}}>✓</span> : <span style={{color:'#ef4444'}}>*</span>}</label>
              <input className="input" value={form.sku} onChange={e=>set('sku', e.target.value)} placeholder="FAR-GOL-G5-001"/></div>
            <div><label className="label">Marca</label>
              <input className="input" value={form.marca} onChange={e=>set('marca', e.target.value)} placeholder="Arteb"/></div>
            <div className="col-span-2"><label className="label">Nome do produto {fieldOK('nome') ? <span style={{color:'var(--mint)'}}>✓</span> : <span style={{color:'#ef4444'}}>*</span>}</label>
              <input className="input" value={form.nome} onChange={e=>set('nome', e.target.value)} placeholder="Farol Dianteiro Gol G5 Lado Direito"/></div>
            <div><label className="label">Part number</label>
              <input className="input" value={form.part_number} onChange={e=>set('part_number', e.target.value)} placeholder="AR-FAR-887"/></div>
            <div><label className="label">GTIN/EAN</label>

            <li className="flex justify-between"><span className="sub">Custo</span><span className="mono" style={{color:'var(--green)'}}>{form.custo ? `R$ ${parseFloat(form.custo).toFixed(2)}` : '—'}</span></li>

            <button className="btn-ghost w-full" disabled={!validation.ok} onClick={()=>submit(true)}>Salvar e adicionar outro</button>

        </div>

    </div>
  );
}

// ----- TAB C: PRODUTOS CADASTRADOS -----
function ProductsListTab({ agent, onGoToAgent }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const [openMenu, setOpenMenu] = useState(null);

  const filtered = useMemo(() => {
    return agent.products.filter(p => {
      const s = search.toLowerCase();
      if (s && !(p.sku.toLowerCase().includes(s) || (p.nome||'').toLowerCase().includes(s) || (p.marca||'').toLowerCase().includes(s))) return false;
      if (filter === 'aguardando') return (p.status||'aguardando') === 'aguardando';
      if (filter === 'publicado')  return p.status === 'publicado';
      if (filter === 'erro')       return p.status === 'erro';
      if (filter === 'pausado')    return p.status === 'pausado';
      return true;
    });
  }, [agent.products, search, filter]);

  const toggleSel = (sku) => {
    const next = new Set(selected);
    if (next.has(sku)) next.delete(sku); else next.add(sku);
    setSelected(next);
  };
  const toggleAll = () => {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.sku)));
  };

  const statusBadge = (s) => {
    const map = {
      aguardando: ['b-yellow','aguardando'],
      publicado:  ['b-green','publicado'],
      pausado:    ['b-gray','pausado'],
      erro:       ['b-red','erro'],
    };
    const [cls, lbl] = map[s||'aguardando'];
    return <span className={`badge ${cls}`}>{lbl}</span>;
  };

  const filters = [
    ['all',        `Todos (${agent.counts.total})`],
    ['aguardando', `Aguardando (${agent.counts.aguardando})`],
    ['publicado',  `Publicados (${agent.counts.publicados})`],
    ['erro',       `Com erro (${agent.counts.erros})`],
    ['pausado',    `Pausados (${agent.counts.pausados})`],
  ];

  if (agent.products.length === 0) {
    return (
      <div className="card p-10 text-center">
        <div style={{fontSize:48}}>📦</div>
        <h3 className="font-bold mt-2">Nenhum produto cadastrado ainda</h3>
        <p className="sub text-sm mt-1">Use a aba <b>Importar CSV</b> ou <b>Cadastro manual</b> pra começar.</p>
      </div>
    );
  }

  return (
    <div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input className="input" placeholder="🔎 Buscar por SKU, nome ou marca..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1, minWidth:240}}/>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {filters.map(([k, lbl])=>(
          <button key={k} className={`subtab ${filter===k?'active':''}`} onClick={()=>setFilter(k)} style={{borderBottom:'none',background:filter===k?'var(--green-soft)':'transparent',borderRadius:8}}>
            {lbl}
          </button>
        ))}
      </div>

      <div className="card p-0">
        <table className="w-full ptable">
          <thead>
            <tr>
              <th style={{width:36}}><input type="checkbox" checked={selected.size === filtered.length && filtered.length > 0} onChange={toggleAll}/></th>
              <th style={{width:48}}></th>
              <th>SKU</th>
              <th>Nome</th>
              <th>Marca</th>
              <th className="text-right">Custo</th>
              <th>Compat.</th>
              <th>Status</th>
              <th>ML ID</th>
              <th style={{width:36}}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(p => (
              <tr key={p.sku}>
                <td><input type="checkbox" checked={selected.has(p.sku)} onChange={()=>toggleSel(p.sku)}/></td>
                <td><div className="thumb-mini">{p.images?.length ? <img src={p.images[0].url} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:6}}/> : '📦'}</div></td>
                <td className="mono text-xs">{p.sku}</td>
                <td>{p.nome}</td>
                <td className="sub">{p.marca||'—'}</td>
                <td className="text-right mono" style={{color:'var(--green)'}}>R$ {(parseFloat(p.custo)||0).toFixed(2)}</td>
                <td className="sub text-xs">{(p.compatibilidades||[]).length} veículo(s)</td>
                <td>{statusBadge(p.status)}</td>
                <td className="mono text-xs">{p.mlId || <span className="sub">—</span>}</td>
                <td style={{position:'relative'}}>
                  <button className="btn-ghost" style={{padding:'4px 10px',fontSize:14}} onClick={()=>setOpenMenu(openMenu===p.sku?null:p.sku)}>⋯</button>
                  {openMenu === p.sku && (
                    <div className="profile-dropdown" style={{position:'absolute',right:0,top:'100%',width:180,marginTop:4,zIndex:20}}>
                      <div className="dropdown-section">
                        <button className="menu-item"><span className="item-icon">👁️</span><span className="item-label">Ver detalhes</span></button>
                        <button className="menu-item"><span className="item-icon">✏️</span><span className="item-label">Editar</span></button>
                        <button className="menu-item"><span className="item-icon">📋</span><span className="item-label">Duplicar</span></button>
                        <button className="menu-item" disabled={!p.mlId}><span className="item-icon">🔗</span><span className="item-label">Ver no ML</span></button>
                        <button className="menu-item" onClick={()=>{agent.updateProduct(p.sku,{status:'pausado'}); setOpenMenu(null);}}><span className="item-icon">⏸</span><span className="item-label">Pausar</span></button>
                        <button className="menu-item danger" onClick={()=>{agent.removeProducts([p.sku]); setOpenMenu(null);}}><span className="item-icon">🗑️</span><span className="item-label">Excluir</span></button>
                      </div>
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected.size > 0 && (
        <div className="bulk-bar">
          <span className="font-bold text-sm" style={{color:'var(--green)'}}>{selected.size} selecionado(s)</span>
          <div className="ml-auto flex gap-2 flex-wrap">
            <button className="btn-ghost" onClick={()=>{selected.forEach(s=>agent.updateProduct(s,{status:'pausado'})); setSelected(new Set());}}>⏸ Pausar</button>
            <button className="btn-ghost" style={{color:'#ef4444',borderColor:'rgba(239,68,68,.4)'}} onClick={()=>{if(confirm(`Excluir ${selected.size} produtos?`)){agent.removeProducts([...selected]); setSelected(new Set());}}}>🗑️ Excluir</button>
            <button className="btn-play" style={{padding:'8px 16px',fontSize:13}} onClick={()=>{onGoToAgent(); setSelected(new Set());}}>▶ Enviar pra IA</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductsPage({ agent, onGoToAgent }) {
  const [sub, setSub] = useState('list');
  const [blingConnected, setBlingConnected] = useState(() => !!loadBlingTokens());

  // se não tem produto, abrir já em "manual" pra não cair em estado vazio
  useEffect(() => { if (agent.products.length === 0) setSub('csv'); }, []);

  // Monitora conexão Bling para mostrar/esconder a sub-aba dinamicamente
  useEffect(() => {
    const sync = () => setBlingConnected(!!loadBlingTokens());
    window.addEventListener('storage', sync);
    const id = setInterval(sync, 3000);
    return () => { window.removeEventListener('storage', sync); clearInterval(id); };
  }, []);

  // Se Bling conecta durante a sessão, sugere abrir a aba
  const bling = loadBlingTokens();

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold">Produtos</h1>
          <p className="sub text-sm">Cadastre os produtos que o agente vai anunciar no Mercado Livre</p>
        </div>
      </div>

      <div className="subtab-bar">
        {blingConnected && (
          <div className={`subtab ${sub==='bling'?'active':''}`} onClick={()=>setSub('bling')}>
            🔌 Do Bling <span className="badge-count" style={{background:'rgba(34,197,94,.2)', color:'#22c55e'}}>live</span>
          </div>
        )}
        <div className={`subtab ${sub==='csv'?'active':''}`}    onClick={()=>setSub('csv')}>📥 Importar CSV</div>
        <div className={`subtab ${sub==='manual'?'active':''}`} onClick={()=>setSub('manual')}>✏️ Cadastro manual</div>
        <div className={`subtab ${sub==='list'?'active':''}`}   onClick={()=>setSub('list')}>📋 Cadastrados <span className="badge-count">{agent.counts.total}</span></div>
      </div>

      {sub === 'bling'  && <BlingProdutosTab agent={agent} onGoToAgent={onGoToAgent}/>}
      {sub === 'csv'    && <ImportCSVTab    agent={agent} onGoToAgent={onGoToAgent}/>}
      {sub === 'manual' && <ManualFormTab   agent={agent}/>}
      {sub === 'list'   && <ProductsListTab agent={agent} onGoToAgent={onGoToAgent}/>}
    </div>
  );
}

// ============================================================
// BlingProdutosTab — lista produtos reais do Bling,
// permite seleção múltipla e publicação em lote no ML
// ============================================================
function BlingProdutosTab({ agent, onGoToAgent }) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState('');
  const [selected, setSelected] = useState(new Set());
  const [q, setQ]             = useState('');
  const [publishing, setPublishing] = useState(false);
  const [progress, setProgress] = useState(null);   // {done, total, currentId}
  const [results, setResults] = useState(null);     // resposta do /api/publicar/lote
  const hasML = !!loadMLTokens();

  const load = useCallback(async () => {
    setLoading(true); setErr('');
    const r = await blingFetchProdutos({ page: 1, limit: 100 });
    if (r.success) { setData(r); }
    else { setErr(r.error || 'Falha ao carregar produtos'); setData({ total:0, produtos:[] }); }
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const lista = data?.produtos || [];
  const filtered = q
    ? lista.filter(p =>
        (p.nome||'').toLowerCase().includes(q.toLowerCase()) ||
        (p.codigo||'').toLowerCase().includes(q.toLowerCase()))
    : lista;

  const toggle = (id) => setSelected(s => {
    const n = new Set(s);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });
  const toggleAll = () => {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.id)));
  };

  // SEO preview (modal) — mostra 3 títulos, 3 descrições, anti-duplicidade
  const [seoPreview, setSeoPreview] = useState(null); // { produto, data, loading }
  const abrirSeoPreview = async (produto) => {
    setSeoPreview({ produto, data: null, loading: true });
    try {
      const ml = loadMLTokens();
      const r = await fetch('/api/seo/gerar-completo', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (ml?.access_token||''), 'Content-Type':'application/json' },
        body: JSON.stringify({
          nome: produto.nome,
          marca: produto.marca?.nome || produto.marca || '',
          partNumber: produto.codigo || '',
          especificacoes: produto.descricaoCurta || '',
        }),
      });
      const data = await r.json().catch(()=>({ success:false }));
      setSeoPreview({ produto, data, loading:false });
    } catch(e) {
      setSeoPreview({ produto, data:{ success:false, error:e.message }, loading:false });
    }
  };

  const publicar = async () => {
    if (!hasML) {
      alert('⚠️ Conecte o Mercado Livre primeiro na aba 🔌 Integrações.');
      return;
    }
    const ids = Array.from(selected);
    if (ids.length === 0) return;
    if (!confirm(`Publicar ${ids.length} produto(s) do Bling no Mercado Livre?\n\nTítulos SEO e descrições geradas automaticamente.\nServidor limita 1 publicação/s — estime ~${ids.length}s.`)) return;

    setPublishing(true); setResults(null);
    setProgress({ done: 0, total: ids.length, currentId: ids[0] });
    // O endpoint /lote faz o throttle server-side. Aqui exibimos só estado inicial/final.
    // Para feedback granular teríamos que publicar 1 a 1 no cliente — fica assim por simplicidade.
    const r = await publishBlingBatch(ids);
    setPublishing(false); setProgress(null); setResults(r);
    if (r.success) {
      agent.log('ok', `📤 Bling→ML: ${r.publicados}/${r.total} publicado(s) — ${r.erros} erro(s)`);
      setSelected(new Set());
    } else {
      agent.log('error', `❌ Falha no lote Bling→ML: ${r.error}`);
    }
  };

  return (
    <div>
      <div className="card p-4 mb-4">
        <div className="flex flex-wrap items-center gap-3 justify-between">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold">📦 Produtos do Bling</h3>
            {data && <span className="chip" style={{color:'var(--green)',borderColor:'rgba(0,167,255,.4)'}}>
              {data.total.toLocaleString('pt-BR')} itens
            </span>}
          </div>
          <div className="flex gap-2 flex-wrap">
            <input className="input" style={{width:240}} placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)}/>
            <button className="btn-ghost" onClick={load} disabled={loading}>{loading?'🔄 ...':'🔄 Sincronizar'}</button>
          </div>
        </div>

        {loading && <div className="ok mt-3">🔄 Carregando produtos do Bling…</div>}
        {err && <div className="err mt-3 text-xs">{err}</div>}

        {!loading && filtered.length > 0 && (
          <div className="mt-4" style={{overflowX:'auto'}}>
            <table className="w-full">
              <thead>
                <tr>
                  <th style={{width:36}}>
                    <input
                      type="checkbox"
                      checked={selected.size > 0 && selected.size === filtered.length}
                      onChange={toggleAll}
                    />
                  </th>
                  <th style={{width:110}}>SKU</th>
                  <th>Nome</th>
                  <th style={{width:90}}>Preço</th>
                  <th style={{width:70}}>Estoque</th>
                  <th style={{width:80}}>Situação</th>
                  <th style={{width:110}}>SEO</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => (
                  <tr key={p.id} style={selected.has(p.id) ? {background:'rgba(0,167,255,.05)'} : undefined}>
                    <td><input type="checkbox" checked={selected.has(p.id)} onChange={() => toggle(p.id)}/></td>
                    <td className="mono text-xs sub">{p.codigo || '—'}</td>
                    <td>

function useMLConnectionStatus() {
  const [tokens, setTokens]     = useState(() => loadMLTokens());
  const [live, setLive]         = useState(null);    // {connected, nickname, ...}
  const [srvStatus, setSrvStatus] = useState(null);  // {ml:{...}, bling:{...}}
  const [checking, setChecking] = useState(false);

  // Sync inicial + storage events
  useEffect(() => {
    // sync inicial: se local não tem access_token, puxa do server
    (async () => {
      const merged = await syncMLTokensFromServer();
      if (merged) setTokens(merged);
      await syncBlingTokensFromServer();
    })();

    const sync = () => setTokens(loadMLTokens());
    window.addEventListener('storage', sync);
    const id = setInterval(sync, 3000);
    return () => { window.removeEventListener('storage', sync); clearInterval(id); };
  }, []);

  // Poll /api/tokens/status (a cada 60s) — FONTE DA VERDADE do status do token.
  // Antes era 5min — lento demais pra feedback visual.
  useEffect(() => {
    let cancelled = false;
    const pull = async () => {
      const s = await fetchTokensStatus();
      if (cancelled || !s) return;
      setSrvStatus(s);
      // Se o server tem access_token diferente do local (porque renovou), sincroniza
      if (s.ml?.connected) {
        const srvTok = await fetchServerMLToken();
        if (cancelled) return;
        if (srvTok?.success && srvTok.access_token) {
          const local = loadMLTokens();
          if (!local?.access_token || local.access_token !== srvTok.access_token) {
            const merged = {
              ...(local || {}),
              access_token: srvTok.access_token,
              user_id:      srvTok.user_id || (local && local.user_id) || null,
              expires_at:   srvTok.expires_at ? new Date(srvTok.expires_at).getTime() : Date.now() + 21600*1000,
              synced_from_server_at: Date.now(),
            };
            saveMLTokens(merged);
            setTokens(merged);
          }
        }
      }
    };
    pull();
    const id = setInterval(pull, 60 * 1000); // 60s
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  // Valida token live contra /api/ml/me (auxiliar — preenche nickname/reputação).
  // NÃO é usado pra determinar o estado "expired" (isso vem do srvStatus).
  useEffect(() => {
    if (!tokens || !tokens.access_token) { setLive(null); return; }
    let cancelled = false;
    setChecking(true);
    mlFetchMe(tokens.access_token)
      .then(d => { if (!cancelled) setLive(d); })
      .catch(() => {})
      .finally(() => { if (!cancelled) setChecking(false); });
    const id = setInterval(() => {
      mlFetchMe(tokens.access_token).then(d => { if (!cancelled) setLive(d); }).catch(()=>{});
    }, 5 * 60 * 1000); // nickname não muda; 5min é suficiente e economiza API
    return () => { cancelled = true; clearInterval(id); };
  }, [tokens?.access_token]);

  // Derivar estado final — PRIORIZA /api/tokens/status (server é a fonte da verdade).
  // Antes a lógica marcava como "expired" se mlFetchMe retornasse connected:false,
  // o que acontece por 429/5xx/rede e causava falso alarme.
  let state = 'off';     // 'off' | 'ok' | 'expired' | 'near_expiry'
  const srvMl = srvStatus?.ml;
  if (srvMl) {
    // Srv respondeu — é a palavra final
    if (!srvMl.connected)      state = 'off';
    else if (srvMl.expired)    state = 'expired';
    else if (srvMl.near_expiry) state = 'near_expiry';
    else                        state = 'ok';
  } else if (tokens && tokens.access_token) {
    // Fallback quando srv ainda não respondeu (primeira renderização): confia no local
    state = 'ok';
  }

  return {
    state,
    tokens,
    nickname:   (live?.nickname) || (tokens?.nickname) || null,
    userId:     (live?.user_id)   || (tokens?.user_id)  || null,
    reputation: live?.seller_reputation || tokens?.seller_reputation || null,
    hoursLeft:  srvStatus?.ml?.hours_left != null ? srvStatus.ml.hours_left : null,
    autoRefresh: !!srvStatus?.ml?.auto_refresh,
    srvStatus,
  };
}

// Hook: carrega /api/ml/dashboard + polling leve + 401 detection
function useMLDashboard() {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);
  const [expired, setExpired] = useState(false);

  const refresh = useCallback(async () => {
    const tokens = loadMLTokens();
    if (!tokens) { setData(null); setErr(null); setExpired(false); return; }
    setLoading(true);
    const res = await mlApi('/api/ml/dashboard');
    if (res.expired) { setExpired(true); setData(null); setErr('Token expirado'); }
    else if (res.success) { setData(res); setErr(null); setExpired(false); }
    else { setErr(res.error || 'Falha ao buscar dashboard'); }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  return { data, loading, err, expired, refresh };
}

const formatBRL = (v) => 'R$ ' + v.toFixed(2).replace('.', ',');
const timeAgo = (ts) => {
  const s = Math.max(0, Math.floor((Date.now() - ts)/1000));
  if (s < 10)    return 'agora mesmo';
  if (s < 60)    return `há ${s}s`;
  if (s < 3600)  return `há ${Math.floor(s/60)} min`;
  if (s < 86400) return `há ${Math.floor(s/3600)} h`;
  return `há ${Math.floor(s/86400)} d`;
};

// monta payload exibível a partir do tipo + dados
function buildNotification(type, data = {}) {
  const meta = NOTIF_META[type] || NOTIF_META.venda;
  let title = meta.title, message = '', extra = '';
  if (type === 'venda') {
    title = '🎉 Nova Venda!';
    message = `${formatBRL(data.valor || 0)} — ${data.produto || 'Produto'}`;
    extra = data.comprador ? `Comprador: ${data.comprador}` : '';
  } else if (type === 'pergunta') {
    title = '❓ Nova pergunta';
    message = `Cliente perguntou sobre: ${data.item || 'item'}`;
  } else if (type === 'publicado') {
    title = '✅ Anúncio publicado';
    message = `${data.ml_id || 'MLB000000'} ativo no ar`;
  } else if (type === 'alerta') {
    title = '⚠️ Concorrente baixou preço';
    const v = data.variacao != null ? `(${data.variacao > 0 ? '+' : ''}${data.variacao}%)` : '';
    message = `${data.produto || 'Produto'} agora ${formatBRL(data.valor || 0)} ${v}`.trim();
  } else if (type === 'problema') {
    title = '🔴 Anúncio perdendo exposição';
    message = `Health score caiu para ${(data.score != null ? data.score.toFixed(2) : '0.00')}`;
  }
  return {
    id: `${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    type, title, message, extra,
    icon: meta.icon, color: meta.color, cls: meta.cls, cat: meta.cat,
    ts: Date.now(), read: false,
    raw: data,
  };
}

// ===== Hook principal =====
function useNotifications() {
  const [prefs, setPrefsState] = useState(loadNotifPrefs);
  const [history, setHistory]  = useState(loadNotifHistory);
  const [active, setActive]    = useState([]); // toasts visíveis
  const audioRef = useRef(null);

  // tick — força re-render para atualizar "há X min"
  const [, forceTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => forceTick(t => t + 1), 30000);
    return () => clearInterval(id);
  }, []);

  // sincroniza histórico no localStorage
  useEffect(() => { saveNotifHistory(history); }, [history]);

  const setPrefs = useCallback((updater) => {
    setPrefsState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveNotifPrefs(next);
      return next;
    });
  }, []);

  // Categoria → flag de pref ('vendas' → prefs.vendas etc)
  const isCategoryEnabled = useCallback((cat, p = prefs) => {
    if (cat === 'vendas')     return p.vendas;
    if (cat === 'perguntas')  return p.perguntas;
    if (cat === 'publicados') return p.publicados;
    if (cat === 'alertas')    return p.alertas;
    if (cat === 'problemas')  return p.problemas;
    return true;
  }, [prefs]);

  const playSound = useCallback(() => {
    if (!prefs.som || prefs.volume <= 0) return;
    try {
      // Som curto sintetizado (ching) — sem precisar de arquivo externo
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const vol = (prefs.volume / 100) * 0.25;
      const now = ctx.currentTime;
      [880, 1320, 1760].forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, now + i*0.05);
        g.gain.linearRampToValueAtTime(vol, now + i*0.05 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, now + i*0.05 + 0.6);
        o.connect(g).connect(ctx.destination);
        o.start(now + i*0.05);
        o.stop(now + i*0.05 + 0.65);
      });
      setTimeout(() => ctx.close(), 1200);
    } catch(e) { /* silencioso */ }
  }, [prefs.som, prefs.volume]);

  const fireBrowserNotif = useCallback((notif) => {
    if (!prefs.push) return;
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    try {
      new Notification(notif.title, {
        body: notif.message + (notif.extra ? `\n${notif.extra}` : ''),
        tag: notif.type,
      });
    } catch(e) { /* silencioso */ }
  }, [prefs.push]);

  const dismissToast = useCallback((id) => {
    // marca como leaving para a animação, depois remove
    setActive(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
    setTimeout(() => {
      setActive(prev => prev.filter(t => t.id !== id));
    }, 350);
  }, []);

  const push = useCallback((notif) => {
    if (!isCategoryEnabled(notif.cat)) return;
    // adiciona ao histórico
    setHistory(prev => [notif, ...prev].slice(0, 100));
    // adiciona ao stack visível (máx 5)
    setActive(prev => {
      const next = [notif, ...prev].slice(0, 5);
      return next;
    });
    // efeitos colaterais
    if (notif.type === 'venda') playSound();
    fireBrowserNotif(notif);
    // auto-dismiss após 5s
    setTimeout(() => dismissToast(notif.id), 5000);
  }, [isCategoryEnabled, playSound, fireBrowserNotif, dismissToast]);

  // helper: dispara notificação sintética por tipo (usado pelo botão "Testar")
  const trigger = useCallback((type, data) => {
    push(buildNotification(type, data || {}));
  }, [push]);

  const markAllRead = useCallback(() => {
    setHistory(prev => prev.map(n => ({ ...n, read: true })));
  }, []);

  const markRead = useCallback((id) => {
    setHistory(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
  }, []);

  const clearHistory = useCallback(() => setHistory([]), []);

  const unreadCount = useMemo(() => history.filter(n => !n.read).length, [history]);

  return {
    prefs, setPrefs,
    history, unreadCount,
    active, dismissToast,
    push, trigger,
    markRead, markAllRead, clearHistory,
  };
}

// Score por componente — normalizado 0-100 a partir de valores brutos
function componentScores(p) {
  return {
    velocidade: Math.min(100, p.vendas30d * 2),                  // 50 vendas → 100
    margem:     Math.min(100, p.margem * 200),                   // 50% → 100
    estoque:    Math.min(100, p.estoque * 3),                    // 33+ → 100
    recencia:   p.diasUltima <= 7 ? 100 : Math.max(0, 100 - p.diasUltima * 2),
    qualidade:  p.completude || 80,
    categoria:  p.categoriaEstrategica ? 100 : 60,
    naoML:      p.statusML === 'no_ml' ? 0 : 100,
  };
}
function finalScore(p, weights) {
  const c = componentScores(p);
  const total = Object.entries(weights).reduce((acc,[k,w]) => acc + (c[k]||0) * (w||0) / 100, 0);
  return Math.round(total);
}
function scoreTier(s) {
  if (s >= 80) return { tier:'champion', icon:'🏆', label:'Champion', color:'gold'   };
  if (s >= 60) return { tier:'quente',   icon:'🔥', label:'Quente',   color:'orange' };
  if (s >= 40) return { tier:'morno',    icon:'🌡️', label:'Morno',    color:'yellow' };
  return        { tier:'frio',     icon:'❄️', label:'Frio',     color:'gray'   };
}

// ============================================================
// CSV — parser e gerador minimalistas (sem dependências)
// ============================================================
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').split('\n').filter(l => l.trim().length > 0);
  if (lines.length === 0) return { headers:[], rows:[] };
  const split = (l) => {
    const out = []; let cur = ''; let q = false;
    for (let i=0; i<l.length; i++) {
      const c = l[i];
      if (c === '"') { q = !q; continue; }
      if (c === ',' && !q) { out.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    out.push(cur.trim());
    return out;
  };
  const headers = split(lines[0]).map(h => h.toLowerCase().replace(/\s+/g,'_'));
  const rows = lines.slice(1).map(l => {
    const cols = split(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i] || '');
    return obj;
  });
  return { headers, rows };
}

function downloadCSV(filename, headers, rows) {
  const esc = (v) => {
    const s = String(v ?? '');
    return /[,"\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const lines = [headers.join(',')];
  rows.forEach(r => lines.push(headers.map(h => esc(r[h])).join(',')));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}

// Validador de produto — retorna {ok, warns, errors}
function validateProduct(p) {
  const errors = [], warns = [];
  if (!p.sku || !p.sku.trim())          errors.push('SKU obrigatório');
  if (!p.nome || !p.nome.trim())        errors.push('Nome obrigatório');
  if (!p.custo || isNaN(parseFloat(p.custo))) errors.push('Custo inválido');
  if (!p.marca)                          warns.push('Marca não preenchida');
  if (!p.gtin)                           warns.push('GTIN ausente (recomendado)');
  if (!p.compatibilidades || (Array.isArray(p.compatibilidades) && p.compatibilidades.length === 0))
    warns.push('Sem compatibilidades de veículo');
  return { ok: errors.length === 0, warns, errors };
}

// ============================================================
// useAgentStore — estado global do agente (produtos, fila, logs, status)
// ============================================================
function useAgentStore({ notif } = {}) {
  const [products, setProducts] = useState([]);  // [{sku,nome,marca,...,status,mlId}]
  const [status, setStatus]     = useState('idle'); // idle|running|paused|error
  const [queue, setQueue]       = useState([]);
  const [logs, setLogs]         = useState([]);
  const [config, setConfig]     = useState({
    speed: 'normal',           // slow|normal|fast
    mode: 'auto',              // auto|review|test
    startHour: 8, endHour: 20,
    weekendsPaused: true,
    actions: { publish:true, repricing:true, faq:true, pause:false, remove:false },
  });
  const [metrics, setMetrics]   = useState({ publishedToday: 0, errors: 0, skippedToday: 0, totalTimeMs: 0, totalProcessed: 0 });
  const [errorMsg, setErrorMsg] = useState(null);
  const startedAt = useRef(null);

  const log = useCallback((level, msg) => {
    const ts = new Date();
    const time = ts.toTimeString().slice(0,8);
    setLogs(prev => [...prev, { id: ts.getTime() + Math.random(), time, level, msg }].slice(-300));
  }, []);

  const addProducts = useCallback((arr) => {
    setProducts(prev => {
      const skus = new Set(prev.map(p => p.sku));
      const novos = arr.filter(p => !skus.has(p.sku)).map(p => ({ ...p, status: p.status || 'aguardando' }));
      return [...prev, ...novos];
    });
  }, []);
  const updateProduct = useCallback((sku, patch) => setProducts(prev => prev.map(p => p.sku === sku ? { ...p, ...patch } : p)), []);
  const removeProducts = useCallback((skus) => {
    const set = new Set(skus);
    setProducts(prev => prev.filter(p => !set.has(p.sku)));
  }, []);
  const clearLogs = useCallback(() => setLogs([]), []);

  // Tick do simulador — processa um item da fila a cada N ms (depende de speed)
  useEffect(() => {
    if (status !== 'running') return;
    const speedMs = config.speed === 'slow' ? 4500 : config.speed === 'fast' ? 1400 : 2400;
    const id = setInterval(() => {
      setQueue(prev => {
        if (prev.length === 0) {
          setStatus('idle');
          log('info', '✓ Fila vazia — agente entrou em IDLE.');
          return prev;
        }
        const [task, ...rest] = prev;
        const t0 = Date.now();
        // 7% de chance de erro pra parecer realista
        const fail = Math.random() < 0.07;
        if (fail) {
          log('error', `❌ ${task.action} falhou: ${task.label} — API timeout`);
          setMetrics(m => ({ ...m, errors: m.errors + 1, totalProcessed: m.totalProcessed + 1, totalTimeMs: m.totalTimeMs + (Date.now()-t0) }));
          // 50% chance de reagendar pro fim da fila
          if (Math.random() < 0.5) return [...rest, { ...task, retry: (task.retry||0)+1 }];
          return rest;
        }
        // sucesso
        const mlId = 'MLB' + (3920000 + Math.floor(Math.random()*99999));
        log('info',  `⚡ Processando: ${task.sku}`);
        log('info',  `✨ Título gerado (foco: ${['SEO','Aplicação','Benefício','Oferta'][Math.floor(Math.random()*4)]})`);
        log('ok',    `✅ Publicado → ${mlId} (${task.label})`);
        setProducts(p => p.map(prod => prod.sku === task.sku ? { ...prod, status:'publicado', mlId } : prod));
        setMetrics(m => ({ ...m, publishedToday: m.publishedToday + 1, totalProcessed: m.totalProcessed + 1, totalTimeMs: m.totalTimeMs + (Date.now()-t0) }));
        // dispara notificação (alterna entre publicado e venda)
        if (notif && notif.push) {
          if (Math.random() < 0.35) notif.push(buildNotification('venda', { valor: 100 + Math.random()*400, produto: task.label, comprador: 'Cliente Mock' }));
          else                       notif.push(buildNotification('publicado', { ml_id: mlId }));
        }
        return rest;
      });
    }, speedMs);
    return () => clearInterval(id);
  }, [status, config.speed, log, notif]);

  // ações
  const buildQueueFromProducts = useCallback((only) => {
    const pending = products.filter(p => only ? only.includes(p.sku) : (p.status === 'aguardando' || !p.status));
    return pending.map(p => ({
      id: 'q_'+p.sku+'_'+Math.random().toString(36).slice(2,6),
      sku: p.sku,
      action: 'Publicar',
      label: p.nome || p.sku,
      eta: 2 + Math.floor(Math.random() * 14),
    }));
  }, [products]);

  const start = useCallback(() => {
    if (status === 'running') return;
    if (queue.length === 0) {
      const newQueue = buildQueueFromProducts();
      if (newQueue.length === 0) {
        log('warn', '⚠️ Nenhum produto aguardando. Cadastre produtos antes de iniciar.');
        return;
      }
      setQueue(newQueue);
    }
    startedAt.current = Date.now();
    setStatus('running');
    setErrorMsg(null);
    log('info', '🚀 Agente iniciado');
    log('info', `⚙️ Modo: ${config.mode} · Velocidade: ${config.speed}`);
  }, [status, queue, buildQueueFromProducts, config, log]);

  const pause = useCallback(() => { setStatus('paused'); log('warn', '⏸ Agente pausado pelo usuário'); }, [log]);
  const resume = useCallback(() => { setStatus('running'); log('info', '▶ Agente retomado'); }, [log]);
  const stop  = useCallback(() => { setStatus('idle'); setQueue([]); log('warn', '⏹ Agente parado pelo usuário (fila descartada)'); }, [log]);
  const panic = useCallback(() => { setStatus('idle'); setQueue([]); log('error', '🛑 PARADA DE EMERGÊNCIA acionada'); }, [log]);
  const restart = useCallback(() => {
    setStatus('idle'); setQueue([]); setErrorMsg(null);
    log('info', '🔄 Reiniciando agente...');
    setTimeout(() => {
      const newQueue = buildQueueFromProducts();
      if (newQueue.length > 0) {
        setQueue(newQueue);
        setStatus('running');
        log('info', '🚀 Agente iniciado (após reset)');
      }
    }, 250);
  }, [buildQueueFromProducts, log]);

  const triggerError = useCallback(() => {
    setStatus('error');
    setErrorMsg('API do Mercado Livre retornou 503 (rate limit). Aguarde alguns segundos.');
    log('error', '🔴 Status do agente: ERROR — clique em "Tentar novamente" pra retomar');
  }, [log]);

  // ============================================================
  // startBlingToML — fluxo REAL: puxa Bling, ranqueia, publica no ML
  // 1) GET /api/bling/produtos
  // 2) Score via finalScore() + pesos atuais
  // 3) Filtra score >= criteria.scoreMin e limita a criteria.perDay
  // 4) POST /api/publicar (um por vez, log/progresso em tempo real)
  // 5) Atualiza produtos locais com status publicado/erro
  // ============================================================
  const startBlingToML = useCallback(async () => {
    if (status === 'running') { log('warn','Agente já está rodando'); return; }
    const bling = loadBlingTokens(); const ml = loadMLTokens();
    if (!bling?.access_token) { log('error','❌ Bling não conectado — conecte em 🔌 Integrações'); return; }
    if (!ml?.access_token)    { log('error','❌ Mercado Livre não conectado — conecte em 🔌 Integrações'); return; }

    setStatus('running'); setErrorMsg(null);
    startedAt.current = Date.now();
    log('info','🚀 Agente REAL iniciado — Bling → Mercado Livre');
    log('info','🎯 Usando pipeline com qualificação 13 critérios');

    const criteriaNow = loadCriteria();
    const max = criteriaNow.perDay || 10;

    // Varre múltiplas páginas até encontrar produtos PRONTOs (página 1 geralmente
    // tem produtos novos sem foto). Páginas 5+ tendem a ter produtos antigos
    // com fotos cadastradas.
    let publicadosTotal = 0;
    let skipsTotal = 0;
    let falhasTotal = 0;
    let paginaAtual = 5;       // começa na página 5 que sabidamente tem PRONTOs
    const maxPaginas = 10;     // varre até página 14 no máximo

    while (publicadosTotal < max && paginaAtual < (5 + maxPaginas)) {
      log('info', `📥 Buscando produtos qualificados na página ${paginaAtual}…`);

      const restante = max - publicadosTotal;
      try {
        const t0Page = Date.now();
        const resp = await fetch('/api/agente/publicar-fila', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pagina: paginaAtual,
            limite: 10,
            max: restante,
            dryRun: false,
            somenteSelo: ['OURO','PRONTO'],
          }),
        });
        const data = await resp.json();

        if (!data.success) {
          log('error', `❌ Erro: ${data.error || 'desconhecido'}`);
          break;
        }

        const totais = data.totais || {};
        log('info', `📊 Página ${paginaAtual}: ${totais.OURO||0} OURO · ${totais.PRONTO||0} PRONTO · ${totais.BLOQUEADO||0} BLOQUEADO`);

        if ((data.resultados || []).length === 0) {
          log('info', `⚠️ Nenhum produto elegível na página ${paginaAtual}, indo pra próxima`);
          paginaAtual++;
          continue;
        }

        // Tempo médio rateado (delta da página / nº de itens) — alimenta avgTimeMs do dashboard
        const tDelta = Date.now() - t0Page;
        const itensPag = data.resultados.length || 1;
        const msPorItem = Math.max(0, Math.round(tDelta / itensPag));

        for (const r of data.resultados) {
          if (r.status === 'publicado') {
            publicadosTotal++;
            log('ok', `✅ [${publicadosTotal}/${max}] ${r.titulo} → ${r.mlb_id}`);
            // Dashboard: incrementa publicados + processado + tempo
            setMetrics(m => ({
              ...m,
              publishedToday: m.publishedToday + 1,
              totalProcessed: m.totalProcessed + 1,
              totalTimeMs:    m.totalTimeMs + msPorItem,
            }));
          } else if (r.status === 'skipped') {
            // SKIP visível: NÃO conta como erro, NÃO conta como publicação,
            // NÃO consome limite diário (publicadosTotal não incrementa)
            skipsTotal++;
            const mlbStr = r.mlb_existente?.[0] || '';
            const txt = r.skipMensagem
              || (mlbStr ? `⏭️ Pulado — já publicado (${mlbStr})` : '⏭️ Pulado — já publicado');
            log('info', `${txt} · ${r.titulo}`);
            // Dashboard: incrementa só skip + processado (sem publishedToday, sem errors)
            setMetrics(m => ({
              ...m,
              skippedToday:   (m.skippedToday || 0) + 1,
              totalProcessed: m.totalProcessed + 1,
              totalTimeMs:    m.totalTimeMs + msPorItem,
            }));
          } else {
            falhasTotal++;
            log('error', `❌ ${r.titulo}: ${r.erro || 'falhou'}`);
            // Dashboard: incrementa erros + processado
            setMetrics(m => ({
              ...m,
              errors:         m.errors + 1,
              totalProcessed: m.totalProcessed + 1,
              totalTimeMs:    m.totalTimeMs + msPorItem,
            }));
          }
        }

        paginaAtual++;
      } catch (e) {
        log('error', `❌ Falha de rede: ${e.message}`);
        break;
      }
    }

    // Resumo final — separa publicações de skips de falhas
    const partes = [`${publicadosTotal} publicado(s)`];
    if (skipsTotal > 0) partes.push(`${skipsTotal} pulado(s) (já publicados)`);
    partes.push(`${falhasTotal} falha(s)`);
    log('info', `🏁 Concluído — ${partes.join(', ')}`);
    setStatus('idle');
  }, [status]);

  // contadores derivados
  const counts = useMemo(() => ({
    total:     products.length,
    aguardando: products.filter(p => (p.status||'aguardando') === 'aguardando').length,
    publicados: products.filter(p => p.status === 'publicado').length,
    pausados:  products.filter(p => p.status === 'pausado').length,
    erros:     products.filter(p => p.status === 'erro').length,
  }), [products]);

  const avgTimeMs = metrics.totalProcessed > 0 ? Math.round(metrics.totalTimeMs / metrics.totalProcessed) : 0;

  return {
    products, addProducts, updateProduct, removeProducts, counts,
    status, queue, setQueue, logs, log, clearLogs,
    config, setConfig, metrics: { ...metrics, avgTimeMs },
    errorMsg, triggerError,
    start, pause, resume, stop, panic, restart,
    startBlingToML,
  };
}

// ============================================================
// MASCOTE — imagem PNG externa com overlay de badge, caixinha e caption
// Caminhos tentados, em ordem:
//   1. /public/mascote-leao.png  (padrão Next.js — caminho preferido pela spec)
//   2. /mascote-leao.png         (raiz do projeto — fallback p/ compat)
//   3. /leao-ref.jpg             (fallback com mix-blend-mode: screen)
//   4. placeholder com instruções
// ============================================================
function Mascot(){
  // Estados: 'publicPng' → 'rootPng' → 'jpg' → 'none'
  const [src, setSrc] = useState('publicPng');
  const handleError = () => setSrc(s =>
    s === 'publicPng' ? 'rootPng' :
    s === 'rootPng'   ? 'jpg'     :
                        'none'
  );
  const srcUrl =
    src === 'publicPng' ? '/public/mascote-leao.png' :
    src === 'rootPng'   ? '/mascote-leao.png'        :
                          '/leao-ref.jpg';
  // PNGs (public ou raiz) assumidos como já limpos; só o JPG precisa de screen+mask
  const isClean = src === 'publicPng' || src === 'rootPng';

  // partículas verdes flutuando ao redor — posições aleatórias mas estáveis
  const particles = [
    {left:'10%', top:'20%', delay:'0s'},
    {left:'85%', top:'30%', delay:'1.2s'},
    {left:'20%', top:'70%', delay:'2.4s'},
    {left:'78%', top:'65%', delay:'0.8s'},
    {left:'50%', top:'10%', delay:'3.2s'},
    {left:'5%',  top:'50%', delay:'1.8s'},
  ];
  return (
    <div className="mascote-box">
      <div style={{position:'relative'}}>
        <RevenueBackdrop/>
        {src !== 'none' ? (
          <img
            key={src}
            src={srcUrl}
            alt="Mascote AM — Agente Marketplace"
            className={`mascote-login ${isClean ? 'is-clean' : 'needs-mask'}`}
            onError={handleError}
          />
        ) : (
          <div className="mascote-placeholder">
            <div style={{fontSize:'64px'}}>🦁</div>
            <p className="font-bold" style={{color:'var(--green)'}}>Mascote não encontrado</p>
            <p className="sub text-xs">
              Salve o PNG (fundo preto ou transparente) em:
            </p>
            <code className="mono text-[10px]" style={{color:'var(--green)',wordBreak:'break-all',padding:'6px 10px',background:'var(--card)',borderRadius:'6px'}}>
              /public/mascote-leao.png
            </code>
            <p className="sub text-[10px]" style={{lineHeight:1.4}}>
              pasta absoluta:<br/>
              <span className="mono">C:\Users\User\Desktop\claude code\public\</span>
            </p>
            <p className="sub text-[10px]">(também aceita o arquivo na raiz: <span className="mono">/mascote-leao.png</span>)</p>
            <p className="text-xs" style={{color:'var(--green)'}}>↻ depois atualize a página</p>
          </div>
        )}
        {/* Badge "AM" no canto */}
        <div className="mascote-badge">AM</div>
        {/* Caixa de Entrega Expressa — SVG isométrica */}
        <DeliveryBox/>
        {/* Partículas brilhando ao redor */}
        {particles.map((p,i)=>(
          <span key={i} className="mascote-particle" style={{left:p.left,top:p.top,animationDelay:p.delay}}/>
        ))}
      </div>
      <p className="mascote-caption">SEU AGENTE DE FATURAMENTO</p>
    </div>
  );
}

function Signup({onGo, onSignup}){
  const [name,setName] = useState('');
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [pw2,setPw2] = useState('');
  const [store,setStore] = useState('');
  const [accept,setAccept] = useState(false);
  const [err,setErr] = useState('');
  const [pwFocus,setPwFocus] = useState(false);

  const strength = useMemo(()=>{
    if (!pw) return {level:0,label:'',color:''};
    let s = 0;
    if (pw.length >= 6) s++;
    if (pw.length >= 10) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^a-zA-Z0-9]/.test(pw)) s++;
    if (s<=2) return {level:1,label:'fraca',color:'var(--red)'};
    if (s<=3) return {level:2,label:'média',color:'var(--yellow)'};
    return {level:3,label:'forte',color:'var(--green)'};
  },[pw]);

  const [loading,setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setErr('Email inválido');
    if (pw.length < 6) return setErr('Senha precisa ter no mínimo 6 caracteres');
    if (pw !== pw2) return setErr('As senhas não coincidem');
    if (!accept) return setErr('Você precisa aceitar os termos de uso');
    setLoading(true);
    try {
      await apiSignup({ name, email, password:pw, store });
      onSignup(email);
    } catch(ex) {
      setErr(ex.message);
    } finally { setLoading(false); }
  };

  return (
    <AuthShell title="Criar Conta" subtitle="Registre-se para operar o agente" eyesCovered={pwFocus}
      footerContent={
        <p className="text-center sub text-xs mt-5">
          Já tem conta? <span className="link" onClick={()=>onGo('login')}>Faça login</span>
        </p>
      }>
      {err && <div className="err mb-4">{err}</div>}
      <form onSubmit={submit} className="space-y-3">
        <div><label className="label">Nome completo</label><input className="input" value={name} onChange={e=>setName(e.target.value)} required/></div>
        <div><label className="label">Email</label><input type="email" className="input" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
        <div>
          <label className="label">Senha</label>
          <input type="password" className="input" value={pw} onChange={e=>setPw(e.target.value)} onFocus={()=>setPwFocus(true)} onBlur={()=>setPwFocus(false)} required/>
          {pw && (
            <div className="flex items-center gap-2 mt-2">
              <div className="flex-1 h-1 rounded-full bg-[var(--line)] overflow-hidden">
                <div style={{width:`${strength.level*33.3}%`,height:'100%',background:strength.color,transition:'.2s'}}/>
              </div>
              <span className="text-[11px] mono" style={{color:strength.color}}>{strength.label}</span>
            </div>
          )}
        </div>
        <div><label className="label">Confirmar senha</label><input type="password" className="input" value={pw2} onChange={e=>setPw2(e.target.value)} onFocus={()=>setPwFocus(true)} onBlur={()=>setPwFocus(false)} required/></div>
        <div><label className="label">Nome da loja no ML <span className="sub">(opcional)</span></label><input className="input" value={store} onChange={e=>setStore(e.target.value)} placeholder="ex: AutoPeças Rio"/></div>
        <label className="flex items-start gap-2 text-xs sub cursor-pointer pt-1">
          <input type="checkbox" checked={accept} onChange={e=>setAccept(e.target.checked)} className="mt-0.5"/>
          <span>Concordo com os <span className="link">termos de uso</span> e política de privacidade</span>
        </label>
        <button type="submit" className="btn !mt-5" disabled={loading}>{loading?'Criando conta…':'Criar Conta'}</button>
      </form>
    </AuthShell>
  );
}

// Painel lateral com histórico
function NotificationsPanel({ open, onClose, history, onMarkAllRead, onMarkRead, onClear }) {
  const [filter, setFilter] = useState('all');
  if (!open) return null;

  const filtered = history.filter(n => {
    if (filter === 'all') return true;
    if (filter === 'vendas')    return n.type === 'venda';
    if (filter === 'perguntas') return n.type === 'pergunta';
    if (filter === 'alertas')   return n.type === 'alerta' || n.type === 'problema';
    return true;
  });

  const unread = history.filter(n => !n.read).length;

  return (
    <>
      <div className="notif-overlay" onClick={onClose}/>
      <aside className="notif-panel" role="dialog" aria-label="Histórico de notificações">
        <header>
          <div>
            <h3 className="font-bold text-base">Notificações</h3>
            <p className="sub text-xs mt-0.5">{unread} não {unread===1?'lida':'lidas'} · {history.length} no total</p>
          </div>
          <div className="flex items-center gap-2">
            <button className="btn-ghost" onClick={onMarkAllRead} style={{padding:'6px 10px',fontSize:12}} disabled={unread===0}>Marcar todas como lidas</button>
            <button className="notif-close" style={{position:'static'}} onClick={onClose} aria-label="Fechar painel">×</button>
          </div>
        </header>
        <div className="filters">
          {[['all','Todas'],['vendas','Vendas'],['perguntas','Perguntas'],['alertas','Alertas']].map(([k,lbl])=>(
            <button key={k} className={`filter-chip ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{lbl}</button>
          ))}
        </div>
        <div className="list">
          {filtered.length === 0 ? (
            <div className="notif-empty">
              <div style={{fontSize:32,marginBottom:8}}>🔕</div>
              Nenhuma notificação {filter !== 'all' ? `em "${filter}"` : 'ainda'}.
            </div>
          ) : (
            filtered.map(n => (
              <div key={n.id} className={`notif-row ${!n.read?'unread':''}`} onClick={()=>onMarkRead(n.id)}>
                <div className="notif-icon">{n.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="row-title">{n.title}</div>
                  <div className="row-msg">{n.message}</div>
                  {n.extra && <div className="row-msg" style={{opacity:.7}}>{n.extra}</div>}

                </div>
                {!n.read && <div className="unread-dot" title="Não lida"/>}

        </div>
        <div className="panel-footer">
          <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={onClear} disabled={history.length===0}>Limpar tudo</button>
          <span className="text-xs sub mono">histórico local · {history.length}/100</span>
        </div>
      </aside>
    </>
  );

// Indicador global ML — pílula colorida no header
// 🟢 conectado (auto-refresh OK) · 🟡 expira em breve · 🟠 expirado · 🔴 sem token
function MLStatusIndicator({onClickConnect}){
  const st = useMLConnectionStatus();
  const [refreshing, setRefreshing] = useState(false);

  // Monta rotulagem baseada no estado + hoursLeft
  const hoursLeftTxt = st.hoursLeft != null
    ? (st.hoursLeft >= 1 ? `${st.hoursLeft.toFixed(1)}h` : `${Math.round(st.hoursLeft*60)}min`)
    : null;

  let cfg;
  if (st.state === 'ok') {
    // Verde: conectado e válido. Mostra horas restantes (5h, <1h etc).
    cfg = {
      dot:'#22c55e', bg:'rgba(34,197,94,.12)', border:'rgba(34,197,94,.4)',
      label: hoursLeftTxt ? `🟢 ML · ${hoursLeftTxt}` : '🟢 ML',
      sub: st.nickname || st.userId || (st.autoRefresh ? 'auto ✓' : 'online'),
    };
  } else if (st.state === 'near_expiry') {
    // Amarelo: expira em <1h. Auto-refresh cobre — não alarma muito.
    cfg = {
      dot:'#facc15', bg:'rgba(234,179,8,.12)', border:'rgba(234,179,8,.4)',
      label: refreshing ? '🔄 renovando...' : (hoursLeftTxt ? `🟡 ML · ${hoursLeftTxt}` : '🟡 ML · <1h'),
      sub: st.autoRefresh ? 'auto-refresh' : 'renovar',
    };
  } else if (st.state === 'expired') {
    cfg = {
      dot:'#ef4444', bg:'rgba(239,68,68,.12)', border:'rgba(239,68,68,.4)',
      label:'🔴 ML desconectado',
      sub: st.autoRefresh ? 'clicar p/ renovar' : 'reconectar',
    };
  } else {
    // 'off' — sem token. Se srv nem respondeu ainda, mostra cinza ao invés de vermelho
    const srvRespondeu = !!st.srvStatus;
    cfg = srvRespondeu
      ? { dot:'#ef4444', bg:'rgba(239,68,68,.12)', border:'rgba(239,68,68,.4)',
          label:'🔴 ML desconectado', sub:'Conectar' }
      : { dot:'#666',    bg:'rgba(255,255,255,.05)', border:'rgba(255,255,255,.12)',
          label:'⚪ ML · ?', sub:'verificando...' };
  }

  // Ação: se expirado/near_expiry e tem auto_refresh no server, tenta renovar
  const onClick = async () => {
    if (refreshing) return;
    if ((st.state === 'expired' || st.state === 'near_expiry') && st.autoRefresh) {
      setRefreshing(true);
      const r = await forceRefreshMLServer();
      setRefreshing(false);
      if (r.success) {
        // Puxa o token novo do servidor e atualiza localStorage
        const merged = await syncMLTokensFromServer();
        if (merged) {
          // force state refresh
          window.dispatchEvent(new Event('storage'));
        }
        return;
      }
      // refresh falhou → abre Integrações para reconexão manual
    }
    onClickConnect && onClickConnect();
  };

  return (
    <button
      onClick={onClick}
      title={
        st.state === 'ok'
          ? `Conectado como ${st.nickname || st.userId || '—'}${hoursLeftTxt ? ' · expira em ' + hoursLeftTxt : ''}${st.autoRefresh ? ' · auto-refresh habilitado' : ''}`
          : st.state === 'near_expiry'
            ? `Token expira em ${hoursLeftTxt || 'breve'} — clique para renovar agora`
            : st.state === 'expired'
              ? (st.autoRefresh ? 'Clique para renovar (auto-refresh disponível)' : 'Reconecte na aba Integrações')
              : 'Abrir aba 🔌 Integrações para conectar'
      }
      disabled={refreshing}
      className="ml-status-pill"
      style={{
        display:'inline-flex', alignItems:'center', gap:8,
        padding:'6px 12px', borderRadius:999,
        background: cfg.bg, border:'1px solid ' + cfg.border,
        color:'var(--txt)', fontSize:12, fontWeight:700,
        cursor: refreshing ? 'wait' : 'pointer', transition:'.15s',
        opacity: refreshing ? .7 : 1,
      }}
    >
      <span style={{width:8, height:8, borderRadius:'50%', background:cfg.dot, boxShadow:`0 0 8px ${cfg.dot}`}}/>
      <span className="hidden sm:inline">{cfg.label}</span>
      <span className="mono sub text-[11px]">{cfg.sub}</span>
    </button>
  );
}

// Badge compacto de perguntas SAC pendentes no header — clicável
function SACHeaderBadge(){
  const [total, setTotal] = useState(null);
  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setTotal(null); return; }
    try {
      const r = await fetch('/api/ml/sac/pendentes', { headers:{ 'Authorization':'Bearer '+ml.access_token }});
      const d = await r.json().catch(()=>({}));
      if (d.success) setTotal(d.total || 0);
    } catch(_){}
  }, []);
  useEffect(() => { refresh(); const id = setInterval(refresh, 60_000); return () => clearInterval(id); }, [refresh]);
  if (total == null || total === 0) return null;
  return (
    <span className="chip"
      style={{color:'var(--yellow)', borderColor:'rgba(234,179,8,.5)', fontSize:11, cursor:'pointer'}}
      title="Perguntas SAC pendentes — clique para ir à Visão Geral">
      💬 {total}
    </span>
  );
}

// ErrorBoundary genérico — isola falha de um card pra não quebrar a página
class CardErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ console.warn('[CardErrorBoundary]', this.props.label || '?', err, info); }
  render(){
    if (this.state.err) {
      return (
        <div className="card p-5 mb-6" style={{borderColor:'rgba(234,179,8,.35)'}}>
          <div className="flex items-center gap-3">
            <div className="text-2xl">⚠️</div>
            <div className="flex-1">
              <div className="font-bold">{this.props.label || 'Card'}</div>
              <div className="sub text-xs mt-1">— dados indisponíveis no momento</div>
            </div>
            <button className="btn-ghost" onClick={()=>this.setState({ err:null })}>🔄 Tentar</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// Banner de status do token ML — consulta /api/tokens/status (fonte da verdade do server)
// Mostra banner SÓ quando expired === true.
// Se near_expiry, mostra aviso amarelo leve (não bloqueia).
// Se tudo ok, renderiza null.
function MLTokenExpiredBanner(){
  const [st, setSt] = useState(null);
  const [demo, toggleDemo] = useDemoMode();
  useEffect(() => {
    let alive = true;
    const fetchStatus = async () => {
      try {
        const r = await fetch('/api/tokens/status');
        const d = await r.json();
        if (alive && d?.ml) setSt(d.ml);
      } catch(_){ if (alive) setSt(null); }
    };
    fetchStatus();
    const id = setInterval(fetchStatus, 60_000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  // Se o modo demo está ativo, nunca mostra banner de erro (demo substitui os dados)
  if (demo) return null;
  if (!st) return null;
  // Sem token = não mostra banner aqui (o usuário vê o bloco de "Conecte ML")
  if (!st.connected) return null;
  if (st.expired) {
    return (
      <div className="err mb-4 flex items-center gap-3 flex-wrap">
        <span>🔴 Token do Mercado Livre expirou — reconecte na aba <span className="mono">🔌 Integrações</span> para voltar a ver dados reais.</span>
        <button className="btn-ghost text-xs ml-auto" onClick={() => toggleDemo(true)}>🎭 Ver com dados demo</button>
      </div>
    );
  }
  if (st.near_expiry && !st.auto_refresh) {
    // Só alerta se NÃO tem auto-refresh (refresh_token). Com auto-refresh, silencioso.
    return (
      <div className="mb-4 p-3 rounded-lg flex items-center gap-3 flex-wrap text-xs"
        style={{background:'rgba(234,179,8,.08)', border:'1px solid rgba(234,179,8,.35)', color:'var(--yellow)'}}>
        <span>🟡 Token expirando em breve — sem refresh_token cadastrado. Reconecte na aba <span className="mono">🔌 Integrações</span>.</span>
        <button className="btn-ghost text-xs ml-auto" onClick={() => toggleDemo(true)}>🎭 Ver com dados demo</button>
      </div>
    );
  }
  return null;
}

// Card: status da compatibilidade automática (IA resolve sozinha)
function CompatCard({ compat }){
  const pendCount = compat.pend?.total ?? null;
  const s = compat.stats;
  const ultima = s?.ultima ? new Date(s.ultima) : null;
  const ultimaVer = s?.ultimaVerificacao ? new Date(s.ultimaVerificacao) : null;
  const hAgo = (d) => {
    if (!d) return null;
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 1) return 'agora';
    if (diff < 60) return `há ${Math.round(diff)} min`;
    return `há ${Math.round(diff/60)} h`;
  };
  const temPendente = pendCount != null && pendCount > 0;

// =============== WEBHOOKS ML — TEMPO REAL ===============
function useWebhooks(){
  const [status, setStatus]   = useState(null);
  const [vendas, setVendas]   = useState(null);
  const [perdidas, setPerdidas] = useState(null);
  const [busy, setBusy]       = useState(false);
  const lastVendaIdRef        = useRef(null);
  const [novaVendaToast, setNovaVendaToast] = useState(null);

  const refresh = useCallback(async () => {
    try {
      const [sR, vR] = await Promise.all([
        fetch('/api/webhooks/status'),
        fetch('/api/webhooks/vendas'),
      ]);
      const sJ = await sR.json().catch(()=>null);
      const vJ = await vR.json().catch(()=>null);
      if (sJ?.success) setStatus(sJ);
      if (vJ?.success) {
        setVendas(vJ);
        // Detectar venda nova (primeira vez que carrega NÃO mostra)
        const primeira = vJ.vendas?.[0];
        if (primeira) {
          if (lastVendaIdRef.current != null && primeira.orderId !== lastVendaIdRef.current) {
            setNovaVendaToast({
              valor: primeira.valor,
              item: primeira.items?.[0]?.titulo || 'venda ML',
              orderId: primeira.orderId,
              ts: Date.now(),
            });
            // Som (se disponível)
            try { new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAAD//wA=').play().catch(()=>{}); } catch(_){}
          }
          lastVendaIdRef.current = primeira.orderId;
        }
      }
    } catch(_){}
  }, []);

  const checkPerdidas = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return;
    setBusy(true);
    try {
      const r = await fetch('/api/webhooks/perdidas', { headers:{ 'Authorization':'Bearer '+ml.access_token }});
      const d = await r.json().catch(()=>null);
      if (d?.success) setPerdidas(d.perdidas);
    } catch(_){}
    finally { setBusy(false); }
  }, []);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 30_000);
    return () => clearInterval(id);
  }, [refresh]);

  return { status, vendas, perdidas, busy, refresh, checkPerdidas, novaVendaToast, setNovaVendaToast };
}

// =============== SAC — PERGUNTAS AUTOMÁTICAS ===============
const SAC_CFG_KEY = 'sac_config';
function loadSACCfg(){
  try { return JSON.parse(localStorage.getItem(SAC_CFG_KEY) || '{}'); } catch(_){ return {}; }
}
function saveSACCfg(c){ try { localStorage.setItem(SAC_CFG_KEY, JSON.stringify(c)); } catch(_){} }

function useSAC(){
  const [pendentes, setPendentes] = useState(null);
  const [stats, setStats]         = useState(null);
  const [historico, setHistorico] = useState([]); // respondidas recentes
  const [busy, setBusy]           = useState(false);
  const [msg, setMsg]             = useState(null);
  const [cfg, setCfgState]        = useState(() => ({
    modoAutomatico:   false,
    horarioComercial: false,
    monitor10min:     true,
    ...loadSACCfg(),
  }));

  const setCfg = (patch) => {
    const n = { ...cfg, ...patch };
    setCfgState(n); saveSACCfg(n);
  };

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setPendentes(null); setStats(null); return; }
    try {
      const [pR, sR] = await Promise.all([
        fetch('/api/ml/sac/pendentes', { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
        fetch('/api/ml/sac/stats'),
      ]);
      const pJ = await pR.json().catch(()=>null);
      const sJ = await sR.json().catch(()=>null);
      if (pJ?.success) setPendentes(pJ);
      if (sJ?.success) {
        setStats(sJ);
        setHistorico(sJ.historico || []);
      }
    } catch(_){}
  }, []);

  const gerarPreview = useCallback(async (pergunta) => {
    const ml = loadMLTokens();
    const r = await fetch('/api/ml/sac/auto-responder', {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
      body: JSON.stringify({ questionId: pergunta.id, pergunta: pergunta.texto, itemId: pergunta.itemId }),
    });
    return await r.json().catch(()=>({ success:false }));
  }, []);

  const enviar = useCallback(async (questionId, texto) => {
    const ml = loadMLTokens();
    const r = await fetch('/api/ml/sac/responder', {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
      body: JSON.stringify({ questionId, texto }),
    });
    const d = await r.json().catch(()=>({ success:false }));
    await refresh();
    return d;
  }, [refresh]);

  const excluir = useCallback(async (questionId) => {
    const ml = loadMLTokens();
    const r = await fetch(`/api/ml/sac/excluir/${questionId}`, {
      method:'DELETE', headers:{ 'Authorization':'Bearer '+ml.access_token }});
    const d = await r.json().catch(()=>({ success:false }));
    await refresh();
    return d;
  }, [refresh]);

  const responderTodas = useCallback(async (modoAutomatico = false) => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return;
    setBusy(true); setMsg(null);
    try {
      const r = await fetch('/api/ml/sac/auto-responder-todos', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
        body: JSON.stringify({ modoAutomatico, horarioComercial: cfg.horarioComercial }),
      });
      const d = await r.json().catch(()=>({ success:false }));
      if (d.success) {
        setMsg(modoAutomatico
          ? `💬 ${d.respondidas||0}/${d.total||0} perguntas respondidas automaticamente`
          : `👁️ ${d.total||0} previews gerados — revise cada um antes de enviar`);
      } else {
        setMsg('❌ ' + (d.error || d.mensagem || 'falha'));
      }
      await refresh();
      return d;
    } catch(e) { setMsg('❌ '+e.message); return null; }
    finally { setBusy(false); }
  }, [cfg.horarioComercial, refresh]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 60_000);
    return () => clearInterval(id);
  }, [refresh]);

  return { pendentes, stats, historico, busy, msg, cfg, setCfg,
           refresh, gerarPreview, enviar, excluir, responderTodas };
}

// Card compacto de despacho — SLA dos envios pagos pendentes
function DespachoCompactCard({ onGoToEnvios }){
  const [sla, setSla] = useState(null);
  const [loading, setLoading] = useState(false);
  const tokens = loadMLTokens();

  const refresh = useCallback(async () => {
    if (!tokens?.access_token) { setSla(null); return; }
    setLoading(true);
    try {
      const r = await fetch('/api/ml/pedidos/urgentes', {
        headers: { 'Authorization': 'Bearer ' + tokens.access_token }
      });
      const d = await r.json();
      if (d.success) setSla(d);
    } catch(_){}
    setLoading(false);
  }, [tokens?.access_token]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 60_000);
    return () => clearInterval(id);
  }, [refresh]);

  const urgentes = sla?.alertas || 0;
  const atencao  = sla?.atencao || 0;
  const total    = sla?.total   || 0;

  const cor = urgentes > 0 ? '#ef4444' : atencao > 0 ? '#eab308' : '#22c55e';
  const titulo = urgentes > 0 ? `🚨 ${urgentes} com prazo < 6h!`
               : atencao > 0  ? `⚠️ ${atencao} com prazo < 12h`
               : total > 0    ? `✅ ${total} envio(s) dentro do prazo`
               :                '✅ Nenhum envio pendente';

  return (
    <div className="card p-5" style={{borderColor: cor + '55'}}>
      <div className="flex items-start gap-3">
        <div className="text-2xl">🚚</div>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-sm">Despacho</div>
          <div className="text-xs mt-1" style={{color:cor}}>
            {loading && !sla ? '⏳ Carregando…' : titulo}
          </div>
          <div className="sub text-[11px] mt-1">
            {urgentes > 0 ? 'Envie agora para não levar reputação negativa'
             : atencao > 0 ? 'Planeje o despacho antes do vencimento'
             : total > 0   ? 'Tudo no prazo — parabéns!'
             : 'Quando novas vendas chegarem, aparecem aqui'}
          </div>
        </div>
      </div>
      {total > 0 && (
        <button className="btn-ghost mt-3 w-full" style={{padding:'6px 10px', fontSize:12}} onClick={onGoToEnvios}>
          Ver Envios →
        </button>
      )}
    </div>
  );
}

// Card compacto de SAC pra Visão Geral
function SACCard({ sac, onExpand }){
  const total = sac.pendentes?.total ?? null;
  const temPend = total != null && total > 0;
  const respondidas = sac.stats?.respondidas || 0;
  return (
    <div className="card p-5 mb-6" style={{borderColor: temPend ? 'rgba(234,179,8,.45)' : 'rgba(34,197,94,.35)'}}>
      <div className="flex items-start gap-4 flex-wrap">
        <div className="text-3xl">💬</div>
        <div className="flex-1 min-w-[260px]">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold">SAC — Perguntas do Mercado Livre</h3>
            <span className="chip" style={{color: temPend?'var(--yellow)':'var(--green)', borderColor: temPend?'rgba(234,179,8,.5)':'rgba(34,197,94,.5)', fontSize:11}}>
              {temPend ? `⚠️ ${total} pendente(s)` : '✅ Sem pendências'}
            </span>
            <span className="chip" style={{fontSize:11}}>🤖 IA responde</span>
          </div>
          <p className="sub text-xs mt-1">
            {temPend
              ? <>Clique <b>Responder Todas (IA)</b> pra limpar a fila em segundos. TMR baixo = ML prioriza seus anúncios.</>
              : <>IA respondeu <span className="mono" style={{color:'var(--green)'}}>{respondidas}</span> automaticamente. Monitor roda a cada 10 min.</>}
          </p>
          {sac.msg && <p className="sub text-xs mt-2 mono">{sac.msg}</p>}
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn-ghost" onClick={sac.refresh} disabled={sac.busy}>🔄 Atualizar</button>
          <button className="btn-ghost" onClick={onExpand}>👁️ Revisar</button>
          <button className="btn" style={{width:'auto', padding:'10px 16px'}}
            onClick={() => sac.responderTodas(true)} disabled={sac.busy || !temPend}>
            {sac.busy ? '🔄 respondendo...' : '🤖 Responder Todas (IA)'}
          </button>
        </div>
      </div>
      {sac.historico?.length > 0 && (
        <div className="mt-3 pt-3 border-t border-[var(--line)]">
          <div className="sub text-xs mb-2 font-semibold">Últimas respondidas</div>
          <div className="space-y-1">
            {sac.historico.slice(0,4).map((h,i) => (
              <div key={i} className="text-xs flex gap-3 flex-wrap items-center">
                <span className="sub mono">{new Date(h.ts).toLocaleTimeString('pt-BR')}</span>
                <span className="chip" style={{fontSize:10, padding:'1px 6px'}}>{h.categoria}</span>
                <span className="sub truncate" style={{maxWidth:400}}>"{h.pergunta}"</span>
                {h.enviada && <span style={{color:'var(--green)'}}>✅</span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// Painel completo — modal com lista de pendentes + previews + config
// Com prop inline=true, vira painel inline (sem overlay fixed)
function SACPanel({ sac, onClose, inline }){
  const [previews, setPreviews] = useState({}); // { questionId: { resposta, categoria } }
  const [edits, setEdits]       = useState({}); // { questionId: string }

  const carregarPreview = async (p) => {
    if (previews[p.id]) return;
    const d = await sac.gerarPreview(p);
    if (d.success) {
      setPreviews(prev => ({ ...prev, [p.id]: { resposta: d.respostaGerada, categoria: d.categoriaDetectada }}));
    }
  };

  useEffect(() => {
    (sac.pendentes?.perguntas || []).forEach(p => carregarPreview(p));
  }, [sac.pendentes]);

  const enviarUma = async (p) => {
    const texto = edits[p.id] ?? previews[p.id]?.resposta;
    if (!texto) return;
    const d = await sac.enviar(p.id, texto);
    if (d.success) {
      setPreviews(prev => { const n = { ...prev }; delete n[p.id]; return n; });
    } else {
      alert('❌ ' + (d.error || 'Erro ao enviar'));
    }
  };

  const excluirUma = async (p) => {
    if (!confirm('Excluir esta pergunta? (use só para spam/concorrente)')) return;
    await sac.excluir(p.id);
    setPreviews(prev => { const n = { ...prev }; delete n[p.id]; return n; });
  };

  const perguntas = sac.pendentes?.perguntas || [];
  const innerContent = (
      <div onClick={e=>e.stopPropagation()} className="card" style={inline
          ? { width:'100%', padding:24 }
          : { maxWidth:860,width:'100%',maxHeight:'92vh',overflow:'auto',padding:24 }}>
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <h3 className="font-bold text-lg">💬 Central de Perguntas SAC</h3>
          <div className="flex gap-2">
            <button className="btn-ghost" onClick={sac.refresh} disabled={sac.busy}>🔄 Atualizar</button>
            <button className="btn" style={{padding:'6px 14px'}}
              onClick={() => sac.responderTodas(true)} disabled={sac.busy || !perguntas.length}>
              🤖 Auto-Responder Todas
            </button>
            {!inline && <button className="btn-ghost" onClick={onClose} style={{padding:'4px 10px'}}>✕</button>}
          </div>
        </div>

        {/* Config */}
        <div className="card2 p-3 mb-3">
          <div className="sub text-[11px] uppercase tracking-wide mb-2">Configuração</div>
          <label className="flex items-center gap-2 text-sm cursor-pointer mb-1">
            <input type="checkbox" checked={sac.cfg.modoAutomatico} onChange={e=>sac.setCfg({ modoAutomatico: e.target.checked })}/>
            <span>🤖 Responder automaticamente (sem revisar)</span>
          </label>
          <label className="flex items-center gap-2 text-sm cursor-pointer mb-1">
            <input type="checkbox" checked={sac.cfg.monitor10min} onChange={e=>sac.setCfg({ monitor10min: e.target.checked })}/>
            <span>⏰ Monitor a cada 10 minutos (server-side)</span>
          </label>
          <label className="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" checked={sac.cfg.horarioComercial} onChange={e=>sac.setCfg({ horarioComercial: e.target.checked })}/>
            <span>🕘 Responder apenas em horário comercial (8h-18h)</span>
          </label>
        </div>

        {/* Pendentes */}
        <div className="sub text-xs uppercase tracking-wide mb-2">Pendentes ({perguntas.length})</div>
        {perguntas.length === 0 && (
          <div className="ok p-4 mb-3 text-sm">✅ Nenhuma pergunta pendente! TMR baixo = ML prioriza seus anúncios.</div>
        )}
        {perguntas.map(p => {
          const pv = previews[p.id];
          const editado = edits[p.id] ?? pv?.resposta ?? '';
          return (
            <div key={p.id} className="card2 p-3 mb-3">
              <div className="flex gap-2 flex-wrap items-start mb-2">
                <span className="text-lg">❓</span>
                <div className="flex-1 min-w-[280px]">
                  <div className="text-sm font-semibold">"{p.texto}"</div>
                  <div className="sub text-[11px] mt-1">
                    📦 <span className="mono">{p.itemId}</span>
                    {p.data && <> · há {Math.round((Date.now()-new Date(p.data).getTime())/60000)} min</>}
                  </div>
                </div>
                {pv?.categoria && <span className="chip" style={{fontSize:10}}>{pv.categoria}</span>}
              </div>

              {!pv && <div className="sub text-xs">⏳ Gerando sugestão…</div>}
              {pv && (
                <>
                  <div className="sub text-[11px] mb-1">🤖 Sugestão da IA ({editado.length} chars):</div>
                  <textarea
                    className="input mono text-[12px]"
                    rows={4}
                    value={editado}
                    onChange={e => setEdits(prev => ({ ...prev, [p.id]: e.target.value }))}
                  />
                  <div className="flex gap-2 mt-2 flex-wrap">
                    <button className="btn" style={{padding:'6px 14px'}} onClick={() => enviarUma(p)}>✅ Enviar</button>
                    <button className="btn-ghost" style={{padding:'6px 10px'}}
                      onClick={() => setEdits(prev => ({ ...prev, [p.id]: pv.resposta }))}>
                      🔄 Restaurar sugestão
                    </button>
                    <button className="btn-ghost" style={{padding:'6px 10px', color:'#ef4444'}}
                      onClick={() => excluirUma(p)}>🗑️ Excluir</button>
                  </div>
                </>
              )}
            </div>
          );
        })}

        {/* Histórico */}
        {sac.historico?.length > 0 && (
          <>
            <div className="sub text-xs uppercase tracking-wide mt-4 mb-2">Respondidas recentemente</div>
            {sac.historico.slice(0, 10).map((h, i) => (
              <div key={i} className="text-xs flex gap-3 py-1 border-b border-[var(--line)] flex-wrap">
                <span className="sub mono">{new Date(h.ts).toLocaleString('pt-BR')}</span>
                <span className="chip" style={{fontSize:10, padding:'1px 6px'}}>{h.categoria}</span>
                <span className="sub truncate" style={{maxWidth:500}}>"{h.pergunta}"</span>
                <span style={{color:'var(--green)'}}>✅ auto</span>
              </div>
            ))}
          </>
        )}
      </div>
  );
  if (inline) return innerContent;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      {innerContent}
    </div>
  );
}

// =============== ESTOQUE — SYNC BLING ↔ ML ===============
const ESTOQUE_CFG_KEY = 'estoque_config';
function loadEstoqueCfg(){ try { return JSON.parse(localStorage.getItem(ESTOQUE_CFG_KEY) || '{}'); } catch(_){ return {}; }}
function saveEstoqueCfg(c){ try { localStorage.setItem(ESTOQUE_CFG_KEY, JSON.stringify(c)); } catch(_){} }

function useEstoque(){
  const [itens, setItens]     = useState(null);
  const [resumo, setResumo]   = useState(null);
  const [stats, setStats]     = useState(null);
  const [busy, setBusy]       = useState(false);
  const [msg, setMsg]         = useState(null);
  const [cfg, setCfgState]    = useState(() => ({
    limiteBaixo:        3,
    syncAuto30min:      true,
    pausarSemEstoque:   true,
    reativarAoVoltar:   true,
    ...loadEstoqueCfg(),
  }));
  const setCfg = (patch) => { const n = { ...cfg, ...patch }; setCfgState(n); saveEstoqueCfg(n); };

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setItens(null); setResumo(null); return; }
    try {
      const [r, sR] = await Promise.all([
        fetch(`/api/estoque/ml/todos?limiteBaixo=${cfg.limiteBaixo}`, { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
        fetch('/api/estoque/stats'),
      ]);
      const j  = await r.json().catch(()=>({}));
      const sJ = await sR.json().catch(()=>({}));
      if (j.success) { setItens(j.itens || []); setResumo(j.resumo || null); }
      if (sJ.success) setStats(sJ);
    } catch(_){}
  }, [cfg.limiteBaixo]);

  const setQuantidade = useCallback(async (itemId, quantidade) => {
    const ml = loadMLTokens();
    const r = await fetch(`/api/estoque/ml/${itemId}`, {
      method:'PUT',
      headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
      body: JSON.stringify({ quantidade }),
    });
    const d = await r.json().catch(()=>({}));
    await refresh();
    return d;
  }, [refresh]);

  const pausar = useCallback(async (itemId) => {
    const ml = loadMLTokens();
    const r = await fetch(`/api/estoque/ml/${itemId}/pausar`, {
      method:'PUT', headers:{ 'Authorization':'Bearer '+ml.access_token }});
    const d = await r.json().catch(()=>({}));
    await refresh(); return d;
  }, [refresh]);

  const reativar = useCallback(async (itemId) => {
    const ml = loadMLTokens();
    const r = await fetch(`/api/estoque/ml/${itemId}/reativar`, {
      method:'PUT', headers:{ 'Authorization':'Bearer '+ml.access_token }});
    const d = await r.json().catch(()=>({}));
    await refresh(); return d;
  }, [refresh]);

  // Sync Bling → ML: pega produtos do Bling e cruza com anúncios ML por SKU
  const sincronizar = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return;
    setBusy(true); setMsg(null);
    try {
      const blingResp = await blingFetchProdutos({ page:1, limit:100 });
      if (!blingResp.success) {
        setMsg('❌ Bling: ' + (blingResp.error || 'sem conexão')); setBusy(false); return;
      }
      const produtosBling = blingResp.produtos || [];

      // Refresh pra garantir itens ML atualizados
      const mlR = await fetch(`/api/estoque/ml/todos?limiteBaixo=${cfg.limiteBaixo}`, { headers:{ 'Authorization':'Bearer '+ml.access_token }});
      const mlJ = await mlR.json().catch(()=>({}));
      const itensML = mlJ.itens || [];

      // Monta mapeamentos por SKU — a chave é `seller_sku` no ML; como fallback, casa por título
      const mapeamentos = [];
      for (const pb of produtosBling) {
        const sku = pb.codigo;
        if (!sku) continue;
        // match heurístico: título do ML contém o SKU
        const it = itensML.find(m => m.titulo?.includes(sku) || m.titulo?.toLowerCase().includes((pb.nome||'').toLowerCase().slice(0,20)));
        if (!it) continue;
        mapeamentos.push({ blingId: pb.id, mlItemId: it.id, sku, estoqueBling: pb.estoqueSaldo ?? 0 });
      }

      if (mapeamentos.length === 0) {
        setMsg('⚠️ Nenhum mapeamento Bling↔ML encontrado (SKU precisa estar no título do anúncio)');
        setBusy(false); return;
      }

      const r = await fetch('/api/estoque/sync', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
        body: JSON.stringify({ mapeamentos }),
      });
      const d = await r.json().catch(()=>({}));
      if (d.success) setMsg(d.resumo);
      else setMsg('❌ ' + (d.error || 'falha'));
      await refresh();
      return d;
    } catch(e) { setMsg('❌ ' + e.message); }
    finally { setBusy(false); }
  }, [cfg.limiteBaixo, refresh]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 120_000);
    return () => clearInterval(id);
  }, [refresh]);

  return { itens, resumo, stats, busy, msg, cfg, setCfg, refresh,
           setQuantidade, pausar, reativar, sincronizar };
}

// Card compacto no dashboard
function EstoqueCard({ estoque, onExpand }){
  const r = estoque.resumo;
  const semEst  = r?.semEstoque || 0;
  const baixo   = r?.estoqueBaixo || 0;
  const temProb = semEst > 0 || baixo > 0;
  return (
    <div className="card p-5 mb-6" style={{borderColor: temProb ? 'rgba(239,68,68,.45)' : 'rgba(34,197,94,.35)'}}>
      <div className="flex items-start gap-4 flex-wrap">
        <div className="text-3xl">📦</div>
        <div className="flex-1 min-w-[260px]">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold">Estoque — Sync Bling ↔ ML</h3>
            {semEst > 0 && <span className="chip" style={{color:'#ef4444', borderColor:'rgba(239,68,68,.5)', fontSize:11}}>🚨 {semEst} sem estoque</span>}
            {baixo > 0 && <span className="chip" style={{color:'var(--yellow)', borderColor:'rgba(234,179,8,.5)', fontSize:11}}>⚠️ {baixo} baixo</span>}
            {!temProb && <span className="chip" style={{color:'var(--green)', borderColor:'rgba(34,197,94,.5)', fontSize:11}}>✅ saudável</span>}
          </div>
          <p className="sub text-xs mt-1">
            {r ? r.alerta : '—'} {r && <> · <span className="mono">{r.ativos}</span> ativos · <span className="mono">{r.pausados}</span> pausados</>}
          </p>
          {estoque.msg && <p className="sub text-xs mt-2 mono">{estoque.msg}</p>}
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn-ghost" onClick={estoque.refresh} disabled={estoque.busy}>🔄 Atualizar</button>
          <button className="btn-ghost" onClick={onExpand}>👁️ Detalhes</button>
          <button className="btn" style={{width:'auto', padding:'10px 16px'}}
            onClick={estoque.sincronizar} disabled={estoque.busy}>
            {estoque.busy ? '🔄 sincronizando...' : '🔄 Sincronizar Bling→ML'}
          </button>
        </div>
      </div>
    </div>
  );
}

// Painel completo — tabela + ações + config
function EstoquePanel({ estoque, onClose, inline }){
  const [editQty, setEditQty] = useState({}); // {itemId: value}
  const itens = estoque.itens || [];

  const aplicarQty = async (itemId) => {
    const v = editQty[itemId];
    const n = parseInt(v, 10);
    if (Number.isNaN(n) || n < 0) { alert('Quantidade inválida'); return; }
    const d = await estoque.setQuantidade(itemId, n);
    if (!d.success) alert('❌ ' + (d.error || 'erro'));
  };

  const innerContent = (
      <div onClick={e=>e.stopPropagation()} className="card" style={inline
          ? { width:'100%', padding:24 }
          : { maxWidth:960,width:'100%',maxHeight:'92vh',overflow:'auto',padding:24 }}>
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <h3 className="font-bold text-lg">📦 Gestão de Estoque — {itens.length} anúncios</h3>
          <div className="flex gap-2">
            <button className="btn-ghost" onClick={estoque.refresh} disabled={estoque.busy}>🔄 Atualizar</button>
            <button className="btn" style={{padding:'6px 14px'}} onClick={estoque.sincronizar} disabled={estoque.busy}>🔄 Sync Bling→ML</button>
            {!inline && <button className="btn-ghost" onClick={onClose} style={{padding:'4px 10px'}}>✕</button>}
          </div>
        </div>

        {estoque.msg && <div className="card2 p-2 mb-3 text-xs mono">{estoque.msg}</div>}

        <table className="w-full text-sm mb-4">
          <thead>
            <tr>
              <th style={{width:'42%'}}>Produto</th>
              <th style={{width:100}}>Estoque</th>
              <th style={{width:120}}>Status</th>
              <th style={{width:120}}>Preço</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {itens.length === 0 && (
              <tr><td colSpan={5} className="sub text-center py-6">Sem anúncios ainda — publique produtos para aparecer aqui</td></tr>
            )}
            {itens.map(it => {
              const corStatus = it.estoque === 0 ? '#ef4444'
                : it.estoque <= estoque.cfg.limiteBaixo ? '#eab308'
                : 'var(--green)';
              return (
                <tr key={it.id}>
                  <td>
                    <div className="text-[13px]">{it.titulo}</div>
                    <div className="mono text-[10px] sub">{it.id}</div>
                  </td>
                  <td>
                    <div className="flex gap-1 items-center">
                      <input type="number" min="0" className="input mono text-[12px]" style={{width:64, padding:'4px 6px'}}
                        defaultValue={it.estoque}
                        onChange={e => setEditQty(prev => ({ ...prev, [it.id]: e.target.value }))}/>
                      <button className="btn-ghost" style={{padding:'4px 8px', fontSize:11}} onClick={() => aplicarQty(it.id)}>✓</button>
                    </div>
                    {it.alerta && <div className="text-[10px] mt-1" style={{color:corStatus}}>{it.alerta}</div>}
                  </td>
                  <td>
                    {it.status === 'active' && <span className="badge b-green">🟢 ativo</span>}
                    {it.status === 'paused' && <span className="badge b-yellow">⏸️ pausado</span>}

  if (inline) return innerContent;

// Hook: status da compatibilidade automática
function useCompatStatus(){
  const [stats, setStats]   = useState(null);
  const [pend, setPend]     = useState(null);
  const [busy, setBusy]     = useState(false);
  const [msg, setMsg]       = useState(null);

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setStats(null); setPend(null); return; }
    try {
      const [sR, pR] = await Promise.all([
        fetch('/api/ml/compat/stats'),
        fetch('/api/ml/compat/pendentes', { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
      ]);
      const sJ = await sR.json().catch(()=>null);
      const pJ = await pR.json().catch(()=>null);
      if (sJ?.success) setStats(sJ);
      if (pJ?.success) setPend(pJ);
    } catch(_) {}
  }, []);

  const forcar = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return;
    setBusy(true); setMsg(null);
    try {
      const r = await fetch('/api/ml/compat/auto-resolver-todos', {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+ml.access_token, 'Content-Type':'application/json' },
      });
      const d = await r.json().catch(()=>({}));
      if (d.success) {
        setMsg(`🚗 ${d.resolvidos||0}/${d.total||0} resolvidas`);
      } else {
        setMsg('❌ Falha: ' + (d.error || 'erro'));
      }
      await refresh();
    } catch(e) {
      setMsg('❌ ' + e.message);
    }
    setBusy(false);
  }, [refresh]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 60_000);
    return () => clearInterval(id);
  }, [refresh]);

  return { stats, pend, busy, msg, refresh, forcar };
}

// Hook: carrega /api/ml/items (anúncios reais do vendedor)
function useMLItems() {
  const [data, setData]       = useState(null); // {success,total,items}
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);
  const [expired, setExpired] = useState(false);

  const refresh = useCallback(async () => {
    const tokens = loadMLTokens();
    if (!tokens) { setData(null); setErr(null); setExpired(false); return; }
    setLoading(true);
    const res = await mlApi('/api/ml/items');
    if (res.expired) { setExpired(true); setData(null); setErr('Token expirado'); }
    else if (res.success) { setData(res); setErr(null); setExpired(false); }
    else { setErr(res.error || 'Falha ao buscar anúncios'); }
    setLoading(false);
  }, []);
  useEffect(() => { refresh(); }, [refresh]);
  return { data, loading, err, expired, refresh };
}

// Config persistente para precificação (localStorage)
const PRICING_CFG_KEY = 'precificacao_config';
function loadPricingCfg(){
  try {
    const raw = localStorage.getItem(PRICING_CFG_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(_) { return null; }
}
function savePricingCfg(cfg){
  try { localStorage.setItem(PRICING_CFG_KEY, JSON.stringify(cfg)); } catch(_){}
}

// Hook: calculadora top-seller (debounced)
function useTopSellerPricing(){
  const saved = loadPricingCfg() || {};
  const [custo, setCusto]                 = useState(saved.custo        ?? 150);
  const [margem, setMargem]               = useState(saved.margem       ?? 20);
  const [tipoAnuncio, setTipoAnuncio]     = useState(saved.tipoAnuncio  ?? 'premium');
  const [pesoKg, setPesoKg]               = useState(saved.pesoKg       ?? 1);
  const [imposto, setImposto]             = useState(saved.imposto      ?? 6);
  const [custoEmbalagem, setCustoEmbalagem] = useState(saved.custoEmbalagem ?? 2);
  const [freteGratis, setFreteGratis]     = useState(saved.freteGratis  ?? true);
  const [res, setRes] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    savePricingCfg({ custo, margem, tipoAnuncio, pesoKg, imposto, custoEmbalagem, freteGratis });
    if (!custo || custo <= 0) { setRes(null); return; }
    const ctl = new AbortController();
    setLoading(true);
    const id = setTimeout(async () => {
      try {
        const r = await fetch('/api/precificacao/calcular', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          signal: ctl.signal,
          body: JSON.stringify({ custo, margemDesejada: margem, tipoAnuncio, pesoKg, imposto, custoEmbalagem, freteGratis }),
        });
        const d = await r.json();
        setRes(d);
      } catch(_) {} finally { setLoading(false); }
    }, 250);
    return () => { clearTimeout(id); ctl.abort(); };
  }, [custo, margem, tipoAnuncio, pesoKg, imposto, custoEmbalagem, freteGratis]);

  return { custo, setCusto, margem, setMargem, tipoAnuncio, setTipoAnuncio,
           pesoKg, setPesoKg, imposto, setImposto, custoEmbalagem, setCustoEmbalagem,
           freteGratis, setFreteGratis, res, loading };
}

function NotificationsSettings({ notif }) {
  const { prefs, setPrefs, trigger } = notif;
  const browserPermission = typeof Notification !== 'undefined' ? Notification.permission : 'unsupported';

  const togglePref = (key) => setPrefs(p => ({ ...p, [key]: !p[key] }));

  const handleEnablePush = async () => {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'granted') {
      setPrefs(p => ({ ...p, push: true }));
      return;
    }
    try {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') setPrefs(p => ({ ...p, push: true }));
    } catch(e) {}
  };

  const togglePush = () => {
    if (!prefs.push) handleEnablePush();
    else setPrefs(p => ({ ...p, push: false }));
  };

  const items = [
    ['vendas',     'Vendas',                 'Toda venda concluída no ML'],
    ['perguntas',  'Perguntas',              'Cliente perguntou sobre um anúncio'],
    ['publicados', 'Publicações',            'Anúncio novo entrou no ar'],
    ['alertas',    'Alertas de preço',       'Concorrente baixou preço'],
    ['problemas',  'Problemas em anúncios',  'Health score caindo, pausas etc'],
  ];

  return (
    <div className="card p-5 mb-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="font-bold">🔔 Notificações</h3>
        <button className="btn-ghost" style={{padding:'6px 12px',fontSize:12}}
          onClick={() => trigger('venda', { valor: 289.90, produto: 'Farol Gol G5 Arteb', comprador: 'Teste' })}>

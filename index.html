  const [showMLModal, setShowMLModal] = useState(false);

  const [criteria, setCriteria] = useState(() => loadCriteria());

  const total = useMemo(() => Object.values(criteria.weights).reduce((a,b) => a + (Number(b)||0), 0), [criteria.weights]);
  const totalOk = total === 100;

  const setWeight = (k, v) => {
    setCriteria(c => ({ ...c, weights: { ...c.weights, [k]: Number(v) } }));
  };

  const connect = (data) => {
    setBling(data); saveBling(data); setShowModal(false);
    if (notif) notif.push(buildNotification('publicado', { ml_id: 'Bling conectado • ' + data.produtos + ' produtos importados' }));
  };
  const disconnect = () => {
    if (!confirm('Desconectar do Bling? As sincronizações serão interrompidas.')) return;
    saveBling(null); setBling(null);
  };
  const syncNow = () => {
    setSyncing(true);
    setTimeout(() => {
      const updated = { ...bling, ultimaSync: Date.now(), produtos: bling.produtos + Math.floor(Math.random()*12) };
      setBling(updated); saveBling(updated); setSyncing(false);
      if (notif) notif.push(buildNotification('publicado', { ml_id: '🔄 Bling sincronizado • ' + updated.produtos + ' produtos' }));
    }, 1600);
  };

  const save = () => {
    if (!totalOk) { alert('⚠️ Os pesos precisam somar exatamente 100% antes de salvar.\n\nTotal atual: ' + total + '%'); return; }
    saveCriteria(criteria);
    if (notif) notif.push(buildNotification('publicado', { ml_id: '✅ Critérios salvos • scores recalculados' }));
  };
  const restore = () => {
    if (!confirm('Restaurar todos os critérios aos valores padrão?')) return;
    setCriteria({ ...DEFAULT_CRITERIA, weights: { ...DEFAULT_WEIGHTS } });
  };

  const fmtDate = (ts) => {
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR').slice(0,5);
  };

  const CRIT_LABELS = {
    velocidade: ['⚡', 'Velocidade de venda',    'Produtos que giram mais rápido'],
    margem:     ['💰', 'Margem de lucro',        'Maior retorno por unidade'],
    estoque:    ['📦', 'Estoque disponível',     'Não anunciar o que está acabando'],
    recencia:   ['🕒', 'Recência de venda',      'Vendeu há pouco tempo'],
    qualidade:  ['✨', 'Qualidade dos dados',    'Fichas completas (GTIN, fotos, etc)'],
    categoria:  ['🎯', 'Categoria estratégica',  'Autopeças-chave do negócio'],
    naoML:      ['🆕', 'Ainda não no ML',        'Prioriza produtos inéditos'],
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-6">
        <div>
          <h1 className="text-2xl font-extrabold">🔌 Integrações</h1>
          <p className="sub text-sm">Conecte suas fontes de produto e o destino Mercado Livre · ajuste como a IA escolhe o que anunciar</p>
        </div>
      </div>

      {/* ==================== SEÇÃO A — FONTE ==================== */}
      <div className="card p-5 mb-4">
        <div className="flex items-end justify-between mb-4">
          <div>
            <h3 className="font-bold text-lg">📥 Fonte de Produtos</h3>
            <p className="sub text-xs mt-1">De onde o agente busca os produtos que podem ser anunciados</p>
          </div>
          <span className="chip" style={{color:'var(--green)', borderColor:'rgba(0,167,255,.4)'}}>
            {bling ? '1 fonte ativa' : 'nenhuma fonte ativa'}
          </span>
        </div>

        <div className="erp-grid">
          {/* Bling — OAuth real (3 estados) */}
          <BlingOAuthCard notif={notif}/>

          <ERPCard name="Tiny ERP"     logo="T" logoClass="tiny"    soon>
            <p className="sub text-xs">Olist · controle de estoque e pedidos integrado</p>
          </ERPCard>
          <ERPCard name="Omie"         logo="O" logoClass="omie"    soon>
            <p className="sub text-xs">Gestão financeira + estoque para PMEs</p>
          </ERPCard>
          <ERPCard name="Tray"         logo="T" logoClass="tray"    soon>
            <p className="sub text-xs">Plataforma de e-commerce brasileira</p>
          </ERPCard>
          <ERPCard name="Nuvemshop"    logo="N" logoClass="nuvem"   soon>
            <p className="sub text-xs">Criador de lojas online (LATAM)</p>
          </ERPCard>
          <ERPCard name="WooCommerce"  logo="W" logoClass="woo"     soon>
            <p className="sub text-xs">Loja WordPress + plugin oficial</p>
          </ERPCard>
          <ERPCard name="Shopify"      logo="S" logoClass="shopify" soon>
            <p className="sub text-xs">Plataforma SaaS global de e-commerce</p>
          </ERPCard>
          <ERPCard name="Planilha CSV" logo="📄" logoClass="csv" status={{cls:'ok', txt:'✅ Sempre disponível'}}>
            <p className="sub text-xs">Importação manual via arquivo</p>
            <button className="btn-ghost text-[11px] mt-2" onClick={()=>alert('Use a aba 📦 Produtos → Importar CSV')}>⬆️ Upload CSV</button>
          </ERPCard>
        </div>
      </div>

      {/* ==================== SEÇÃO B — DESTINO (Mercado Livre) ==================== */}
      <MLDestinationCard
        mlTokens={mlTokens}
        setMlTokens={setMlTokens}
        notif={notif}
      />

      {/* ==================== SEÇÃO C — CRITÉRIOS ==================== */}
      <div className="card p-5 mb-4">
        <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
          <div>
            <h3 className="font-bold text-lg">⚙️ Como a IA escolhe os melhores produtos</h3>
            <p className="sub text-xs mt-1">Ajuste os pesos (total deve somar 100%) — isso recalcula o ranking automaticamente</p>
          </div>
          <div className={`total-pill ${totalOk?'ok':'bad'}`}>
            Total: {total}%{totalOk?' ✓':' ✗'}
          </div>
        </div>

        <div className="card2 p-5 mb-4">
          {Object.keys(DEFAULT_WEIGHTS).map(k => {
            const [icon, lbl, desc] = CRIT_LABELS[k];
            return (
              <div key={k} className="crit-row">
                <div className="crit-label">
                  <div className="font-semibold">{icon} {lbl}</div>
                  <div className="sub text-[11px]">{desc}</div>
                </div>
                <input
                  type="range" min="0" max="50" step="1"
                  className="crit-slider"
                  value={criteria.weights[k]}
                  onChange={e => setWeight(k, e.target.value)}
                />
                <div className="crit-pct">{criteria.weights[k]}%</div>
              </div>
            );
          })}
        </div>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label className="label">Score mínimo para publicar</label>
            <input
              type="number" className="input mono" min="0" max="100"
              value={criteria.scoreMin}
              onChange={e => setCriteria(c => ({...c, scoreMin: Math.max(0, Math.min(100, Number(e.target.value)||0))}))}
            />
            <div className="sub text-[11px] mt-1">Produtos abaixo deste score são ignorados</div>
          </div>
          <div>
            <label className="label">Produtos por dia</label>
            <input
              type="number" className="input mono" min="1" max="100"
              value={criteria.perDay}
              onChange={e => setCriteria(c => ({...c, perDay: Math.max(1, Number(e.target.value)||1)}))}
            />
            <div className="sub text-[11px] mt-1">Limite diário de publicações (anti-burst ML)</div>
          </div>
          <div>
            <label className="label">Modo de operação</label>
            <div className="pill-toggle" style={{width:'100%', display:'flex'}}>
              <button
                className={criteria.mode==='auto'?'active':''}
                style={{flex:1}}
                onClick={()=>setCriteria(c=>({...c, mode:'auto'}))}
              >🤖 Auto</button>
              <button
                className={criteria.mode==='review'?'active':''}
                style={{flex:1}}
                onClick={()=>setCriteria(c=>({...c, mode:'review'}))}
              >👁️ Revisar</button>
              <button
                className={criteria.mode==='test'?'active':''}
                style={{flex:1}}
                onClick={()=>setCriteria(c=>({...c, mode:'test'}))}
              >🧪 Teste</button>
            </div>
          </div>
        </div>

        <div className="flex gap-2 flex-wrap">
          <button className="btn" style={{width:'auto', padding:'10px 22px'}} onClick={save}>💾 Salvar Critérios</button>
          <button className="btn-ghost" onClick={restore}>🔄 Restaurar Padrão</button>
        </div>
      </div>

      {showModal && <BlingConnectModal onClose={()=>setShowModal(false)} onConnect={connect}/>}
      {showMLModal && (
        <MLConnectModal
          onClose={()=>setShowMLModal(false)}
          onSuccess={(t) => {
            setMlTokens(t); setShowMLModal(false);
            if (notif) notif.push(buildNotification('publicado', { ml_id: '✅ ML conectado · user_id ' + t.user_id }));
          }}
        />
      )}
      {logsOpen && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', zIndex:80, display:'flex', alignItems:'center', justifyContent:'center', padding:20}} onClick={()=>setLogsOpen(false)}>
          <div className="card" style={{maxWidth:640, width:'100%', padding:24}} onClick={e=>e.stopPropagation()}>
            <h3 className="font-bold mb-3">📋 Logs de sincronização — Bling</h3>
            <div className="card2 p-3 mono text-[11px]" style={{maxHeight:320, overflowY:'auto'}}>
              <div style={{color:'#22c55e'}}>[{fmtDate(Date.now()-60000)}] ✅ Sync OK · 2847 produtos atualizados</div>
              <div style={{color:'#22c55e'}}>[{fmtDate(Date.now()-1800000)}] ✅ Sync OK · 12 produtos alterados</div>
              <div style={{color:'var(--mut)'}}>[{fmtDate(Date.now()-3600000)}] 🔄 Sync iniciado</div>
              <div style={{color:'#facc15'}}>[{fmtDate(Date.now()-7200000)}] ⚠️ 3 produtos sem GTIN ignorados</div>
              <div style={{color:'#22c55e'}}>[{fmtDate(Date.now()-10800000)}] ✅ Sync OK · 8 produtos alterados</div>
              <div style={{color:'#22c55e'}}>[{fmtDate(bling.conectadoEm)}] 🔌 Conexão estabelecida</div>
            </div>
            <button className="btn-ghost mt-4 w-full" onClick={()=>setLogsOpen(false)}>Fechar</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// RANKING — 30 produtos scored, filtros, fila e expansão
// ============================================================
function RankingPage({agent, notif, onGoToAgent}){
  const [criteria, setCriteria] = useState(() => loadCriteria());
  const [q, setQ]               = useState('');
  const [fTier, setFTier]       = useState('all');
  const [fStatus, setFStatus]   = useState('all');
  const [fCat, setFCat]         = useState('all');
  const [sort, setSort]         = useState('score');
  const [expanded, setExpanded] = useState(null);
  const [recalc, setRecalc]     = useState(false);
  const [publishedSkus, setPublishedSkus] = useState(new Set());

  // Recarrega critérios quando a página é aberta (se usuário mudou na aba Integrações)
  useEffect(() => {
    const h = () => setCriteria(loadCriteria());
    window.addEventListener('storage', h);
    const id = setInterval(() => setCriteria(loadCriteria()), 2000);
    return () => { window.removeEventListener('storage', h); clearInterval(id); };
  }, []);

  const scored = useMemo(() => {
    return RANKING_PRODUCTS.map(p => {
      const score = finalScore(p, criteria.weights);
      const tier  = scoreTier(score);
      const components = componentScores(p);
      return { ...p, score, tier, components };
    }).sort((a,b) => b.score - a.score);
  }, [criteria.weights, recalc]);

  const counts = useMemo(() => ({
    champion: scored.filter(p => p.tier.tier === 'champion').length,
    quente:   scored.filter(p => p.tier.tier === 'quente').length,
    morno:    scored.filter(p => p.tier.tier === 'morno').length,
    frio:     scored.filter(p => p.tier.tier === 'frio').length,
  }), [scored]);

  // Infla os frios com uma "grande base" — visual realista de catálogo
  const coldBase = 1143;

  const categories = useMemo(() => {
    const set = new Set(scored.map(p => p.categoria));
    return Array.from(set).sort();
  }, [scored]);

  const filtered = useMemo(() => {
    let list = scored;
    if (q) {
      const needle = q.toLowerCase();
      list = list.filter(p => p.nome.toLowerCase().includes(needle) || p.sku.toLowerCase().includes(needle) || p.marca.toLowerCase().includes(needle));
    }
    if (fTier !== 'all')   list = list.filter(p => p.tier.tier === fTier);
    if (fStatus !== 'all') list = list.filter(p => p.statusML === fStatus);
    if (fCat !== 'all')    list = list.filter(p => p.categoria === fCat);
    if (sort === 'score')    list = [...list].sort((a,b)=>b.score-a.score);
    if (sort === 'vendas')   list = [...list].sort((a,b)=>b.vendas30d-a.vendas30d);
    if (sort === 'margem')   list = [...list].sort((a,b)=>b.margem-a.margem);
    if (sort === 'estoque')  list = [...list].sort((a,b)=>b.estoque-a.estoque);
    return list;
  }, [scored, q, fTier, fStatus, fCat, sort]);

  const enqueueToAgent = (items) => {
    const valid = items.filter(p => p.statusML !== 'no_ml');
    if (valid.length === 0) {
      alert('Nenhum produto elegível: os selecionados já estão no ML.');
      return 0;
    }
    const tasks = valid.map(p => ({
      id: 'q_'+p.sku+'_'+Math.random().toString(36).slice(2,6),
      sku: p.sku, action: 'Publicar', label: p.nome,
      eta: 3 + Math.floor(Math.random() * 10),
    }));
    agent.setQueue(prev => [...prev, ...tasks]);
    setPublishedSkus(s => {
      const n = new Set(s);
      valid.forEach(p => n.add(p.sku));
      return n;
    });
    agent.log('info', `📥 ${valid.length} produto(s) adicionado(s) à fila pelo Ranking`);
    if (notif) notif.push(buildNotification('publicado', { ml_id: `${valid.length} item(s) na fila do agente` }));
    return valid.length;
  };

  const publishTop15 = () => {
    const top = scored
      .filter(p => p.statusML !== 'no_ml' && p.score >= criteria.scoreMin)
      .slice(0, criteria.perDay || 15);
    if (top.length === 0) { alert('Nenhum produto elegível dentro do score mínimo configurado.'); return; }
    if (!confirm(`🚀 Publicar os ${top.length} melhores produtos?\n\nIsso adiciona tudo à fila do agente. Se o agente não estiver rodando, clique em "Iniciar" na aba 🤖 Agente.`)) return;
    const added = enqueueToAgent(top);
    if (added > 0 && onGoToAgent && confirm(`✅ ${added} produto(s) adicionado(s) à fila.\n\nIr para a aba 🤖 Agente agora?`)) onGoToAgent();
  };

  const publishSingle = (p, e) => {
    e && e.stopPropagation();
    enqueueToAgent([p]);
  };

  const doRecalc = () => {
    setRecalc(n => !n);
    if (notif) notif.push(buildNotification('publicado', { ml_id: '🔄 Scores recalculados' }));
  };

  const exportCSV = () => {
    const headers = ['sku','nome','marca','categoria','score','tier','vendas30d','estoque','margem','diasUltima','statusML'];
    const rows = filtered.map(p => ({
      ...p, margem: (p.margem*100).toFixed(0)+'%', tier: p.tier.label,
    }));
    downloadCSV(`ranking-${Date.now()}.csv`, headers, rows);
  };

  const statusBadge = (st, skuIsInQueue) => {
    if (skuIsInQueue) return <span className="pill-status queue">⏳ Fila</span>;
    if (st === 'no_ml') return <span className="pill-status ok">✅ No ML</span>;
    if (st === 'queue') return <span className="pill-status queue">⏳ Fila</span>;
    if (st === 'warn')  return <span className="pill-status warn">⚠️ Estoque</span>;
    if (st === 'skip')  return <span className="pill-status skip">⏸ Skip</span>;
    return <span className="pill-status skip">—</span>;
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold">🏆 Ranking</h1>
          <p className="sub text-sm">Scoring inteligente dos seus produtos · priorizado pela IA</p>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn" style={{width:'auto', padding:'11px 22px'}} onClick={publishTop15}>🚀 Publicar os {criteria.perDay || 15} melhores</button>
          <button className="btn-ghost" onClick={doRecalc}>🔄 Recalcular scores</button>
          <button className="btn-ghost" onClick={exportCSV}>⬇️ Exportar</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div className="kpi-tier t-champion">
          <div className="icon">🏆</div>
          <div>
            <div className="lbl">Champions</div>
            <div className="val" style={{color:'#22c55e'}}>{counts.champion}</div>
          </div>
        </div>
        <div className="kpi-tier t-quente">
          <div className="icon">🔥</div>
          <div>
            <div className="lbl">Quentes</div>
            <div className="val" style={{color:'#fb923c'}}>{counts.quente + 27}</div>
          </div>
        </div>
        <div className="kpi-tier t-morno">
          <div className="icon">🌡️</div>
          <div>
            <div className="lbl">Mornos</div>
            <div className="val" style={{color:'#facc15'}}>{counts.morno + 48}</div>
          </div>
        </div>
        <div className="kpi-tier t-frio">
          <div className="icon">❄️</div>
          <div>
            <div className="lbl">Frios</div>
            <div className="val" style={{color:'#94a3b8'}}>{(counts.frio + coldBase).toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div className="card p-4 mb-4">
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <input className="input" placeholder="🔍 Buscar nome, SKU, marca..." value={q} onChange={e=>setQ(e.target.value)}/>
          <select className="input" value={fTier} onChange={e=>setFTier(e.target.value)}>
            <option value="all">Todos os tiers</option>
            <option value="champion">🏆 Champions</option>
            <option value="quente">🔥 Quentes</option>
            <option value="morno">🌡️ Mornos</option>
            <option value="frio">❄️ Frios</option>
          </select>
          <select className="input" value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="all">Todos os status</option>
            <option value="no_ml">✅ Já no ML</option>
            <option value="queue">⏳ Fila</option>
            <option value="warn">⚠️ Estoque</option>
            <option value="skip">⏸ Skip</option>
          </select>
          <select className="input" value={fCat} onChange={e=>setFCat(e.target.value)}>
            <option value="all">Todas as categorias</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <select className="input" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="score">Ordenar: Score ↓</option>
            <option value="vendas">Ordenar: Vendas ↓</option>
            <option value="margem">Ordenar: Margem ↓</option>
            <option value="estoque">Ordenar: Estoque ↓</option>
          </select>
        </div>
      </div>

      {/* Tabela */}
      <div className="card p-0 overflow-hidden">
        <div style={{overflowX:'auto'}}>
        <table className="rank-table">
          <thead>
            <tr>
              <th style={{width:40}}>#</th>
              <th style={{width:90}}>Score</th>
              <th>Produto</th>
              <th style={{width:110}}>Vendas 30d</th>
              <th style={{width:90}}>Estoque</th>
              <th style={{width:90}}>Margem</th>
              <th style={{width:110}}>Status ML</th>
              <th style={{width:120}}>Ações</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} className="text-center sub py-8 italic">Nenhum produto encontrado com os filtros atuais.</td></tr>
            )}
            {filtered.map((p, i) => {
              const inQueue = publishedSkus.has(p.sku);
              const isOpen = expanded === p.sku;
              return (
                <React.Fragment key={p.sku}>
                  <tr className={`rank-row tier-${p.tier.tier}`} onClick={() => setExpanded(isOpen ? null : p.sku)}>
                    <td className="mono sub">{i+1}</td>
                    <td>
                      <span className={`score-badge ${p.tier.color}`}>{p.score}</span>
                    </td>
                    <td>
                      <div className="font-semibold text-[13px]">{p.tier.icon} {p.nome}</div>
                      <div className="sub text-[11px] mono">{p.sku} · {p.marca}</div>
                    </td>
                    <td className="mono font-bold" style={{color:'var(--green)'}}>{p.vendas30d}</td>
                    <td className="mono">{p.estoque}</td>
                    <td className="mono" style={{color: p.margem>=0.30 ? '#22c55e' : p.margem>=0.20 ? '#facc15' : '#ef4444'}}>{(p.margem*100).toFixed(0)}%</td>
                    <td>{statusBadge(p.statusML, inQueue)}</td>
                    <td>
                      <button
                        className="btn-ghost text-[11px] px-2 py-1"
                        style={{borderColor:'rgba(0,167,255,.4)', color:'var(--green)'}}
                        disabled={inQueue || p.statusML === 'no_ml'}
                        onClick={e => publishSingle(p, e)}
                      >{inQueue ? '✓ Na fila' : '▶ Publicar'}</button>
                    </td>
                  </tr>
                  {isOpen && (
                    <tr className="rank-expand">
                      <td colSpan={8}>
                        <div className="rank-expand-inner">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Breakdown */}
                            <div>
                              <h4 className="font-bold mb-3 text-sm">📊 Breakdown do score: <span style={{color:'var(--green)'}}>{p.score}/100</span></h4>
                              {Object.entries(p.components).map(([k,v]) => {
                                const w = criteria.weights[k];
                                const contrib = Math.round(v * w / 100);
                                const lbl = { velocidade:'Velocidade', margem:'Margem', estoque:'Estoque', recencia:'Recência', qualidade:'Qualidade', categoria:'Categoria', naoML:'Ainda não no ML' }[k];
                                return (
                                  <div key={k} className="mb-3">
                                    <div className="flex justify-between text-[12px] mb-1">
                                      <span>{lbl} <span className="sub mono">· peso {w}%</span></span>
                                      <span className="mono font-bold">{v}/100 → +{contrib}</span>
                                    </div>
                                    <div className="crit-bar"><div className="crit-bar-fill" style={{width: v + '%'}}></div></div>
                                  </div>
                                );
                              })}
                            </div>

                            {/* Dados + IA */}

// ===== Helper: persiste sub-aba ativa por setor (com override opcional) =====
function useSubTab(sectorKey, defaultTab, override){
  const storeKey = `sector_${sectorKey}_subtab`;
  const [sub, setSubState] = useState(() => {
    if (override) return override;
    try { return localStorage.getItem(storeKey) || defaultTab; }
    catch(_){ return defaultTab; }
  });
  // Sempre que o override mudar (ex: usuário clicou em rota antiga "products"), sincroniza
  useEffect(() => {
    if (override && override !== sub) {
      setSubState(override);
      try { localStorage.setItem(storeKey, override); } catch(_){}
    }
  }, [override]); // eslint-disable-line
  const setSub = (v) => { setSubState(v); try { localStorage.setItem(storeKey, v); } catch(_){} };
  return [sub, setSub];
}

// ===== Hook: gestão de pedidos =====
function usePedidos(){
  const [pedidos, setPedidos]     = useState(null);
  const [resumo, setResumo]       = useState(null);
  const [stats, setStats]         = useState(null);
  const [statusFiltro, setStatus] = useState(''); // '', paid, confirmed, cancelled
  const [busy, setBusy]           = useState(false);
  const [msg, setMsg]             = useState(null);

  const refresh = useCallback(async () => {
    const ml = loadMLTokens();
    if (!ml?.access_token) { setPedidos(null); setStats(null); return; }
    setBusy(true);
    try {
      const qs = statusFiltro ? `?status=${encodeURIComponent(statusFiltro)}` : '';
      const [lR, sR] = await Promise.all([
        fetch('/api/ml/pedidos'+qs, { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
        fetch('/api/ml/pedidos/stats/resumo', { headers:{ 'Authorization':'Bearer '+ml.access_token }}),
      ]);
      const lJ = await lR.json().catch(()=>null);
      const sJ = await sR.json().catch(()=>null);
      if (lJ?.success) { setPedidos(lJ.pedidos || []); setResumo(lJ.resumo || null); }
      if (sJ?.success) setStats(sJ);
    } catch(e){ setMsg('❌ '+e.message); }
    finally { setBusy(false); }
  }, [statusFiltro]);

  const detalhes = useCallback(async (orderId) => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return null;
    const r = await fetch(`/api/ml/pedidos/${orderId}`, {
      headers:{ 'Authorization':'Bearer '+ml.access_token }
    });
    return await r.json().catch(()=>({ success:false }));
  }, []);

  const despachar = useCallback(async (shipmentId) => {
    const ml = loadMLTokens();
    if (!ml?.access_token) return { success:false, error:'sem token' };
    const r = await fetch(`/api/ml/envios/${shipmentId}/despachar`, {
      method:'POST', headers:{ 'Authorization':'Bearer '+ml.access_token }
    });
    const d = await r.json().catch(()=>({ success:false }));
    if (d.success) setMsg('🚚 Marcado como pronto pra despachar!');
    else setMsg('❌ '+(d.error || 'falha'));
    return d;
  }, []);

  const etiquetaUrl = useCallback((shipmentId) => {
    const ml = loadMLTokens();
    if (!ml?.access_token || !shipmentId) return null;
    return `/api/ml/envios/${shipmentId}/etiqueta?access_token=${encodeURIComponent(ml.access_token)}`;
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  return { pedidos, resumo, stats, statusFiltro, setStatus,
           busy, msg, refresh, detalhes, despachar, etiquetaUrl };
}

      // Busca SLAs em paralelo (não bloqueia renderização principal)

function EtiquetasPage(){

    if (!tokens?.access_token) { setErr('Conecte sua conta ML primeiro'); setLoading(false); return; }

    try {
      const r = await fetch('/api/ml/pedidos', {
        headers: { 'Authorization': 'Bearer ' + tokens.access_token }

// ===== CONCORRÊNCIA — análise + ajuste automático de preço =====
function ConcorrenciaPage(){
  const [percentualAbaixo, setPercentualAbaixo] = useState(5);
  const [margemMinima, setMargemMinima]         = useState(15);
  const [rodando, setRodando]                   = useState(false);
  const [resp, setResp]                         = useState(null);
  const [historico, setHistorico]               = useState([]);
  const [err, setErr]                           = useState(null);

  const tokens = loadMLTokens();
  const authHeader = tokens?.access_token ? { 'Authorization': 'Bearer ' + tokens.access_token } : {};

  const carregarHistorico = useCallback(async () => {
    if (!tokens?.access_token) return;
    try {
      const r = await fetch('/api/ml/preco/historico', { headers: authHeader });
      const d = await r.json();
      if (d.success) setHistorico(d.ajustes || []);
    } catch(e) {}
  }, [tokens?.access_token]);

  useEffect(() => { carregarHistorico(); }, [carregarHistorico]);

  async function analisar(modoTeste){
    if (!tokens?.access_token) { setErr('Conecte sua conta ML primeiro'); return; }
    if (!modoTeste && !window.confirm(`Tem certeza que deseja ALTERAR OS PREÇOS DE VERDADE (${percentualAbaixo}% abaixo do concorrente, margem mínima ${margemMinima}%)?`)) return;
    setRodando(true); setErr(null); setResp(null);
    try {
      const r = await fetch('/api/ml/preco/ajuste-automatico', {
        method: 'POST',
        headers: { ...authHeader, 'Content-Type': 'application/json' },
        body: JSON.stringify({ percentualAbaixo, margemMinima, modoTeste }),
      });
      const d = await r.json();
      setResp(d);
      if (!modoTeste) await carregarHistorico();
    } catch(e) { setErr(e.message); }
    setRodando(false);
  }

  const tempoAtras = (iso) => {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    const min = Math.floor(ms / 60000);
    if (min < 1) return 'agora';
    if (min < 60) return `há ${min}min`;
    const h = Math.floor(min / 60);
    if (h < 24) return `há ${h}h`;
    const d = Math.floor(h / 24);
    return `há ${d}d`;
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold flex items-center gap-3">
            <Icon3D name="target" color="red" size={28}/>
            <span>Ajuste de Preço — Concorrência</span>
          </h1>
          <p className="sub text-sm">Analisa os top 5 concorrentes por anúncio e sugere/aplica ajustes mantendo margem mínima</p>
        </div>
      </div>

      <MLTokenExpiredBanner/>
      {err && <div className="err mb-4 text-xs">{err}</div>}

      {/* Configuração */}
      <div className="card p-5 mb-4">
        <h3 className="font-bold mb-3">⚙️ Configuração</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label className="sub text-xs block mb-1">Ficar X% abaixo do concorrente mais barato</label>
            <div className="flex items-center gap-2">
              <input type="number" min="0" max="50" step="0.5" value={percentualAbaixo}
                     onChange={e => setPercentualAbaixo(Math.max(0, Math.min(50, +e.target.value || 0)))}
                     className="input mono" style={{width:100}}/>
              <span className="sub text-sm">%</span>
            </div>
          </div>
          <div>
            <label className="sub text-xs block mb-1">Margem mínima (não baixar se margem &lt; isso)</label>
            <div className="flex items-center gap-2">
              <input type="number" min="0" max="80" step="1" value={margemMinima}
                     onChange={e => setMargemMinima(Math.max(0, Math.min(80, +e.target.value || 0)))}
                     className="input mono" style={{width:100}}/>
              <span className="sub text-sm">%</span>
            </div>
          </div>
        </div>
        <div className="flex gap-2 mt-4 flex-wrap">
          <button className="btn-ghost" onClick={() => analisar(true)} disabled={rodando}>
            {rodando ? '🔍 ...' : '🔍 Analisar Todos (modo teste)'}
          </button>
          <button className="btn-ghost" onClick={() => analisar(false)} disabled={rodando}
                  style={{borderColor:'rgba(220,38,38,.4)', color:'#dc2626'}}>
            {rodando ? '💰 ...' : '💰 Ajustar de Verdade'}
          </button>
        </div>
        <p className="sub text-xs mt-3">⚠️ Análise demora ~10s por conta do rate limit (1s entre itens, até 10 anúncios).</p>
      </div>

      {/* Resultado */}
      {resp && (
        <div className="card p-5 mb-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold">
              {resp.modoTeste ? '🧪 Simulação' : '💰 Ajuste aplicado'} —
              {' '}{resp.total || 0} anúncio(s), {resp.ajustados || 0} ajustado(s)
            </h3>
            <button className="btn-ghost text-xs" onClick={() => setResp(null)}>fechar</button>
          </div>
          {resp.success === false && <div className="err text-xs">{resp.error}</div>}
          {(resp.resultados || []).length === 0 ? (
            <div className="sub text-xs italic">Sem resultados.</div>
          ) : (
            <div style={{maxHeight: 360, overflowY:'auto'}}>
              {resp.resultados.map((r, i) => (
                <div key={i} className="card p-3 mb-2" style={{background:'rgba(255,255,255,.02)'}}>
                  <div className="flex items-center justify-between flex-wrap gap-2">
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-sm truncate">{r.titulo || r.itemId}</div>
                      <div className="sub text-xs mono mt-1">{r.itemId}</div>
                      <div className="text-xs mt-1">{r.acao}</div>
                      {r.error && <div className="err text-xs mt-1">{r.error}</div>}
                    </div>
                    {(r.meuPreco || r.precoAnterior) && (
                      <div className="text-xs text-right whitespace-nowrap">
                        {r.meuPreco        && <div><span className="sub">meu</span> <b>R$ {Number(r.meuPreco).toFixed(2)}</b></div>}
                        {r.menorConc       && <div><span className="sub">conc</span> <b>R$ {Number(r.menorConc).toFixed(2)}</b></div>}
                        {r.precoIdeal      && <div><span className="sub">ideal</span> <b style={{color:'var(--green)'}}>R$ {Number(r.precoIdeal).toFixed(2)}</b></div>}
                        {r.novoPreco && !r.precoIdeal && <div><span className="sub">novo</span> <b style={{color:'var(--green)'}}>R$ {Number(r.novoPreco).toFixed(2)}</b></div>}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Histórico */}
      <div className="card p-5 mb-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold">📜 Histórico de Ajustes ({historico.length})</h3>
          <button className="btn-ghost text-xs" onClick={carregarHistorico}>🔄</button>
        </div>
        {historico.length === 0 ? (
          <div className="sub text-xs italic">Nenhum ajuste registrado ainda.</div>
        ) : (
          <div style={{maxHeight: 280, overflowY:'auto'}}>
            {historico.slice(0, 50).map((a, i) => {
              const delta = Number(a.novoPreco) - Number(a.precoAnterior);
              const deltaPct = a.precoAnterior ? ((delta / a.precoAnterior) * 100).toFixed(1) : '0';
              return (
                <div key={i} className="flex items-center justify-between py-2 border-b border-[var(--line)] text-sm">
                  <div className="flex-1 min-w-0">
                    <div className="font-bold truncate">💰 {a.titulo}</div>
                    <div className="sub text-xs mt-1">
                      <span className="mono">{a.itemId}</span> · {a.motivo}
                    </div>
                  </div>
                  <div className="text-xs text-right whitespace-nowrap ml-2">
                    <div><span className="sub">R$ {Number(a.precoAnterior).toFixed(2)}</span> → <b style={{color: delta < 0 ? '#eab308' : 'var(--green)'}}>R$ {Number(a.novoPreco).toFixed(2)}</b></div>
                    <div className="sub">{delta >= 0 ? '+' : ''}{deltaPct}% · {tempoAtras(a.data)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ===== MENSAGENS PÓS-VENDA — configuração + histórico + envio manual =====
function MensagensPosVendaPage(){
  const [config, setConfig]       = useState(null);
  const [historico, setHistorico] = useState([]);
  const [loading, setLoading]     = useState(false);
  const [err, setErr]             = useState(null);

  // envio manual
  const [manualOrder, setManualOrder] = useState('');
  const [manualTipo, setManualTipo]   = useState('venda_confirmada');
  const [enviando, setEnviando]       = useState(false);
  const [resultado, setResultado]     = useState(null);

  const tokens = loadMLTokens();
  const authHeader = tokens?.access_token ? { 'Authorization': 'Bearer ' + tokens.access_token } : {};

  const refresh = useCallback(async () => {
    if (!tokens?.access_token) { setErr('Conecte sua conta ML primeiro'); return; }
    setLoading(true); setErr(null);
    try {
      const [cR, hR] = await Promise.all([
        fetch('/api/ml/mensagem/config',    { headers: authHeader }),
        fetch('/api/ml/mensagem/historico', { headers: authHeader }),
      ]);
      const cfg = await cR.json();
      const hist = await hR.json();
      if (cfg.success) setConfig(cfg.autoEnviar);
      if (hist.success) setHistorico(hist.mensagens || []);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }, [tokens?.access_token]);

  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => {
    const id = setInterval(refresh, 30000); // atualiza a cada 30s
    return () => clearInterval(id);
  }, [refresh]);

  async function toggleConfig(campo, valor){
    if (!tokens?.access_token) return;
    const novo = { ...(config || {}), [campo]: valor };
    setConfig(novo); // otimista
    try {
      const r = await fetch('/api/ml/mensagem/config', {
        method: 'POST',
        headers: { ...authHeader, 'Content-Type': 'application/json' },
        body: JSON.stringify({ [campo]: valor }),
      });
      const d = await r.json();
      if (d.success) setConfig(d.config);
    } catch(e) { /* silencioso — próxima atualização corrige */ }
  }

  async function enviarManual(){
    if (!manualOrder.trim()) { setResultado({ success:false, error:'Informe o orderId' }); return; }
    if (!tokens?.access_token) { setResultado({ success:false, error:'sem token' }); return; }
    setEnviando(true); setResultado(null);
    try {
      const r = await fetch('/api/ml/mensagem/enviar', {
        method: 'POST',
        headers: { ...authHeader, 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderId: manualOrder.trim(), tipo: manualTipo }),
      });
      const d = await r.json();
      setResultado(d);
      if (d.success) { setManualOrder(''); await refresh(); }
    } catch(e) { setResultado({ success:false, error: e.message }); }
    setEnviando(false);
  }

  const tipoLabel = {
    venda_confirmada: { icon:'🛒', label:'Venda confirmada', desc:'"Obrigado pela compra!" quando pedido fica pago' },
    produto_enviado:  { icon:'📦', label:'Produto enviado',  desc:'"Seu pedido foi enviado!" quando shipment = shipped' },
    produto_entregue: { icon:'🎉', label:'Produto entregue', desc:'"Recebeu? Avalie!" quando shipment = delivered' },
  };

  const tempoAtras = (iso) => {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    const min = Math.floor(ms / 60000);
    if (min < 1) return 'agora';
    if (min < 60) return `há ${min}min`;
    const h = Math.floor(min / 60);
    if (h < 24) return `há ${h}h`;
    const d = Math.floor(h / 24);
    return `há ${d}d`;
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold flex items-center gap-3">
            <Icon3D name="send" color="blue" size={28}/>
            <span>Mensagens Pós-Venda</span>
          </h1>
          <p className="sub text-sm">Mensagens automáticas acionadas por webhooks (orders_v2 + shipments)</p>
        </div>
        <button className="btn-ghost" onClick={refresh} disabled={loading}>
          {loading ? '🔄 ...' : '🔄 Atualizar'}
        </button>
      </div>

      <MLTokenExpiredBanner/>
      {err && <div className="err mb-4 text-xs">{err}</div>}

      {/* Configuração */}
      <div className="card p-5 mb-4">
        <h3 className="font-bold mb-3">⚙️ Configuração — auto-envio</h3>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          {['venda_confirmada','produto_enviado','produto_entregue'].map(k => {
            const info = tipoLabel[k];
            const ativo = config ? !!config[k] : true;
            return (
              <label key={k} className="card p-3 cursor-pointer" style={{background:'rgba(255,255,255,.02)', borderColor: ativo ? 'rgba(0,167,255,.4)' : 'var(--line)'}}>
                <div className="flex items-start gap-2">
                  <input type="checkbox" checked={ativo} onChange={e => toggleConfig(k, e.target.checked)} className="mt-1"/>
                  <div className="flex-1">
                    <div className="font-bold text-sm">{info.icon} {info.label}</div>
                    <div className="sub text-xs mt-1">{info.desc}</div>
                  </div>
                </div>
              </label>
            );
          })}
        </div>
      </div>

      {/* Histórico */}
      <div className="card p-5 mb-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold">📜 Histórico ({historico.length})</h3>
          <span className="sub text-xs">últimas 50 mensagens</span>
        </div>
        {historico.length === 0 ? (
          <div className="sub text-xs italic">Nenhuma mensagem enviada ainda — aguardando webhooks de vendas.</div>
        ) : (
          <div style={{maxHeight: 320, overflowY:'auto'}}>
            {historico.slice(0, 50).map((m, i) => {
              const info = tipoLabel[m.tipo] || { icon:'✉️', label: m.tipo };
              return (
                <div key={i} className="flex items-center justify-between py-2 border-b border-[var(--line)] text-sm">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span>{m.sucesso ? '✅' : '❌'}</span>
                      <span className="font-bold">{info.icon} {m.tipo}</span>
                      <span className="sub text-xs">→ {m.comprador}</span>
                    </div>
                    <div className="sub text-xs mt-1 truncate">{m.item} · pedido <span className="mono">{m.orderId}</span>{m.erro ? ' · ' + m.erro : ''}</div>
                  </div>
                  <div className="sub text-xs whitespace-nowrap ml-2">{tempoAtras(m.enviada)}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Envio manual */}
      <div className="card p-5 mb-4">
        <h3 className="font-bold mb-3">📨 Envio Manual</h3>
        <div className="flex flex-wrap gap-2 items-end">
          <div className="flex-1 min-w-[200px]">
            <label className="sub text-xs block mb-1">Pedido (orderId)</label>
            <input type="text" value={manualOrder} onChange={e => setManualOrder(e.target.value)}
                   placeholder="Ex: 2000009999999999" className="input mono" style={{width:'100%'}}/>
          </div>
          <div>
            <label className="sub text-xs block mb-1">Tipo</label>
            <select value={manualTipo} onChange={e => setManualTipo(e.target.value)} className="input">
              <option value="venda_confirmada">🛒 venda_confirmada</option>
              <option value="produto_enviado">📦 produto_enviado</option>
              <option value="produto_entregue">🎉 produto_entregue</option>
            </select>
          </div>
          <button className="btn" onClick={enviarManual} disabled={enviando || !manualOrder.trim()}>
            {enviando ? '📨 ...' : '📨 Enviar Mensagem'}
          </button>
        </div>
        {resultado && (
          <div className={`mt-3 text-xs ${resultado.success ? 'ok' : 'err'}`}>
            {resultado.success
              ? <>✅ Enviada! <span className="sub">(tipo {resultado.tipo}, pedido <span className="mono">{resultado.orderId}</span>)</span></>
              : <>❌ {resultado.error || 'Falha ao enviar'}</>}
          </div>
        )}
      </div>

      <TemplatesEditor/>
    </div>
  );
}

// ===== Editor de templates de mensagem pós-venda =====
function TemplatesEditor(){
  const [templates, setTemplates]       = useState(null);
  const [loading, setLoading]           = useState(false);
  const [saving, setSaving]             = useState(false);
  const [msg, setMsg]                   = useState(null);
  const [local, setLocal]               = useState({ venda_confirmada:'', produto_enviado:'', produto_entregue:'' });

  const refresh = useCallback(async () => {
    setLoading(true); setMsg(null);
    try {
      const r = await fetch('/api/ml/mensagem/templates');
      const d = await r.json();
      if (d.success) {
        setTemplates(d.templates);
        setLocal({
          venda_confirmada: d.templates.venda_confirmada || '',
          produto_enviado:  d.templates.produto_enviado  || '',
          produto_entregue: d.templates.produto_entregue || '',
        });
      }
    } catch(e) { setMsg({ ok:false, text: e.message }); }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  async function salvar(){
    setSaving(true); setMsg(null);
    try {
      const r = await fetch('/api/ml/mensagem/templates', {
        method: 'PUT',
        headers: { 'Content-Type':'application/json', 'X-Admin-Secret': getAdminSecret() },
        body: JSON.stringify(local),
      });
      const d = await r.json();
      if (d.success) {
        setTemplates(d.templates);
        setMsg({ ok:true, text:'Templates salvos!' });
      } else {
        setMsg({ ok:false, text: d.error || 'Falha ao salvar' });
      }
    } catch(e) { setMsg({ ok:false, text: e.message }); }
    setSaving(false);
  }

  const info = {
    venda_confirmada: { icon:'🛒', label:'Venda confirmada' },
    produto_enviado:  { icon:'📦', label:'Produto enviado' },
    produto_entregue: { icon:'🎉', label:'Produto entregue' },
  };

  return (
    <div className="card p-5 mb-4">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 className="font-bold">📝 Editar Templates</h3>
        <div className="sub text-xs">Placeholders: <span className="mono">{'{comprador}'}</span> · <span className="mono">{'{item}'}</span> · <span className="mono">{'{rastreio}'}</span></div>
      </div>
      {loading && !templates && <div className="ok mb-3 text-xs">⏳ Carregando…</div>}

      {['venda_confirmada','produto_enviado','produto_entregue'].map(k => (
        <div key={k} className="mb-3">
          <label className="sub text-xs block mb-1">{info[k].icon} {info[k].label}</label>
          <textarea
            value={local[k]}
            onChange={e => setLocal(s => ({ ...s, [k]: e.target.value }))}
            rows={6}
            className="input mono"
            style={{width:'100%', fontFamily:'inherit', fontSize:12, lineHeight:1.5, whiteSpace:'pre-wrap'}}
          />
        </div>
      ))}

      <div className="flex items-center gap-2 flex-wrap">
        <button className="btn" onClick={salvar} disabled={saving || loading}>
          {saving ? '💾 ...' : '💾 Salvar Templates'}
        </button>
        <button className="btn-ghost text-xs" onClick={refresh} disabled={loading}>🔄 Recarregar</button>
        {msg && <span className={`text-xs ${msg.ok ? 'ok' : 'err'}`}>{msg.ok ? '✅' : '❌'} {msg.text}</span>}
      </div>
      <p className="sub text-xs mt-2">⚠️ Requer X-Admin-Secret configurado em <b>Config → Setup</b>.</p>
    </div>
  );
}

// ===== PERFORMANCE PAGE — classificação automática TOP/MÉDIO/RUIM =====
function PerformancePage(){
  const [perf, setPerf]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);
  const [pausando, setPausando] = useState(false);
  const [ultPausa, setUltPausa] = useState(null);
  const [escalarBusyId, setEscalarBusyId] = useState(null);
  const [escalarResult, setEscalarResult] = useState(null);
  const [escalarUltimoId, setEscalarUltimoId] = useState(null);

  const refresh = useCallback(async () => {
    const tokens = loadMLTokens();
    if (!tokens || !tokens.access_token) { setErr('Conecte sua conta ML primeiro'); return; }
    setLoading(true); setErr(null);
    try {
      const r = await fetch('/api/ml/performance', {
        headers: { 'Authorization': 'Bearer ' + tokens.access_token }
      });
      const data = await r.json();
      if (data.success) setPerf(data);
      else setErr(data.error || 'Falha ao carregar performance');
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  async function pausarRuins(modoTeste = true){
    const tokens = loadMLTokens();
    if (!tokens || !tokens.access_token) { setErr('Conecte sua conta ML primeiro'); return; }
    if (!modoTeste && !window.confirm('Tem certeza que deseja PAUSAR DE VERDADE os anúncios ruins (14+ dias sem venda)?')) return;
    setPausando(true);
    try {
      const r = await fetch('/api/ml/performance/pausar-ruins', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tokens.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ diasSemVenda: 14, modoTeste })
      });
      const data = await r.json();
      setUltPausa(data);
      if (!modoTeste) await refresh();
    } catch(e) { setUltPausa({ success:false, error: e.message }); }
    setPausando(false);
  }

  const resumo = perf?.resumo;
  const cls    = perf?.classificacao;

  async function escalarAnuncio(itemId, modoTeste = true){
    const tokens = loadMLTokens();
    if (!tokens?.access_token) { setErr('Conecte sua conta ML primeiro'); return; }
    if (!modoTeste && !window.confirm('Criar variações REAIS deste anúncio no Mercado Livre? (publica novas páginas com títulos variados)')) return;
    setEscalarBusyId(itemId);
    setEscalarUltimoId(itemId);
    setEscalarResult(null);
    try {
      const r = await fetch('/api/ml/performance/escalar', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tokens.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId, modoTeste }),
      });
      const d = await r.json();
      setEscalarResult(d);
      if (d.success && !modoTeste) await refresh();
    } catch(e) { setEscalarResult({ success:false, error: e.message }); }
    setEscalarBusyId(null);
  }

  const renderItem = (a, opts = {}) => (

      {cls && (

            {cls.top.length === 0

// ===== Setup do Sistema — painel unificado de configuração =====
// Consome /api/config/status + permite salvar Anthropic key e configurar webhooks.
// O X-Admin-Secret fica no localStorage (só o painel do dono precisa saber).
const ADMIN_SECRET_KEY = 'agente_admin_secret';
function getAdminSecret(){
  try { return localStorage.getItem(ADMIN_SECRET_KEY) || 'agente-marketplace-2026'; } catch(_) { return 'agente-marketplace-2026'; }
}
function setAdminSecret(s){
  try { if (s) localStorage.setItem(ADMIN_SECRET_KEY, s); else localStorage.removeItem(ADMIN_SECRET_KEY); } catch(_) {}
}

function SetupPage(){
  const [cfg, setCfg]         = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);

  const [apiKey, setApiKey]           = useState('');
  const [savingKey, setSavingKey]     = useState(false);
  const [keyMsg, setKeyMsg]           = useState(null);

  const [whBusy, setWhBusy]           = useState(false);
  const [whResp, setWhResp]           = useState(null);

  const [secretInput, setSecretInput] = useState(() => getAdminSecret());

  const refresh = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const r = await fetch('/api/config/status');
      const d = await r.json();
      if (d.success === false) setErr(d.error || 'Falha ao carregar status');
      else setCfg(d);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  async function salvarAnthropicKey(){
    if (!apiKey.trim().startsWith('sk-ant-')) {
      setKeyMsg({ ok:false, text:'API key deve começar com sk-ant-' });
      return;
    }
    setSavingKey(true); setKeyMsg(null);
    try {
      const r = await fetch('/api/config/anthropic-key', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'X-Admin-Secret': getAdminSecret() },
        body: JSON.stringify({ apiKey: apiKey.trim() }),
      });
      const d = await r.json();
      if (d.success) {
        setKeyMsg({ ok:true, text:d.message || 'API key salva!' });
        setApiKey('');
        await refresh();
      } else {
        setKeyMsg({ ok:false, text: d.error || 'Falha ao salvar' });
      }
    } catch(e) {
      setKeyMsg({ ok:false, text: e.message });
    }
    setSavingKey(false);
  }

  async function configurarWebhooks(){
    setWhBusy(true); setWhResp(null);
    try {
      const r = await fetch('/api/webhooks/configurar', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
      });
      const d = await r.json();
      setWhResp(d);
      await refresh();
    } catch(e) {
      setWhResp({ success:false, error: e.message });
    }
    setWhBusy(false);
  }

  const dot = (ok) => ok ? '🟢' : '⚪';
  const hoursLeftLabel = (exp) => {
    if (!exp) return '—';
    const h = (new Date(exp).getTime() - Date.now()) / 3600000;
    if (h <= 0) return 'expirado';
    return `${h.toFixed(1)}h restantes`;
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold flex items-center gap-3">
            <Icon3D name="wrench" color="zinc" size={28}/>
            <span>Setup do Sistema</span>
          </h1>
          <p className="sub text-sm">Status de todas as integrações · configuração sem SSH</p>
        </div>
        <button className="btn-ghost" onClick={refresh} disabled={loading}>
          {loading ? '🔄 ...' : '🔄 Atualizar'}
        </button>
      </div>

      {err && <div className="err mb-4 text-xs">{err}</div>}
      {loading && !cfg && <div className="ok mb-4">⏳ Carregando status…</div>}

      {cfg && (
        <>
          {/* Status das integrações */}
          <div className="card p-5 mb-4">
            <h3 className="font-bold mb-3">🔌 Status das Integrações</h3>

            <div className="py-3 border-b border-[var(--line)]">
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div className="font-bold">{dot(cfg.ml?.tokenValido)} Mercado Livre</div>
                  <div className="sub text-xs mt-1">
                    {cfg.ml?.tokenValido
                      ? <>Conectado · {hoursLeftLabel(cfg.ml.expires_at)} · user <span className="mono">{cfg.ml.user_id || '—'}</span></>
                      : cfg.ml?.connected ? 'Token salvo mas expirado' : 'Não conectado'}
                  </div>
                  {cfg.ml?.auto_refresh && <div className="sub text-xs" style={{color:'var(--green)'}}>✅ Auto-refresh ativo</div>}
                </div>
              </div>
            </div>

            <div className="py-3 border-b border-[var(--line)]">
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div className="font-bold">{dot(cfg.bling?.connected)} Bling ERP</div>
                  <div className="sub text-xs mt-1">
                    {cfg.bling?.connected ? 'Conectado' :
                     cfg.bling?.configured ? 'Credenciais configuradas, sem OAuth ainda' : 'Não configurado (aguardando Client ID)'}
                  </div>
                </div>
              </div>
            </div>

            <div className="py-3 border-b border-[var(--line)]">
              <div className="flex items-center justify-between gap-3 flex-wrap mb-2">
                <div>
                  <div className="font-bold">{dot(cfg.ia?.configured)} IA Generativa (Anthropic)</div>
                  <div className="sub text-xs mt-1">
                    {cfg.ia?.configured ? <>Configurada · modelo <span className="mono">{cfg.ia.modelo}</span></> : 'Não configurada — SAC usa templates (funcional)'}
                  </div>
                </div>
              </div>
              {!cfg.ia?.configured && (
                <div className="mt-2">
                  <div className="flex flex-wrap gap-2 items-end">
                    <div className="flex-1 min-w-[220px]">
                      <label className="sub text-xs block mb-1">API Key (sk-ant-…)</label>
                      <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
                             placeholder="sk-ant-api03-..." className="input mono" style={{width:'100%'}}/>
                    </div>
                    <button className="btn" onClick={salvarAnthropicKey} disabled={savingKey || !apiKey.trim()}>
                      {savingKey ? '💾 ...' : '💾 Salvar'}
                    </button>
                  </div>
                  <div className="sub text-xs mt-1">Obter em <span className="mono">console.anthropic.com</span></div>
                  {keyMsg && <div className={`text-xs mt-2 ${keyMsg.ok ? 'ok' : 'err'}`}>{keyMsg.ok ? '✅' : '❌'} {keyMsg.text}</div>}
                </div>
              )}
            </div>

            <div className="py-3">
              <div className="flex items-center justify-between gap-3 flex-wrap mb-2">
                <div>
                  <div className="font-bold">{dot(cfg.webhooks?.recebendo)} Webhooks ML</div>
                  <div className="sub text-xs mt-1">
                    URL: <span className="mono">{cfg.webhooks?.urlConfigurada}</span>
                    {' · '}
                    {cfg.webhooks?.recebendo ? `✅ ${cfg.webhooks.total} recebidos` : '⚠️ nenhum recebido ainda'}
                  </div>
                </div>
                <button className="btn-ghost text-xs" onClick={configurarWebhooks} disabled={whBusy}>
                  {whBusy ? '🔔 ...' : '🔔 Configurar Automaticamente'}
                </button>
              </div>
              {whResp && (
                <div className="mt-2 text-xs">
                  {whResp.success
                    ? <div className="ok">✅ {whResp.message || 'Webhooks configurados!'}</div>
                    : (
                      <div>
                        <div className="err">❌ {whResp.error || 'Falha'}</div>
                        {whResp.instrucoes && (
                          <div className="card p-3 mt-2" style={{background:'rgba(255,255,255,.02)'}}>
                            <div className="font-bold text-xs mb-2">Configuração manual no DevCenter:</div>
                            {Object.entries(whResp.instrucoes).map(([k,v]) => (
                              <div key={k} className="text-xs"><span className="sub">{k}:</span> {v}</div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                </div>
              )}
            </div>
          </div>

          {/* Cache + Rate Limiter */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div className="card p-5">
              <h3 className="font-bold mb-2">📦 Cache ML</h3>
              <div className="text-2xl font-bold">{cfg.cache?.entradas || 0}</div>
              <div className="sub text-xs mt-1">entrada(s) em cache · TTL 5 min</div>
              <div className="sub text-xs mt-1">Serve fallback quando ML retorna 429 ou vazio</div>
            </div>
            <div className="card p-5">
              <h3 className="font-bold mb-2">📊 Rate Limiter</h3>
              {cfg.rateLimiter ? (
                <>
                  <div className="text-2xl font-bold">
                    {cfg.rateLimiter.reqUltimoMinuto}/{cfg.rateLimiter.limite}
                    <span className="sub text-sm ml-2">({cfg.rateLimiter.percentual}%)</span>
                  </div>
                  <div className="sub text-xs mt-1">
                    Hoje: {cfg.rateLimiter.totalHoje} · Bloqueios: {cfg.rateLimiter.bloqueios}
                    {cfg.rateLimiter.pausado && <span style={{color:'#ef4444'}}> · PAUSADO</span>}
                  </div>
                </>
              ) : <div className="sub text-xs">—</div>}
            </div>
          </div>

          {/* Admin secret */}
          <div className="card p-5 mb-4" style={{borderColor: cfg.admin?.usando_secret_default ? 'rgba(234,179,8,.35)' : 'var(--line)'}}>
            <h3 className="font-bold mb-3">🛡️ Admin Secret</h3>
            <p className="sub text-xs mb-2">
              Protege <span className="mono">/api/tokens/manual-connect</span> e <span className="mono">/api/config/anthropic-key</span>.
              {cfg.admin?.usando_secret_default && <span style={{color:'var(--yellow)'}}> ⚠️ Usando secret default — defina <span className="mono">ADMIN_SECRET</span> no <span className="mono">.env</span> do servidor.</span>}
            </p>
            <div className="flex flex-wrap gap-2 items-end">
              <div className="flex-1 min-w-[220px]">
                <label className="sub text-xs block mb-1">Secret (armazenado só no seu navegador)</label>
                <input type="password" value={secretInput} onChange={e => setSecretInput(e.target.value)}
                       className="input mono" style={{width:'100%'}}/>
              </div>
              <button className="btn-ghost" onClick={() => { setAdminSecret(secretInput); setKeyMsg({ ok:true, text:'Secret do navegador atualizado' }); }}>
                💾 Salvar
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== Painel centralizado de erros de integração =====
function ErrosPage(){
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const r = await fetch('/api/erros');
      const d = await r.json();
      if (d.success === false) setErr(d.error || 'Falha');
      else setData(d);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 30_000);
    return () => clearInterval(id);
  }, [refresh]);

  async function resolver(id){
    try {
      await fetch(`/api/erros/${id}/resolver`, { method: 'POST' });
      await refresh();
    } catch(_) {}
  }

  const tempoAtras = (iso) => {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    const min = Math.floor(ms / 60000);
    if (min < 1) return 'agora';
    if (min < 60) return `há ${min}min`;
    const h = Math.floor(min / 60);
    if (h < 24) return `há ${h}h`;
    return `há ${Math.floor(h / 24)}d`;
  };

  const po = data?.porOrigem || {};
  const erros = data?.erros || [];

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold flex items-center gap-3">
            <Icon3D name="alert-triangle" color="amber" size={28}/>
            <span>Erros de Integração</span>
          </h1>
          <p className="sub text-sm">
            {data ? <>{data.naoResolvidos} não resolvidos · {data.total} totais</> : 'carregando…'}
          </p>
        </div>
        <button className="btn-ghost" onClick={refresh} disabled={loading}>
          {loading ? '🔄 ...' : '🔄 Atualizar'}
        </button>
      </div>

      {err && <div className="err mb-4 text-xs">{err}</div>}

      {data && (
        <>
          <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
            <KPI label="Publicação" value={po.publicacao || 0} sub="—"/>
            <KPI label="SAC"         value={po.sac || 0}         sub="—"/>
            <KPI label="Estoque"     value={po.estoque || 0}     sub="—"/>
            <KPI label="Pedido"      value={po.pedido || 0}      sub="—"/>
            <KPI label="Webhook"     value={po.webhook || 0}     sub="—"/>
            <KPI label="Auth"        value={po.auth || 0}        sub="—"/>
          </div>

          <div className="card p-5">
            <h3 className="font-bold mb-3">📋 Últimos 50 erros</h3>
            {erros.length === 0 ? (
              <div className="sub text-xs italic">Nenhum erro registrado — parabéns! 🎉</div>
            ) : (
              <div style={{maxHeight: 500, overflowY:'auto'}}>
                {erros.map(e => (
                  <div key={e.id} className="card p-3 mb-2"
                       style={{background:'rgba(255,255,255,.02)', borderColor: e.resolvido ? 'var(--line)' : 'rgba(220,38,38,.35)'}}>
                    <div className="flex items-center justify-between flex-wrap gap-2">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 text-sm">
                          <span className="mono">[{e.origem}]</span>
                          <span className="font-bold truncate">{e.mensagem}</span>
                        </div>
                        {e.detalhes && <div className="sub text-xs mt-1 mono" style={{whiteSpace:'pre-wrap', wordBreak:'break-all'}}>{JSON.stringify(e.detalhes).slice(0, 200)}</div>}
                        <div className="sub text-xs mt-1">{tempoAtras(e.data)}{e.resolvido ? ' · ✅ resolvido' : ''}</div>
                      </div>
                      {!e.resolvido && (
                        <button className="btn-ghost text-xs" onClick={() => resolver(e.id)}>✓ Resolver</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// FASE 1.6 - FRENTE D: Página de plataformas pendentes (modelos não mapeados)
function PlataformasPendentesPage(){
  const [pendentes, setPendentes] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [err, setErr]             = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const r = await fetch('/api/agente/plataformas-pendentes');
      const d = await r.json();
      if (d.success === false) setErr(d.error || 'Falha ao carregar');
      else setPendentes(d.pendentes || []);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  async function marcarRevisado(marca, modelo){
    try {
      const r = await fetch('/api/agente/plataformas-pendentes/marcar-revisado', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ marca, modelo }),
      });
      const d = await r.json();
      if (d.success) {
        setPendentes(prev => prev.filter(p => !(p.marca === marca && p.modelo === modelo)));
      }
    } catch (_) {}
  }

  async function recarregarPlataformas(){
    try {
      const r = await fetch('/api/agente/plataformas-pendentes/recarregar', { method: 'POST' });
      const d = await r.json();
      if (d.success) {
        alert(`✅ ${d.total_plataformas} plataformas recarregadas (versão ${d.versao})`);
      } else {
        alert(`❌ ${d.error || 'Falha ao recarregar'}`);
      }
    } catch (e) { alert(`❌ ${e.message}`); }
  }

  return (
    <div>
      <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold flex items-center gap-3">
            <Icon3D name="alert-triangle" color="amber" size={28}/>
            <span>Atenção — Modelos não mapeados</span>
          </h1>
          <p className="sub text-sm">
            Modelos que apareceram em produtos publicados mas não estão em <span className="mono">plataformas_veiculares.json</span>.
          </p>
        </div>
        <button className="btn-ghost" onClick={refresh} disabled={loading}>
          {loading ? '🔄 ...' : '🔄 Atualizar'}
        </button>
      </div>

      {err && <div className="err mb-4 text-xs">{err}</div>}

      {pendentes.length === 0 ? (
        <div className="ok mb-4">✅ Nenhum modelo pendente. Tudo mapeado!</div>
      ) : (
        <div className="card p-5 mb-4">
          <h3 className="font-bold mb-3">📋 {pendentes.length} pendente(s) — ordenado por demanda</h3>
          <div style={{maxHeight: 400, overflowY: 'auto'}}>
            <table className="w-full text-sm">
              <thead>
                <tr>
                  <th>Marca</th>
                  <th>Modelo</th>
                  <th>Anos</th>
                  <th>Qtd</th>
                  <th>Exemplo</th>
                  <th>Ação</th>
                </tr>
              </thead>
              <tbody>
                {pendentes.map((p, idx) => (
                  <tr key={idx}>
                    <td>{p.marca}</td>
                    <td className="font-bold">{p.modelo}</td>
                    <td className="mono text-xs">{p.ano_inicial || '—'}–{p.ano_final || '—'}</td>
                    <td className="text-center">{p.qtd_produtos}</td>
                    <td className="sub text-xs truncate" style={{maxWidth: 220}}>{p.titulo_exemplo}</td>
                    <td>
                      <button
                        className="btn-ghost text-xs"
                        onClick={() => marcarRevisado(p.marca, p.modelo)}
                      >✓ Resolver</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="card p-5">
        <h3 className="font-bold mb-2">💡 Como adicionar uma plataforma nova</h3>
        <ol className="text-sm sub" style={{lineHeight: 1.8, paddingLeft: 22, listStyle: 'decimal'}}>
          <li>Pesquise quais carros compartilham peças com esse modelo (top sellers ML, concessionária)</li>
          <li>Edite <span className="mono">plataformas_veiculares.json</span> no servidor</li>
          <li>Adicione novo objeto no array <span className="mono">plataformas</span></li>
          <li>Clique em "🔄 Recarregar plataformas" abaixo (sem precisar restart)</li>
          <li>Marque os modelos como "✓ Resolver"</li>
        </ol>
        <button className="btn-ghost mt-3" onClick={recarregarPlataformas}>
          🔄 Recarregar plataformas_veiculares.json
        </button>
      </div>
    </div>
  );
}

function Dashboard({user, onLogout}){
  const [tab,setTab] = useState('overview');
  const [panelOpen,setPanelOpen] = useState(false);
  const notif = useNotifications();
  const agent = useAgentStore({ notif });

  // Banner de permissão de push — exibido se ainda não pediu e não dispensou
  const [showPermBanner, setShowPermBanner] = useState(() => {
    if (typeof Notification === 'undefined') return false;
    if (Notification.permission !== 'default') return false;
    return !localStorage.getItem(NOTIF_PERM_DISMISS_KEY);
  });

  const handleEnablePush = async () => {
    try {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notif.setPrefs(p => ({ ...p, push: true }));
        notif.trigger('publicado', { ml_id: 'Notificações ativadas com sucesso!' });
      }
    } catch(e) { /* ignore */ }
    setShowPermBanner(false);
  };
  const handleDismissBanner = () => {
    localStorage.setItem(NOTIF_PERM_DISMISS_KEY, '1');
    setShowPermBanner(false);
  };

  // Gerador automático de notificações mock (a cada 20-40s)
  useEffect(() => {
    let timeoutId;
    const schedule = () => {
      const delay = 20000 + Math.random() * 20000;
      timeoutId = setTimeout(() => {
        const factory = MOCK_NOTIFICATIONS[Math.floor(Math.random() * MOCK_NOTIFICATIONS.length)];
        notif.push(factory());
        schedule();
      }, delay);
    };
    schedule();
    return () => clearTimeout(timeoutId);
  }, [notif.push]);

  // Bling sync periódica — a cada 2 min se Bling conectado
  useEffect(() => {
    const tick = () => {
      const b = loadBling();
      if (!b) return;
      const updated = { ...b, ultimaSync: Date.now() };
      saveBling(updated);
      notif.push(buildNotification('publicado', { ml_id: '🔄 Bling sincronizado • ' + b.produtos.toLocaleString('pt-BR') + ' produtos' }));
    };
    const id = setInterval(tick, 120000);
    return () => clearInterval(id);
  }, [notif.push]);

  // Auto-detect ?code= na URL → troca por access_token automaticamente
  // (funciona se o redirect_uri apontar pra esta aba, ou se o usuário colar a URL)
  useEffect(() => {
    const sp = new URLSearchParams(window.location.search);
    const code      = sp.get('code');
    const connected = sp.get('connected');
    const mlUserId  = sp.get('ml_user_id');
    const mlError   = sp.get('ml_error');

    // Caso 1: server já trocou o code e redirecionou com ?connected=1
    // (fluxo totalmente automático via GET /callback)
    if (connected === '1') {
      (async () => {
        try {
          // Puxa o token que o server salvou em tokens.json
          const r = await fetch('/api/tokens/ml');
          const j = await r.json().catch(()=>({}));
          if (j.success && j.access_token) {
            saveMLTokens({
              access_token: j.access_token,
              user_id:      j.user_id || mlUserId || null,
              expires_at:   j.expires_at || null,
            });
            notif.push(buildNotification('publicado', { ml_id: '✅ ML conectado automaticamente · user_id ' + (j.user_id || mlUserId || '?') }));
          }
        } catch(e) { console.warn('sync tokens /api/tokens/ml:', e); }
        finally { window.history.replaceState({}, '', window.location.pathname); }
      })();
      return;
    }

    // Caso 2: server retornou erro na troca (redirect_uri_mismatch, invalid_grant, etc)
    if (mlError) {
      notif.push(buildNotification('problema', { score: 0 }));
      console.warn('ML OAuth erro:', decodeURIComponent(mlError));
      window.history.replaceState({}, '', window.location.pathname);
      return;
    }

    // Caso 3: caiu aqui com ?code= direto (fallback — aba front recebeu o redirect)
    if (!code) return;
    if (loadMLTokens()) {
      window.history.replaceState({}, '', window.location.pathname);
      return;
    }
    (async () => {
      try {
        const tokens = await mlExchangeCode(code);
        saveMLTokens(tokens);
        notif.push(buildNotification('publicado', { ml_id: '✅ ML conectado via callback · user_id ' + tokens.user_id }));
      } catch(e) {
        notif.push(buildNotification('problema', { score: 0 }));
        console.warn('OAuth callback falhou:', e);
      } finally {
        window.history.replaceState({}, '', window.location.pathname);
      }
    })();
  }, [notif.push]);

  return (
    <div>
      <Header
        user={user} tab={tab} setTab={setTab} onLogout={onLogout}
        unreadCount={notif.unreadCount}
        onBellClick={() => { setPanelOpen(true); /* não marca lidas auto — usuário decide */ }}
        onOpenNotifPanel={() => setPanelOpen(true)}
      />
      <main className="max-w-[1400px] mx-auto px-6 py-8">
        <DemoBanner/>
        {showPermBanner && <PermissionBanner onEnable={handleEnablePush} onDismiss={handleDismissBanner}/>}

        {/* Setor 📊 Visão Geral */}
        {tab==='overview' && (
          <OverviewPage
            onGoToProducts={() => setTab('comercial')}
            onGoToIntegrations={() => setTab('config')}
            onGoToLogistica={() => setTab('logistica')}
          />
        )}

        {/* Setor 🛍️ Comercial — legado: products → Catálogo, listings → Anúncios */}
        {(tab==='comercial' || tab==='products' || tab==='listings') && (
          <ComercialSectorPage
            agent={agent}
            onGoToAgent={() => setTab('agent')}
            initialSub={tab==='products' ? 'catalogo' : tab==='listings' ? 'anuncios' : undefined}
          />
        )}

        {/* Setor 💰 Financeiro — legado: pricing */}
        {(tab==='financeiro' || tab==='pricing') && <FinanceiroSectorPage/>}

        {/* Setor 📦 Logística */}
        {tab==='logistica' && <LogisticaSectorPage/>}

        {/* Setor 💬 Atendimento */}
        {tab==='atendimento' && <AtendimentoSectorPage/>}

        {/* Setor 📈 Marketing — legado: ranking, health */}
        {(tab==='marketing' || tab==='ranking' || tab==='health') && (
          <MarketingSectorPage
            agent={agent} notif={notif}
            onGoToAgent={() => setTab('agent')}
            initialSub={tab==='ranking' ? 'ranking' : tab==='health' ? 'performance' : undefined}
          />
        )}

        {/* Setor 🤖 Agente */}
        {tab==='agent' && <AgentePage agent={agent}/>}

        {/* Setor ⚙️ Configurações — legado: integrations */}
        {(tab==='config' || tab==='integrations') && (
          <ConfigSectorPage
            user={user} notif={notif} agent={agent}
            initialSub={tab==='integrations' ? 'integracoes' : undefined}
          />
        )}
      </main>
      <footer className="border-t border-[var(--line)] mt-16">
        <div className="max-w-[1400px] mx-auto px-6 py-6 flex justify-between text-xs sub">
          <span>Agente AM v1.0 · Painel de Operação · React + Recharts · BrasilAPI FIPE</span>
          <span className="mono">logado como {user.email}</span>
        </div>
      </footer>

      {/* Bottom nav — aparece só no mobile (CSS esconde em desktop) */}
      <MobileBottomNav tab={tab} setTab={setTab}/>

      {/* Toasts e painel — globais ao dashboard */}
      <NotificationToasts items={notif.active} onClose={notif.dismissToast}/>
      <NotificationsPanel
        open={panelOpen}
        onClose={() => setPanelOpen(false)}
        history={notif.history}
        onMarkAllRead={notif.markAllRead}
        onMarkRead={notif.markRead}
        onClear={notif.clearHistory}
      />
    </div>
  );
}

function App(){
  const [screen,setScreen] = useState('login');
  const [session,setSession] = useState(loadSession());
  const [flash,setFlash] = useState('');

  useEffect(()=>{
    if (session) setScreen('dashboard');
  },[]);

  const handleLogin = (s) => { setSession(s); setScreen('dashboard'); setFlash(''); };
  const handleLogout = () => { saveSession(null); setSession(null); setScreen('login'); };
  const handleSignup = (email) => { setFlash(`Conta criada com sucesso para ${email}. Faça login.`); setScreen('login'); };

  if (screen==='dashboard' && session) return <Dashboard user={session} onLogout={handleLogout}/>;
  if (screen==='signup') return <Signup onGo={setScreen} onSignup={handleSignup}/>;
  if (screen==='forgot') return <Forgot onGo={setScreen}/>;
  return <Login onLogin={handleLogin} onGo={setScreen} flashMessage={flash}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

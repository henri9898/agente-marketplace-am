function AgentStatusCard({ agent }) {
  const { status, queue, counts, errorMsg, start, pause, resume, stop, triggerError, startBlingToML } = agent;
  const total = counts.total;
  const remaining = queue.length;
  const processed = total - remaining;
  const pct = total > 0 ? Math.round((processed / total) * 100) : 0;

  // Detecta integrações Bling + ML prontas para o fluxo REAL
  const [bothConnected, setBothConnected] = useState(() => !!loadBlingTokens() && !!loadMLTokens());
  useEffect(() => {
    const sync = () => setBothConnected(!!loadBlingTokens() && !!loadMLTokens());
    window.addEventListener('storage', sync);
    const id = setInterval(sync, 3000);
    return () => { window.removeEventListener('storage', sync); clearInterval(id); };
  }, []);

  if (status === 'idle') {
    return (
      <div className="agent-status as-idle">
        <div className="status-icon">🤖</div>
        <div className="status-info">
          <div className="status-label" style={{color:'#4dc3ff'}}>● Agente IDLE</div>
          <div className="status-title">Pronto pra começar</div>
          <div className="status-sub">
            {counts.aguardando} produtos locais aguardando · {counts.publicados} já publicados
            {bothConnected && <span className="ml-2" style={{color:'var(--green)'}}>· 🔌 Bling + 🟡 ML conectados (fluxo real disponível)</span>}
          </div>
        </div>
        <div className="status-actions" style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {bothConnected && startBlingToML && (
            <button
              className="btn-play"
              onClick={startBlingToML}
              title="Puxa produtos do Bling, ranqueia pela IA e publica no ML (1/s)"
              style={{background:'linear-gradient(135deg, #ff6b1c, #22c55e)'}}
            >🚀 PUBLICAR DO BLING</button>
          )}
          <button className="btn-play" onClick={start} disabled={counts.aguardando === 0}>▶ INICIAR AGENTE</button>
        </div>
      </div>
    );
  }

  if (status === 'running') {
    const current = queue[0];
    return (
      <div className="agent-status as-running">
        <div className="status-icon">⚙️</div>
        <div className="status-info">
          <div className="status-label" style={{color:'#22c55e'}}>● RUNNING</div>
          <div className="status-title">Processando produto {processed + 1} de {total}</div>
          <div className="status-sub">{current ? `Atual: ${current.label}` : 'Preparando próxima tarefa...'}</div>
          <div className="agent-progress"><div className="agent-progress-fill" style={{width: pct + '%'}}/></div>
        </div>
        <div className="status-actions">
          <button className="btn-pause" onClick={pause}>⏸ Pausar</button>
          <button className="btn-stop"  onClick={stop}>⏹ Parar</button>
        </div>
      </div>
    );
  }

  if (status === 'paused') {
    return (
      <div className="agent-status as-paused">
        <div className="status-icon">⏸️</div>
        <div className="status-info">
          <div className="status-label" style={{color:'#ffb020'}}>● PAUSED</div>
          <div className="status-title">Agente pausado</div>
          <div className="status-sub">{processed} processados · {remaining} restantes na fila</div>
          <div className="agent-progress"><div className="agent-progress-fill" style={{width: pct + '%', background:'linear-gradient(90deg,#facc15,#ffb020)'}}/></div>
        </div>
        <div className="status-actions">
          <button className="btn-resume" onClick={resume}>▶ Retomar</button>
          <button className="btn-stop"   onClick={stop}>⏹ Parar</button>
        </div>
      </div>
    );
  }

  // error
  return (
    <div className="agent-status as-error">
      <div className="status-icon">🔴</div>
      <div className="status-info">
        <div className="status-label" style={{color:'#ef4444'}}>● ERROR</div>
        <div className="status-title">Erro na operação do agente</div>
        <div className="status-sub">{errorMsg || 'Erro desconhecido — clique nos logs pra investigar.'}</div>
      </div>
      <div className="status-actions">
        <button className="btn-resume" onClick={resume}>🔄 Tentar novamente</button>
        <button className="btn-stop">📋 Ver logs</button>
      </div>
    </div>
  );
}

function AgentLogs({ agent }) {
  const { logs, clearLogs } = agent;
  const [filter, setFilter] = useState('all');
  const [autoScroll, setAutoScroll] = useState(true);
  const ref = useRef(null);

  useEffect(() => {
    if (autoScroll && ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [logs, autoScroll]);

  const visible = logs.filter(l => filter === 'all' || (filter === 'errors' && l.level === 'error') || (filter === 'success' && l.level === 'ok'));

  const exportLogs = () => {
    const text = logs.map(l => `[${l.time}] ${l.level.toUpperCase().padEnd(5)} ${l.msg}`).join('\n');
    const blob = new Blob([text], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `agente-logs-${Date.now()}.txt`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url); a.remove();}, 200);
  };

  return (
    <div className="card p-5">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 className="font-bold">Logs em tempo real</h3>
        <div className="flex gap-2 items-center flex-wrap">
          <div className="pill-toggle">
            <button className={filter==='all'?'active':''}     onClick={()=>setFilter('all')}>Tudo</button>
            <button className={filter==='success'?'active':''} onClick={()=>setFilter('success')}>Sucessos</button>
            <button className={filter==='errors'?'active':''}  onClick={()=>setFilter('errors')}>Erros</button>
          </div>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={()=>setAutoScroll(s=>!s)}>{autoScroll ? '⏸ Pausar scroll' : '▶ Auto-scroll'}</button>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={exportLogs}>📥 Exportar</button>
          <button className="btn-ghost" style={{padding:'6px 12px',fontSize:11}} onClick={clearLogs}>🧹 Limpar</button>
        </div>
      </div>
      <div className="log-terminal" ref={ref}>
        {visible.length === 0
          ? <div className="log-empty">Nenhum log {filter==='all'?'ainda':'desse tipo'}.</div>
          : visible.map(l => (
              <div key={l.id} className={`log-line log-${l.level}`}>
                <span className="log-time">[{l.time}]</span>
                <span className="log-level">{l.level.toUpperCase()}</span>
                <span className="log-msg">{l.msg}</span>
              </div>
            ))}
      </div>
    </div>
  );
}

const BLING_KEY = 'agente_ml_bling';
const loadBling = () => {
  try { return JSON.parse(localStorage.getItem(BLING_KEY)||'null'); } catch(e){ return null; }
};
const saveBling = (b) => {
  if (b) localStorage.setItem(BLING_KEY, JSON.stringify(b));
  else   localStorage.removeItem(BLING_KEY);
};

function BlingConnectModal({onClose, onConnect}){
  const [clientId, setClientId]         = useState('');
  const [clientSecret, setClientSecret] = useState('');
  const [busy, setBusy]                 = useState(false);
  const [err, setErr]                   = useState('');
  const ok = clientId.trim().length >= 8 && clientSecret.trim().length >= 8;

  const submit = () => {
    if (!ok) { setErr('Client ID e Client Secret obrigatórios (mín. 8 caracteres)'); return; }
    setBusy(true); setErr('');
    setTimeout(() => {
      onConnect({
        clientId, clientSecret,
        conta:      'hbarbosa_autopecas',
        conectadoEm: Date.now(),
        ultimaSync:  Date.now(),
        produtos:    2847,
      });
      setBusy(false);
    }, 1100);
  };

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', backdropFilter:'blur(4px)', zIndex:80, display:'flex', alignItems:'center', justifyContent:'center', padding:20}} onClick={onClose}>

          <div className="erp-logo bling">B</div>
          <div>
            <h3 className="font-bold text-lg">Conectar com Bling</h3>
            <p className="sub text-xs">ERP brasileiro líder em marketplace</p>
          </div>
        </div>
        <p className="sub text-xs mb-4" style={{lineHeight:1.5}}>
          Obtenha em <span className="mono" style={{color:'var(--green)'}}>developer.bling.com.br</span> → Criar App.
          O agente sincroniza seu catálogo a cada 30 min.
        </p>
        <label className="label">Client ID</label>
        <input className="input mb-3 mono" placeholder="BL_xxxxxxxxxxxxxxxx" value={clientId} onChange={e=>setClientId(e.target.value)}/>
        <label className="label">Client Secret</label>
        <input className="input mb-3 mono" type="password" placeholder="••••••••••••••••" value={clientSecret} onChange={e=>setClientSecret(e.target.value)}/>
        <span className="link" onClick={()=>window.open('https://developer.bling.com.br/','_blank','noopener')}>Como obter essas chaves? [Ver tutorial]</span>
        {err && <div className="err mt-3">{err}</div>}
        <div className="flex gap-2 mt-5">
          <button className="btn-ghost" style={{flex:1}} onClick={onClose} disabled={busy}>Cancelar</button>
          <button className="btn" style={{flex:2}} onClick={submit} disabled={busy || !ok}>
            {busy ? '🔄 Conectando...' : '🔌 Conectar Bling'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MLDestinationCard — card inline com fluxo semi-manual:
// (1) botão "Autorizar" abre auth.mercadolivre.com.br em nova aba
// (2) usuário cola o code recebido em ?code=
// (3) POST /api/ml/token → backend troca code por access_token
// (4) exibe nickname, user_id e expiração. Reconectar/Desconectar.
// ============================================================
function MLDestinationCard({mlTokens, setMlTokens, notif}){
  const [codeInput, setCodeInput] = useState('');
  const [busy, setBusy]           = useState(false);
  const [err, setErr]             = useState('');
  const [meData, setMeData]       = useState(null); // cache do /api/ml/me
  const [meLoading, setMeLoading] = useState(false);

  const authUrl = mlAuthUrl();
  const openAuth = () => {
    window.open(authUrl, '_blank', 'noopener,noreferrer,width=900,height=720');
  };

  // Ao conectar, faz um refresh live do /api/ml/me (validação real)
  useEffect(() => {
    if (!mlTokens || !mlTokens.access_token) { setMeData(null); return; }
    let cancelled = false;
    setMeLoading(true);
    mlFetchMe(mlTokens.access_token)
      .then(d => { if (!cancelled) setMeData(d); })
      .catch(() => {})
      .finally(() => { if (!cancelled) setMeLoading(false); });
    return () => { cancelled = true; };
  }, [mlTokens?.access_token]);

  const connect = async () => {
    const c = extractMLCode(codeInput);
    if (!c || c.length < 6) {
      setErr('Cole o code que aparece depois de ?code= na URL do Google (ou a URL inteira).');
      return;
    }
    setErr(''); setBusy(true);
    try {
      const tokens = await mlExchangeCode(c);
      saveMLTokens(tokens); setMlTokens(tokens); setCodeInput('');
      if (notif) notif.push(buildNotification('publicado',
        { ml_id: '✅ ML conectado · ' + (tokens.nickname || ('user ' + tokens.user_id)) }));
    } catch(e) {
      // invalid_grant = code expirado. Instruímos o usuário.
      const msg = e.message || '';
      if (/invalid[_ ]grant|expired|expirado/i.test(msg)) {
        setErr('⏰ O code expirou (válido por ~10 min). Clique em "Autorizar" novamente para gerar um novo.');
      } else {
        setErr('Falha ao conectar: ' + msg);
      }
    } finally { setBusy(false); }
  };

  const disconnect = () => {
    if (!confirm('Desconectar do Mercado Livre? Os tokens locais serão apagados.')) return;
    saveMLTokens(null); setMlTokens(null); setMeData(null); setErr('');
  };

  const reconnect = () => {
    // abre a tela de autorização + limpa input pra receber novo code
    setCodeInput(''); setErr('');
    openAuth();
  };

  // Calcula "expira em X horas" (humano)
  const expiresInText = (ts) => {
    if (!ts) return '—';
    const ms = ts - Date.now();
    if (ms <= 0) return 'expirado';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 1) return `${h}h ${m}min`;
    return `${m}min`;
  };

  const isConnected = !!(mlTokens && mlTokens.access_token);
  const nickname = (meData && meData.nickname) || (mlTokens && mlTokens.nickname) || null;

  return (
    <div className="card p-5 mb-4">
      <div className="flex items-end justify-between mb-4 flex-wrap gap-2">
        <div>
          <h3 className="font-bold text-lg">📤 Destino · Mercado Livre</h3>
          <p className="sub text-xs mt-1">
            {isConnected
              ? 'Para onde o agente publica os anúncios · OAuth2 ativo'
              : 'Autorize o app para o agente publicar os anúncios na sua conta ML'}
          </p>
        </div>
        <span className="chip" style={{color:'var(--green)',borderColor:'rgba(0,167,255,.4)'}}>
          <span className="dot" style={{background:'var(--green)'}}/>app #{ENV.ML_CLIENT_ID}
        </span>
      </div>

      {/* ================= ESTADO CONECTADO ================= */}
      {isConnected && (
        <div className="card2 p-5" style={{borderColor:'rgba(34,197,94,.3)'}}>
          <div className="flex items-center gap-4 flex-wrap">
            <div className="erp-logo ml" style={{width:56, height:56, fontSize:18}}>ML</div>
            <div className="flex-1 min-w-[240px]">
              <div className="font-bold">Mercado Livre</div>
              <div className="text-xs" style={{color:'#22c55e'}}>✅ Conectado</div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-3 text-[12px]">
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">Conta</div>
                  <div className="font-bold">
                    {meLoading ? <span className="sub">carregando…</span>
                                : (nickname || <span className="sub italic">—</span>)}
                  </div>
                </div>
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">User ID</div>
                  <div className="font-bold mono">{mlTokens.user_id}</div>
                </div>
                <div>
                  <div className="sub text-[10px] uppercase tracking-wider">Token expira em</div>
                  <div className="font-bold mono" style={{color: (mlTokens.expires_at - Date.now()) < 1800000 ? '#facc15' : '#22c55e'}}>
                    {expiresInText(mlTokens.expires_at)}
                  </div>
                </div>
              </div>
              {meData && meData.seller_reputation && meData.seller_reputation.level_id && (
                <div className="sub text-[11px] mt-2">
                  Reputação: <span className="mono" style={{color:'var(--green)'}}>{meData.seller_reputation.level_id}</span>
                  {meData.seller_reputation.power_seller_status &&
                    <> · <span className="mono">{meData.seller_reputation.power_seller_status}</span></>}
                </div>
              )}
            </div>
            <div className="flex gap-2 flex-wrap">
              <button className="btn-ghost" onClick={reconnect}>🔄 Reconectar</button>
              <button
                className="btn-ghost"
                style={{borderColor:'rgba(239,68,68,.4)', color:'#ef4444'}}
                onClick={disconnect}
              >🔌 Desconectar</button>
            </div>
          </div>
        </div>
      )}

      {/* ================= ESTADO DESCONECTADO ================= */}
      {!isConnected && (
        <div className="card2 p-5" style={{borderColor:'rgba(255,230,0,.3)'}}>
          <div className="flex items-center gap-3 mb-4">
            <div className="erp-logo ml" style={{width:56, height:56, fontSize:18}}>ML</div>
            <div>
              <div className="font-bold">Mercado Livre</div>
              <div className="text-xs" style={{color:'#ef4444'}}>❌ Desconectado</div>
            </div>
          </div>

          {/* Passo 1 */}
          <div className="mb-5">
            <div className="font-bold text-[13px] mb-2">
              <span style={{background:'var(--green)', color:'#fff', borderRadius:'50%', width:22, height:22, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, marginRight:8}}>1</span>
              Clique para autorizar o app no Mercado Livre
            </div>
            <button
              className="btn"
              style={{width:'auto', padding:'11px 22px'}}
              onClick={openAuth}
            >🔗 Autorizar no Mercado Livre</button>
            <div className="sub text-[11px] mt-2">
              Abre em nova aba · redirect para <span className="mono">{ENV.ML_REDIRECT_URI}</span>
            </div>
          </div>

          {/* Passo 2 */}
          <div className="mb-3">
            <div className="font-bold text-[13px] mb-2">
              <span style={{background:'var(--green)', color:'#fff', borderRadius:'50%', width:22, height:22, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, marginRight:8}}>2</span>
              Depois de autorizar, copie o código que aparece na URL do Google (depois de <span className="mono" style={{color:'var(--green)'}}>?code=</span>) e cole aqui:
            </div>
            <div className="flex gap-2 flex-wrap">
              <input
                className="input mono text-[12px]"
                style={{flex:1, minWidth:240}}
                placeholder="TG-69e1724d6e92ed000191d3c6..."
                value={codeInput}
                onChange={e => setCodeInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !busy) connect(); }}
              />
              <button
                className="btn"
                style={{width:'auto', padding:'11px 22px'}}
                onClick={connect}
                disabled={busy || !codeInput.trim()}
              >{busy ? '🔄 Conectando…' : '🔌 Conectar'}</button>
            </div>
            <div className="sub text-[11px] mt-2">
              💡 Pode colar a URL inteira — extraímos o <span className="mono">code</span> automaticamente.
              O code expira em ~10 min.
            </div>
          </div>

          {err && <div className="err mt-3 text-xs whitespace-pre-line">{err}</div>}
        </div>
      )}
    </div>
  );
}

// ============================================================
// BlingOAuthCard — 3 estados:
//   (1) server sem BLING_CLIENT_ID  → "Aguardando configuração"
//   (2) server OK, sem tokens       → Passo 1 (autorizar) + Passo 2 (colar code)
//   (3) conectado                   → produtos, sync, desconectar
// ============================================================
function BlingOAuthCard({notif}){
  const [cfg, setCfg]           = useState(null);   // {configured, redirect_uri, client_id_preview}
  const [tokens, setTokens]     = useState(() => loadBlingTokens());
  const [codeInput, setCodeInput] = useState('');
  const [busy, setBusy]         = useState(false);
  const [err, setErr]           = useState('');
  const [produtos, setProdutos] = useState(null); // { total, produtos[] }
  const [syncing, setSyncing]   = useState(false);
  const [lastSync, setLastSync] = useState(tokens?.last_sync || null);

  // Carrega status do server na montagem
  useEffect(() => {
    let live = true;
    blingConfigStatus().then(d => { if (live) setCfg(d); });
    return () => { live = false; };
  }, []);

  // Se tem tokens, puxa produtos automaticamente (sync inicial)
  useEffect(() => {
    if (!tokens?.access_token) { setProdutos(null); return; }
    if (produtos) return;
    syncProdutos(true);
  }, [tokens?.access_token]);

  const syncProdutos = async (silent=false) => {
    if (!tokens?.access_token) return;
    if (!silent) setSyncing(true);
    const r = await blingFetchProdutos({ page:1, limit:100 });
    if (r.success) {
      setProdutos(r);
      const ts = Date.now();
      setLastSync(ts);
      saveBlingTokens({ ...tokens, last_sync: ts });
      if (!silent && notif) notif.push(buildNotification('publicado', { ml_id: `🔄 Bling sincronizado • ${r.total} produtos` }));
    } else {
      setErr('Falha ao buscar produtos: ' + (r.error || 'erro desconhecido'));
    }
    if (!silent) setSyncing(false);
  };

  const openAuth = async () => {
    setErr('');
    const r = await blingGetAuthUrl();
    if (!r.success || !r.url) { setErr(r.error || 'Falha ao gerar URL'); return; }
    window.open(r.url, '_blank', 'noopener,noreferrer,width=900,height=720');
  };

  const connect = async () => {
    const c = extractBlingCode(codeInput);
    if (!c || c.length < 4) { setErr('Cole o code recebido do Bling (ou a URL inteira).'); return; }
    setErr(''); setBusy(true);
    const r = await blingExchangeCode(c);
    setBusy(false);
    if (!r.success) {
      const msg = r.error || '';
      if (/invalid[_ ]grant|expir|expirado/i.test(msg)) {
        setErr('⏰ Code expirado/usado — clique em "Autorizar no Bling" novamente.');
      } else {
        setErr('Falha ao conectar: ' + msg);
      }
      return;
    }
    saveBlingTokens(r); setTokens(loadBlingTokens()); setCodeInput('');
    if (notif) notif.push(buildNotification('publicado', { ml_id: '✅ Bling conectado' }));
  };

  const disconnect = () => {
    if (!confirm('Desconectar do Bling? Os tokens locais serão apagados (produtos já puxados ficam em cache da sessão).')) return;
    saveBlingTokens(null); setTokens(null); setProdutos(null); setLastSync(null); setErr('');
  };

  const fmtDateFull = (ts) => {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR').slice(0,5);
  };

  // ========== ESTADO 1: servidor não configurado ==========
  if (cfg && !cfg.configured) {
    return (
      <div className="erp-card" style={{borderColor:'rgba(234,179,8,.4)'}}>
        <div className="flex items-center gap-3">
          <div className="erp-logo bling">B</div>
          <div>
            <div className="font-bold text-sm">Bling ERP</div>
            <div className="erp-status" style={{color:'#facc15'}}>⚙️ Aguardando configuração</div>
          </div>
        </div>
        <p className="sub text-xs" style={{lineHeight:1.5}}>
          O administrador precisa criar o app Bling em <span className="mono" style={{color:'var(--green)'}}>developer.bling.com.br</span> e preencher <span className="mono">BLING_CLIENT_ID</span> + <span className="mono">BLING_CLIENT_SECRET</span> no <span className="mono">.env</span> do servidor.
        </p>
        <div className="card2 p-2 text-[11px]">
          <div className="flex justify-between">
            <span className="sub">Client ID:</span>
            <span className="mono" style={{color:'#ef4444'}}>❌ Não configurado</span>
          </div>
          {cfg.redirect_uri && <div className="flex justify-between mt-1">
            <span className="sub">Redirect:</span>
            <span className="mono text-[10px]">{cfg.redirect_uri}</span>
          </div>}
        </div>
      </div>
    );
  }

  // ========== ESTADO 3: conectado ==========
  if (tokens?.access_token) {
    const total = produtos?.total ?? null;
    return (
      <div className="erp-card" style={{borderColor:'rgba(34,197,94,.4)'}}>
        <div className="flex items-center gap-3">
          <div className="erp-logo bling">B</div>
          <div>
            <div className="font-bold text-sm">Bling ERP</div>
            <div className="erp-status ok">✅ Conectado</div>
          </div>
        </div>
        <div className="text-xs space-y-1">
          <div className="flex justify-between"><span className="sub">Produtos encontrados</span>
            <span className="mono font-bold" style={{color:'var(--green)'}}>
              {total !== null ? total.toLocaleString('pt-BR') : (syncing ? '…' : '—')}
            </span>
          </div>
          <div className="flex justify-between"><span className="sub">Último sync</span>
            <span className="mono text-[11px]">{fmtDateFull(lastSync)}</span>
          </div>
          <div className="flex justify-between"><span className="sub">Token expira</span>
            <span className="mono text-[11px]">{tokens.expires_at ? fmtDateFull(tokens.expires_at) : '—'}</span>
          </div>
        </div>
        <div className="flex gap-1 mt-3 flex-wrap">
          <button className="btn-ghost text-[11px] px-2 py-1" onClick={() => syncProdutos(false)} disabled={syncing}>{syncing?'🔄 ...':'🔄 Sincronizar'}</button>
          <button className="btn-ghost text-[11px] px-2 py-1" onClick={disconnect} style={{borderColor:'rgba(239,68,68,.4)', color:'#ef4444'}}>Desconectar</button>
        </div>
        {err && <div className="err mt-2 text-[11px]">{err}</div>}
      </div>
    );
  }

  // ========== ESTADO 2: configurado mas desconectado ==========
  return (
    <div className="erp-card featured" style={{borderColor:'rgba(255,176,32,.5)'}}>
      <div className="erp-popular">⭐ FONTE PRINCIPAL</div>
      <div className="flex items-center gap-3">
        <div className="erp-logo bling">B</div>
        <div>
          <div className="font-bold text-sm">Bling ERP</div>
          <div className="erp-status no">❌ Desconectado</div>
        </div>
      </div>

      <div className="text-[11px] mb-1">
        <span className="font-bold">Passo 1:</span> autorize o app no Bling
      </div>
      <button className="btn" style={{padding:'9px 12px', fontSize:12}} onClick={openAuth}>🔗 Autorizar no Bling</button>

      <div className="text-[11px] mt-3 mb-1">
        <span className="font-bold">Passo 2:</span> cole o code da URL aqui
      </div>
      <div className="flex gap-1">
        <input
          className="input mono text-[11px]"
          style={{padding:'8px 10px', flex:1, minWidth:0}}
          placeholder="code="
          value={codeInput}
          onChange={e => setCodeInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !busy) connect(); }}
        />
        <button
          className="btn"
          style={{padding:'8px 12px', fontSize:11, width:'auto'}}
          onClick={connect}
          disabled={busy || !codeInput.trim()}
        >{busy ? '...' : 'Conectar'}</button>
      </div>
      {err && <div className="err mt-2 text-[11px] whitespace-pre-line">{err}</div>}
    </div>
  );
}

function RankingPage({agent, notif, onGoToAgent}){
  const [criteria, setCriteria] = useState(() => loadCriteria());
  const [q, setQ]               = useState('');
  const [fTier, setFTier]       = useState('all');
  const [fStatus, setFStatus]   = useState('all');
  const [fCat, setFCat]         = useState('all');
  const [sort, setSort]         = useState('score');
  const [expanded, setExpanded] = useState(null);
  const [recalc, setRecalc]     = useState(false);
  const [publishedSkus, setPublishedSkus] = useState(new Set());

  // Recarrega critérios quando a página é aberta (se usuário mudou na aba Integrações)
  useEffect(() => {
    const h = () => setCriteria(loadCriteria());
    window.addEventListener('storage', h);
    const id = setInterval(() => setCriteria(loadCriteria()), 2000);
    return () => { window.removeEventListener('storage', h); clearInterval(id); };
  }, []);

  const scored = useMemo(() => {
    return RANKING_PRODUCTS.map(p => {
      const score = finalScore(p, criteria.weights);
      const tier  = scoreTier(score);
      const components = componentScores(p);
      return { ...p, score, tier, components };
    }).sort((a,b) => b.score - a.score);
  }, [criteria.weights, recalc]);

  const counts = useMemo(() => ({
    champion: scored.filter(p => p.tier.tier === 'champion').length,
    quente:   scored.filter(p => p.tier.tier === 'quente').length,
    morno:    scored.filter(p => p.tier.tier === 'morno').length,
    frio:     scored.filter(p => p.tier.tier === 'frio').length,
  }), [scored]);

  // Infla os frios com uma "grande base" — visual realista de catálogo
  const coldBase = 1143;

  const categories = useMemo(() => {
    const set = new Set(scored.map(p => p.categoria));
    return Array.from(set).sort();
  }, [scored]);

  const filtered = useMemo(() => {
    let list = scored;
    if (q) {
      const needle = q.toLowerCase();
      list = list.filter(p => p.nome.toLowerCase().includes(needle) || p.sku.toLowerCase().includes(needle) || p.marca.toLowerCase().includes(needle));
    }
    if (fTier !== 'all')   list = list.filter(p => p.tier.tier === fTier);
    if (fStatus !== 'all') list = list.filter(p => p.statusML === fStatus);
    if (fCat !== 'all')    list = list.filter(p => p.categoria === fCat);
    if (sort === 'score')    list = [...list].sort((a,b)=>b.score-a.score);
    if (sort === 'vendas')   list = [...list].sort((a,b)=>b.vendas30d-a.vendas30d);
    if (sort === 'margem')   list = [...list].sort((a,b)=>b.margem-a.margem);
    if (sort === 'estoque')  list = [...list].sort((a,b)=>b.estoque-a.estoque);
    return list;
  }, [scored, q, fTier, fStatus, fCat, sort]);

  const enqueueToAgent = (items) => {
    const valid = items.filter(p => p.statusML !== 'no_ml');
    if (valid.length === 0) {
      alert('Nenhum produto elegível: os selecionados já estão no ML.');
      return 0;
    }
    const tasks = valid.map(p => ({
      id: 'q_'+p.sku+'_'+Math.random().toString(36).slice(2,6),
      sku: p.sku, action: 'Publicar', label: p.nome,
      eta: 3 + Math.floor(Math.random() * 10),
    }));
    agent.setQueue(prev => [...prev, ...tasks]);
    setPublishedSkus(s => {
      const n = new Set(s);
      valid.forEach(p => n.add(p.sku));
      return n;
    });
    agent.log('info', `📥 ${valid.length} produto(s) adicionado(s) à fila pelo Ranking`);
    if (notif) notif.push(buildNotification('publicado', { ml_id: `${valid.length} item(s) na fila do agente` }));
    return valid.length;
  };

  const publishTop15 = () => {
    const top = scored
      .filter(p => p.statusML !== 'no_ml' && p.score >= criteria.scoreMin)
      .slice(0, criteria.perDay || 15);
    if (top.length === 0) { alert('Nenhum produto elegível dentro do score mínimo configurado.'); return; }
    if (!confirm(`🚀 Publicar os ${top.length} melhores produtos?\n\nIsso adiciona tudo à fila do agente. Se o agente não estiver rodando, clique em "Iniciar" na aba 🤖 Agente.`)) return;
    const added = enqueueToAgent(top);
    if (added > 0 && onGoToAgent && confirm(`✅ ${added} produto(s) adicionado(s) à fila.\n\nIr para a aba 🤖 Agente agora?`)) onGoToAgent();
  };

  const publishSingle = (p, e) => {
    e && e.stopPropagation();
    enqueueToAgent([p]);
  };

  const doRecalc = () => {
    setRecalc(n => !n);
    if (notif) notif.push(buildNotification('publicado', { ml_id: '🔄 Scores recalculados' }));
  };

  const exportCSV = () => {
    const headers = ['sku','nome','marca','categoria','score','tier','vendas30d','estoque','margem','diasUltima','statusML'];
    const rows = filtered.map(p => ({
      ...p, margem: (p.margem*100).toFixed(0)+'%', tier: p.tier.label,
    }));
    downloadCSV(`ranking-${Date.now()}.csv`, headers, rows);
  };

  const statusBadge = (st, skuIsInQueue) => {
    if (skuIsInQueue) return <span className="pill-status queue">⏳ Fila</span>;
    if (st === 'no_ml') return <span className="pill-status ok">✅ No ML</span>;
    if (st === 'queue') return <span className="pill-status queue">⏳ Fila</span>;
    if (st === 'warn')  return <span className="pill-status warn">⚠️ Estoque</span>;
    if (st === 'skip')  return <span className="pill-status skip">⏸ Skip</span>;
    return <span className="pill-status skip">—</span>;
  };

  return (
    <div>
      <div className="flex items-end justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-extrabold">🏆 Ranking</h1>
          <p className="sub text-sm">Scoring inteligente dos seus produtos · priorizado pela IA</p>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn" style={{width:'auto', padding:'11px 22px'}} onClick={publishTop15}>🚀 Publicar os {criteria.perDay || 15} melhores</button>
          <button className="btn-ghost" onClick={doRecalc}>🔄 Recalcular scores</button>
          <button className="btn-ghost" onClick={exportCSV}>⬇️ Exportar</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div className="kpi-tier t-champion">
          <div className="icon">🏆</div>
          <div>
            <div className="lbl">Champions</div>
            <div className="val" style={{color:'#22c55e'}}>{counts.champion}</div>
          </div>
        </div>
        <div className="kpi-tier t-quente">
          <div className="icon">🔥</div>
          <div>
            <div className="lbl">Quentes</div>
            <div className="val" style={{color:'#fb923c'}}>{counts.quente + 27}</div>
          </div>
        </div>
        <div className="kpi-tier t-morno">
          <div className="icon">🌡️</div>
          <div>
            <div className="lbl">Mornos</div>
            <div className="val" style={{color:'#facc15'}}>{counts.morno + 48}</div>
          </div>
        </div>
        <div className="kpi-tier t-frio">
          <div className="icon">❄️</div>
          <div>
            <div className="lbl">Frios</div>
            <div className="val" style={{color:'#94a3b8'}}>{(counts.frio + coldBase).toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div className="card p-4 mb-4">
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <input className="input" placeholder="🔍 Buscar nome, SKU, marca..." value={q} onChange={e=>setQ(e.target.value)}/>
          <select className="input" value={fTier} onChange={e=>setFTier(e.target.value)}>
            <option value="all">Todos os tiers</option>
            <option value="champion">🏆 Champions</option>
            <option value="quente">🔥 Quentes</option>
            <option value="morno">🌡️ Mornos</option>
            <option value="frio">❄️ Frios</option>
          </select>
          <select className="input" value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="all">Todos os status</option>
            <option value="no_ml">✅ Já no ML</option>
            <option value="queue">⏳ Fila</option>
            <option value="warn">⚠️ Estoque</option>
            <option value="skip">⏸ Skip</option>
          </select>
          <select className="input" value={fCat} onChange={e=>setFCat(e.target.value)}>
            <option value="all">Todas as categorias</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <select className="input" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="score">Ordenar: Score ↓</option>
            <option value="vendas">Ordenar: Vendas ↓</option>
            <option value="margem">Ordenar: Margem ↓</option>
            <option value="estoque">Ordenar: Estoque ↓</option>
          </select>
        </div>
      </div>

      {/* Tabela */}
      <div className="card p-0 overflow-hidden">
        <div style={{overflowX:'auto'}}>
        <table className="rank-table">
          <thead>
            <tr>
              <th style={{width:40}}>#</th>
              <th style={{width:90}}>Score</th>
              <th>Produto</th>
              <th style={{width:110}}>Vendas 30d</th>
              <th style={{width:90}}>Estoque</th>
              <th style={{width:90}}>Margem</th>
              <th style={{width:110}}>Status ML</th>
              <th style={{width:120}}>Ações</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} className="text-center sub py-8 italic">Nenhum produto encontrado com os filtros atuais.</td></tr>
            )}
            {filtered.map((p, i) => {
              const inQueue = publishedSkus.has(p.sku);
              const isOpen = expanded === p.sku;
              return (
                <React.Fragment key={p.sku}>
                  <tr className={`rank-row tier-${p.tier.tier}`} onClick={() => setExpanded(isOpen ? null : p.sku)}>
                    <td className="mono sub">{i+1}</td>
                    <td>
                      <span className={`score-badge ${p.tier.color}`}>{p.score}</span>

                    <td>
                      <button
                        className="btn-ghost text-[11px] px-2 py-1"

                        disabled={inQueue || p.statusML === 'no_ml'}
                        onClick={e => publishSingle(p, e)}
                      >{inQueue ? '✓ Na fila' : '▶ Publicar'}</button>
                    </td>
                  </tr>
                  {isOpen && (
                    <tr className="rank-expand">
                      <td colSpan={8}>
                        <div className="rank-expand-inner">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Breakdown */}
                            <div>
                              <h4 className="font-bold mb-3 text-sm">📊 Breakdown do score: <span style={{color:'var(--green)'}}>{p.score}/100</span></h4>
                              {Object.entries(p.components).map(([k,v]) => {
                                const w = criteria.weights[k];
                                const contrib = Math.round(v * w / 100);
                                const lbl = { velocidade:'Velocidade', margem:'Margem', estoque:'Estoque', recencia:'Recência', qualidade:'Qualidade', categoria:'Categoria', naoML:'Ainda não no ML' }[k];
                                return (
                                  <div key={k} className="mb-3">
                                    <div className="flex justify-between text-[12px] mb-1">
                                      <span>{lbl} <span className="sub mono">· peso {w}%</span></span>
                                      <span className="mono font-bold">{v}/100 → +{contrib}</span>
                                    </div>
                                    <div className="crit-bar"><div className="crit-bar-fill" style={{width: v + '%'}}></div></div>
                                  </div>
                                );
                              })}
                            </div>

                            {/* Dados + IA */}
                            <div className="space-y-4">
                              <div className="card2 p-3">
                                <div className="text-[11px] sub uppercase tracking-wider mb-1">🤖 Recomendação da IA</div>
                                <div className="text-[13px]" style={{lineHeight:1.5}}>
                                  {p.tier.tier === 'champion' && <>Produto campeão. Alta velocidade de venda ({p.vendas30d}/30d), margem saudável ({(p.margem*100).toFixed(0)}%). <strong style={{color:'#22c55e'}}>Publicar imediatamente</strong>, escalar estoque se possível.</>}
                                  {p.tier.tier === 'quente' && <>Bom potencial: giro consistente e margem aceitável. <strong style={{color:'#fb923c'}}>Publicar e monitorar</strong> CTR nas primeiras 48h.</>}
                                  {p.tier.tier === 'morno' && <>Vendas medianas — avaliar SEO do título antes de publicar. Considerar precificação mais agressiva. <strong style={{color:'#facc15'}}>Teste A/B recomendado</strong>.</>}
                                  {p.tier.tier === 'frio' && <>Baixa velocidade ({p.vendas30d} vendas/30d) e margem limitada. <strong style={{color:'#94a3b8'}}>Manter em observação</strong>; não é prioridade para publicação automática.</>}
                                </div>
                              </div>
                              <div className="grid grid-cols-2 gap-2 text-[12px]">
                                <div className="flex justify-between"><span className="sub">Categoria</span><span>{p.categoria}</span></div>
                                <div className="flex justify-between"><span className="sub">Marca</span><span>{p.marca}</span></div>
                                <div className="flex justify-between"><span className="sub">Última venda</span><span className="mono">há {p.diasUltima}d</span></div>
                                <div className="flex justify-between"><span className="sub">Completude ficha</span><span className="mono">{p.completude}%</span></div>
                                <div className="flex justify-between"><span className="sub">Estratégica</span><span>{p.categoriaEstrategica ? '✓ Sim' : '—'}</span></div>
                                <div className="flex justify-between"><span className="sub">Status ML</span><span>{statusBadge(p.statusML, inQueue)}</span></div>
                              </div>
                              <div className="flex gap-2 flex-wrap">
                                <button className="btn" style={{width:'auto', padding:'9px 16px', fontSize:13}} disabled={inQueue || p.statusML==='no_ml'} onClick={e=>publishSingle(p,e)}>
                                  {inQueue ? '✓ Na fila' : '▶ Publicar Agora'}
                                </button>
                                <button className="btn-ghost" onClick={e=>{e.stopPropagation(); alert('Ficha completa em desenvolvimento');}}>📋 Ver ficha</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>

      <div className="flex justify-between mt-3 text-[11px] sub">
        <span>{filtered.length} de {scored.length} produtos exibidos</span>
        <span>Clique em uma linha para ver breakdown + recomendação da IA</span>
      </div>
    </div>
  );
}

function Dashboard({user, onLogout}){
  const [tab,setTab] = useState('overview');
  const [panelOpen,setPanelOpen] = useState(false);
  const notif = useNotifications();
  const agent = useAgentStore({ notif });

  // Banner de permissão de push — exibido se ainda não pediu e não dispensou
  const [showPermBanner, setShowPermBanner] = useState(() => {
    if (typeof Notification === 'undefined') return false;
    if (Notification.permission !== 'default') return false;
    return !localStorage.getItem(NOTIF_PERM_DISMISS_KEY);
  });

  const handleEnablePush = async () => {
    try {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notif.setPrefs(p => ({ ...p, push: true }));
        notif.trigger('publicado', { ml_id: 'Notificações ativadas com sucesso!' });
      }
    } catch(e) { /* ignore */ }
    setShowPermBanner(false);
  };
  const handleDismissBanner = () => {
    localStorage.setItem(NOTIF_PERM_DISMISS_KEY, '1');
    setShowPermBanner(false);
  };

  // Gerador automático de notificações mock (a cada 20-40s)
  useEffect(() => {
    let timeoutId;
    const schedule = () => {
      const delay = 20000 + Math.random() * 20000;
      timeoutId = setTimeout(() => {
        const factory = MOCK_NOTIFICATIONS[Math.floor(Math.random() * MOCK_NOTIFICATIONS.length)];
        notif.push(factory());
        schedule();
      }, delay);
    };
    schedule();
    return () => clearTimeout(timeoutId);
  }, [notif.push]);

  // Bling sync periódica — a cada 2 min se Bling conectado
  useEffect(() => {
    const tick = () => {
      const b = loadBling();
      if (!b) return;
      const updated = { ...b, ultimaSync: Date.now() };
      saveBling(updated);
      notif.push(buildNotification('publicado', { ml_id: '🔄 Bling sincronizado • ' + b.produtos.toLocaleString('pt-BR') + ' produtos' }));
    };
    const id = setInterval(tick, 120000);
    return () => clearInterval(id);
  }, [notif.push]);

  // Auto-detect ?code= na URL → troca por access_token automaticamente
  // (funciona se o redirect_uri apontar pra esta aba, ou se o usuário colar a URL)
  useEffect(() => {
    const sp = new URLSearchParams(window.location.search);
    const code = sp.get('code');
    if (!code) return;
    if (loadMLTokens()) {
      // já conectado — só limpa a URL
      window.history.replaceState({}, '', window.location.pathname);
      return;
    }
    (async () => {
      try {
        const tokens = await mlExchangeCode(code);
        saveMLTokens(tokens);
        notif.push(buildNotification('publicado', { ml_id: '✅ ML conectado via callback · user_id ' + tokens.user_id }));
      } catch(e) {
        notif.push(buildNotification('problema', { score: 0 }));
        console.warn('OAuth callback falhou:', e);
      } finally {
        // limpa o ?code= da barra de endereço
        window.history.replaceState({}, '', window.location.pathname);
      }
    })();
  }, [notif.push]);

  return (
    <div>
      <Header
        user={user} tab={tab} setTab={setTab} onLogout={onLogout}
        unreadCount={notif.unreadCount}
        onBellClick={() => { setPanelOpen(true); /* não marca lidas auto — usuário decide */ }}
        onOpenNotifPanel={() => setPanelOpen(true)}
      />
      <main className="max-w-[1400px] mx-auto px-6 py-8">
        {showPermBanner && <PermissionBanner onEnable={handleEnablePush} onDismiss={handleDismissBanner}/>}
        {tab==='overview' && <OverviewPage onGoToProducts={() => setTab('products')} onGoToIntegrations={() => setTab('integrations')}/>}
        {tab==='products' && <ProductsPage agent={agent} onGoToAgent={() => setTab('agent')}/>}
        {tab==='agent'    && <AgentePage   agent={agent}/>}
        {tab==='listings' && <ListingsPage/>}
        {tab==='pricing'  && <PricingPage/>}
        {tab==='ranking'  && <RankingPage agent={agent} notif={notif} onGoToAgent={() => setTab('agent')}/>}
        {tab==='health'   && <HealthPage/>}
        {tab==='integrations' && <IntegracoesPage agent={agent} notif={notif}/>}
        {tab==='config'   && <ConfigPage user={user} notif={notif}/>}
      </main>
      <footer className="border-t border-[var(--line)] mt-16">
        <div className="max-w-[1400px] mx-auto px-6 py-6 flex justify-between text-xs sub">
          <span>Agente AM v1.0 · Painel de Operação · React + Recharts · BrasilAPI FIPE</span>
          <span className="mono">logado como {user.email}</span>
        </div>
      </footer>

      {/* Toasts e painel — globais ao dashboard */}
      <NotificationToasts items={notif.active} onClose={notif.dismissToast}/>
      <NotificationsPanel
        open={panelOpen}
        onClose={() => setPanelOpen(false)}
        history={notif.history}
        onMarkAllRead={notif.markAllRead}
        onMarkRead={notif.markRead}
        onClear={notif.clearHistory}
      />
    </div>
  );
}

// ============================================================
// ROOT APP — roteamento entre telas
// ============================================================
function App(){
  const [screen,setScreen] = useState('login');
  const [session,setSession] = useState(loadSession());
  const [flash,setFlash] = useState('');

  useEffect(()=>{
    if (session) setScreen('dashboard');
  },[]);

  const handleLogin = (s) => { setSession(s); setScreen('dashboard'); setFlash(''); };
  const handleLogout = () => { saveSession(null); setSession(null); setScreen('login'); };
  const handleSignup = (email) => { setFlash(`Conta criada com sucesso para ${email}. Faça login.`); setScreen('login'); };

  if (screen==='dashboard' && session) return <Dashboard user={session} onLogout={handleLogout}/>;
  if (screen==='signup') return <Signup onGo={setScreen} onSignup={handleSignup}/>;
  if (screen==='forgot') return <Forgot onGo={setScreen}/>;
  return <Login onLogin={handleLogin} onGo={setScreen} flashMessage={flash}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
